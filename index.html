    const prompt=question?`Sofia asks: "${question}". Analyze this product.`:"Analyze this product label for Sofia.";
    const raw=await callClaudeWithImages(stagedImgs,prompt,sys);
    setResult(safeParseJSON(raw)||{product_name:"Product",verdict:"caution",verdict_emoji:"⚠️",headline:"Could not read label",reasoning:raw?.slice(0,250)||"",watch_out:null,better_alternative:null,serving_advice:null,key_nutrients:{}});
    setScanning(false);
  }

  // Barcode: take photo → Claude reads barcode number → Open Food Facts lookup → verdict
  async function handleBarcodePhoto(file){
    if(!file)return;
    setBarcodeResult(null);setBarcodeScanning(true);
    // Step 1: Claude reads barcode number from photo
    const compressed=await compressImage(file);
    const sys2=`Read the barcode or UPC/EAN number visible in this image. Return ONLY the numeric barcode, nothing else. No spaces, no dashes.`;
    const raw=await callClaudeWithImage(compressed.b64,compressed.mediaType,"What is the barcode number in this image?",sys2);
    const barcode=(raw||"").replace(/[^0-9]/g,"").trim();
    if(!barcode||barcode.length<8){
      setBarcodeResult({error:"Could not read barcode from photo. Try again with better lighting, or type the number manually."});
      setBarcodeScanning(false);return;
    }
    // Step 2: Open Food Facts lookup
    const product=await lookupBarcode(barcode);
    if(product.error){setBarcodeResult({error:product.error});setBarcodeScanning(false);return;}
    // Step 3: Claude verdict
    const verdict=await getBarcodeVerdict(product);
    setBarcodeResult({...product,...verdict});
    setBarcodeScanning(false);
  }

  async function handleManualBarcode(){
    const b=manualBarcode.replace(/[^0-9]/g,"").trim();
    if(b.length<8)return;
    setBarcodeResult(null);setBarcodeScanning(true);
    const product=await lookupBarcode(b);
    if(product.error){setBarcodeResult({error:product.error});setBarcodeScanning(false);return;}
    const verdict=await getBarcodeVerdict(product);
    setBarcodeResult({...product,...verdict});
    setBarcodeScanning(false);
  }

  function resetAll(){setStagedImgs([]);setResult(null);setQuestion("");setBarcodeResult(null);setManualBarcode("");}

  function handleSave(){
    const r=mode==="barcode"?barcodeResult:result;
    if(onSave)onSave(r,destination);
    alert("Saved to "+destination+"!");
  }

  const activeResult=mode==="barcode"?barcodeResult:result;

  return(
    <div className="section">
      <p className="section-title">Scanner</p>

      {/* Mode toggle */}
      <div style={{display:"flex",gap:0,marginBottom:14,border:"1px solid var(--border)",borderRadius:10,overflow:"hidden"}}>
        {[["photo","📷 Photo / Label"],["barcode","🔲 Barcode"]].map(([m,label])=>(
          <button key={m} onClick={()=>{setMode(m);resetAll();}}
            style={{flex:1,padding:"10px 6px",fontSize:10,letterSpacing:".06em",textTransform:"uppercase",border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace",
              background:mode===m?"var(--green)":"white",color:mode===m?"white":"var(--ink3)",transition:"all .2s"}}>
            {label}
          </button>
        ))}
      </div>

      {/* Destination selector */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:6}}>Save result to:</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[["pantry","🥫 Pantry"],["skin","✨ Skin"],["meds","💊 Meds"],["medical","🏥 Medical"]].map(([val,label])=>(
            <button key={val} onClick={()=>setDestination(val)}
              style={{padding:"6px 12px",fontSize:10,border:"1px solid",borderRadius:20,cursor:"pointer",fontFamily:"'DM Mono',monospace",
                background:destination===val?"var(--green)":"white",color:destination===val?"white":"var(--ink3)",borderColor:destination===val?"var(--green)":"var(--border)"}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* ── PHOTO MODE ── */}
      {mode==="photo"&&(
        <>
          <input className="text-input" style={{width:"100%",marginBottom:9}} placeholder="Optional: ask something specific…"
            value={question} onChange={e=>setQuestion(e.target.value)}/>
          <div className="photo-strip" style={{marginBottom:10}}>
            {stagedImgs.map((img,i)=>(
              <div className="photo-thumb" key={i}>
                <img src={img.preview} alt=""/>
                <button className="photo-thumb-remove" onClick={()=>removeStagedImg(i)}>×</button>
              </div>
            ))}
            <div className="photo-add-btn">
              <span>📷</span><span className="photo-add-label">Add photo</span>
              <input type="file" accept="image/*" multiple onChange={e=>{stageScanPhotos(e.target.files);e.target.value="";}} disabled={scanning}/>
            </div>
          </div>
          {stagedImgs.length>0&&!result&&(
            <button className="btn btn-primary" style={{width:"100%",marginBottom:12}} onClick={runScan} disabled={scanning}>
              {scanning?<><span className="loading-spin"/> Analyzing…</>:`Analyze ${stagedImgs.length} photo${stagedImgs.length>1?"s":""}`}
            </button>
          )}
        </>
      )}

      {/* ── BARCODE MODE ── */}
      {mode==="barcode"&&!barcodeResult&&(
        <div>
          <p style={{fontSize:11,color:"var(--ink3)",marginBottom:12,lineHeight:1.6}}>
            Point your camera at any barcode — the app reads the number, looks it up in the global food database, then tells you if it's safe for your kidneys.
          </p>
          {/* Camera capture */}
          <label style={{display:"block",marginBottom:12}}>
            <div style={{border:"2px dashed var(--border)",borderRadius:12,padding:20,textAlign:"center",background:"white",cursor:"pointer"}}
              onMouseOver={e=>e.currentTarget.style.borderColor="var(--green2)"}
              onMouseOut={e=>e.currentTarget.style.borderColor="var(--border)"}>
              {barcodeScanning
                ?<><div style={{fontSize:24,marginBottom:6}}>🔍</div><div style={{fontSize:11,color:"var(--ink3)"}}>Reading barcode…</div></>
                :<><div style={{fontSize:32,marginBottom:6}}>🔲</div><div style={{fontSize:13,color:"var(--green)",fontWeight:500,marginBottom:4}}>Tap to scan barcode</div><div style={{fontSize:10,color:"var(--ink3)"}}>Opens your camera — point at the barcode</div></>
              }
            </div>
            <input type="file" accept="image/*" capture="environment" style={{display:"none"}}
              onChange={e=>{if(e.target.files[0])handleBarcodePhoto(e.target.files[0]);e.target.value="";}}
              disabled={barcodeScanning}/>
          </label>
          {/* Manual entry fallback */}
          <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:6}}>Or type barcode number:</div>
          <div style={{display:"flex",gap:7}}>
            <input className="text-input" style={{flex:1}} type="number" placeholder="e.g. 0123456789012"
              value={manualBarcode} onChange={e=>setManualBarcode(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleManualBarcode()}/>
            <button className="btn btn-primary" onClick={handleManualBarcode} disabled={barcodeScanning||manualBarcode.length<8}>
              {barcodeScanning?<span className="loading-spin"/>:"Look up"}
            </button>
          </div>
        </div>
      )}

      {/* ── RESULT (both modes) ── */}
      {activeResult&&(
        activeResult.error?(
          <div style={{background:"var(--terra2)",border:"1px solid var(--terra)",borderRadius:10,padding:13,fontSize:11,color:"var(--terra)",lineHeight:1.6}}>
            ⚠️ {activeResult.error}
            <div style={{marginTop:8}}><button className="btn btn-outline btn-sm" onClick={resetAll}>Try again</button></div>
          </div>
        ):(
          <div>
            {/* Barcode product header */}
            {mode==="barcode"&&(
              <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,background:"white",border:"1px solid var(--border)",borderRadius:10,padding:11}}>
                {activeResult.image&&<img src={activeResult.image} alt="" style={{width:52,height:52,objectFit:"contain",borderRadius:6,border:"1px solid var(--border)"}}/>}
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:"var(--ink)",fontWeight:500}}>{activeResult.product_name}</div>
                  {activeResult.brand&&<div style={{fontSize:10,color:"var(--ink3)",marginTop:2}}>{activeResult.brand}</div>}
                  {activeResult.serving&&<div style={{fontSize:10,color:"var(--ink3)"}}>Serving: {activeResult.serving}</div>}
                  <div style={{fontSize:9,color:"var(--ink3)",marginTop:2}}>#{activeResult.barcode}</div>
                </div>
              </div>
            )}
            {/* Nutrient pills */}
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
              {activeResult.calories>0&&<span className="macro-tag">{activeResult.calories} kcal</span>}
              {activeResult.sodium>0&&<span className={`macro-tag ${activeResult.sodium>300?"warn":""}`}>Na {activeResult.sodium}mg</span>}
              {activeResult.calcium>0&&<span className="macro-tag hi">Ca {activeResult.calcium}mg</span>}
              {activeResult.protein>0&&<span className="macro-tag">{activeResult.protein}g prot</span>}
              {activeResult.potassium>0&&<span className="macro-tag">K {activeResult.potassium}mg</span>}
              {activeResult.fiber>0&&<span className="macro-tag">{activeResult.fiber}g fiber</span>}
            </div>
            {/* Data source + warnings */}
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap"}}>
              {activeResult.source&&<span style={{fontSize:9,background:"var(--green3)",color:"var(--green2)",padding:"2px 8px",borderRadius:20,letterSpacing:".06em"}}>
                Source: {activeResult.source}
              </span>}
              {activeResult.warnings&&activeResult.warnings.length>0&&(
                <span style={{fontSize:9,background:"var(--gold2)",color:"#946200",padding:"2px 8px",borderRadius:20}}>
                  ⚠️ Verify values with label
                </span>
              )}
            </div>
            {activeResult.warnings&&activeResult.warnings.length>0&&(
              <div style={{background:"var(--gold2)",border:"1px solid #e6b800",borderRadius:8,padding:"8px 11px",marginBottom:10}}>
                <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"#946200",marginBottom:4}}>Database values may be incomplete</div>
                {activeResult.warnings.map((w,i)=><div key={i} style={{fontSize:10,color:"var(--ink)",marginBottom:2}}>• {w}</div>)}
                <div style={{fontSize:10,color:"var(--ink3)",marginTop:5,fontStyle:"italic"}}>For exact values, use Photo/Label scan with your product photo.</div>
              </div>
            )}
            {/* Verdict */}
            <div className={`scan-verdict ${activeResult.verdict}`}>
              <div className={`verdict-badge ${activeResult.verdict}`}>
                <span style={{fontSize:17}}>{activeResult.verdict_emoji}</span>
                {activeResult.verdict==="yes"?"Good for you":activeResult.verdict==="caution"?"Use with caution":"Avoid this one"}
              </div>
              {activeResult.headline&&<div style={{fontSize:12,fontWeight:500,marginBottom:7}}>{activeResult.headline}</div>}
              <div className="verdict-body">{activeResult.reasoning}</div>
              {activeResult.watch_out&&<div style={{marginTop:7,padding:"6px 10px",background:"rgba(0,0,0,.05)",borderRadius:6,fontSize:11,color:"var(--terra)"}}>⚠ {activeResult.watch_out}</div>}
              {(activeResult.better_alternative||activeResult.serving_advice)&&<div style={{marginTop:7,padding:"8px 11px",background:"var(--green3)",borderRadius:6,fontSize:11,color:"var(--green)"}}>
                {activeResult.better_alternative&&<div><strong>Better option:</strong> {activeResult.better_alternative}</div>}
                {activeResult.serving_advice&&<div style={{marginTop:3,fontStyle:"italic"}}>{activeResult.serving_advice}</div>}
              </div>}
            </div>
            <div style={{marginTop:11,display:"flex",gap:7,flexWrap:"wrap"}}>
              <button className="btn btn-primary" onClick={handleSave}>Save to {destination}</button>
              <button className="btn btn-outline" onClick={resetAll}>Scan another</button>
            </div>
          </div>
        )
      )}
    </div>
  );
}


// ─── MEDICAL TAB ─────────────────────────────────────────────────────────────
function MedicalTab({medical,setMedical,medDocs,setMedDocs,profile,setProfile}){
  const[editing,setEditing]=useState(null);const[editVal,setEditVal]=useState("");
  const[medTab,setMedTab]=useState("context"); // "context" | "docs"
  const[docName,setDocName]=useState("");const[docCat,setDocCat]=useState("Lab results");
  const[uploading,setUploading]=useState(false);
  const sections=[{key:"kidney",title:"Kidney Protocol",icon:"🫘"},{key:"hrt",title:"HRT",icon:"💊"},{key:"nerve",title:"Nerve / Arm",icon:"💪"},{key:"other",title:"Other Notes",icon:"📋"}];
  const DOC_CATS=["Lab results","Blood work","Imaging (X-ray/MRI/CT)","Prescription","Doctor notes","Tomography","Ultrasound","Other"];
  function startEdit(key){setEditing(key);setEditVal(medical[key]);}
  function saveEdit(){const u={...medical,[editing]:editVal};setMedical(u);store.set("medical",u);setEditing(null);}

  const[analyzing,setAnalyzing]=useState(false);
  const[suggestions,setSuggestions]=useState(null);

  async function handleDocUpload(file){
    if(!file||!docName.trim())return;
    setUploading(true);
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const dataUrl=e.target.result;
      const doc={id:Date.now(),name:docName.trim(),category:docCat,date:todayKey(),
        fileType:file.type,fileName:file.name,size:Math.round(file.size/1024),dataUrl};
      const u=[...medDocs,doc];setMedDocs(u);store.set("med-docs",u);
      setDocName("");setUploading(false);
      // Auto-analyze if it's a prescription, lab result, or doctor notes
      if(["Lab results","Blood work","Prescription","Doctor notes"].includes(docCat)){
        setAnalyzing(true);
        try{
          const b64=dataUrl.split(",")[1];
          const mediaType=file.type||"image/jpeg";
          const sys=`You are analyzing a medical document to extract dietary and nutrition targets.
Return ONLY raw JSON with suggested targets based on what the doctor prescribed or lab results show:
{"conditions":["condition1"],"sodium_mg":number_or_null,"calcium_mg":number_or_null,"protein_g_min":number_or_null,"protein_g_max":number_or_null,"water_glasses":number_or_null,"oxalate_notes":"string_or_null","other_restrictions":["string"],"medical_summary":"2 sentence summary of what this document says","confidence":"high"|"medium"|"low"}
Only include fields you can extract from the document. Use null for anything not mentioned.`;
          const raw=await callClaudeWithImage(b64,mediaType,"Read this medical document and extract dietary targets and restrictions.",sys);
          const parsed=safeParseJSON(raw);
          if(parsed)setSuggestions(parsed);
        }catch(e){console.warn("Analysis failed",e);}
        setAnalyzing(false);
      }
    };
    reader.readAsDataURL(file);
  }

  function applySuggestions(){
    if(!suggestions)return;
    const newTargets={...profile.targets};
    if(suggestions.sodium_mg)newTargets.sodium_mg=suggestions.sodium_mg;
    if(suggestions.calcium_mg)newTargets.calcium_mg=suggestions.calcium_mg;
    if(suggestions.water_glasses)newTargets.water_glasses=suggestions.water_glasses;
    if(suggestions.protein_g_max)newTargets.protein_g=suggestions.protein_g_max;
    const newConditions=[...new Set([...(profile.conditions||[]),...(suggestions.conditions||[])])];
    const newRestrictions=[...new Set([...(profile.restrictions||[]),...(suggestions.other_restrictions||[])])];
    if(suggestions.oxalate_notes&&!newRestrictions.includes("Low oxalate diet"))newRestrictions.push("Low oxalate diet");
    const updated={...profile,targets:newTargets,conditions:newConditions,restrictions:newRestrictions};
    setProfile(updated);store.set("profile",updated);
    setSuggestions(null);
    alert("Profile updated with your doctor's recommendations!");
  }

  function removeDoc(id){const u=medDocs.filter(d=>d.id!==id);setMedDocs(u);store.set("med-docs",u);}

  function openDoc(doc){
    const w=window.open();
    w.document.write(`<html><body style="margin:0;background:#000"><img src="${doc.dataUrl}" style="max-width:100%;display:block;margin:auto"/></body></html>`);
  }

  const grouped=DOC_CATS.reduce((a,c)=>{a[c]=medDocs.filter(d=>d.category===c);return a;},{});

  return(
    <div className="section">
      <p className="section-title">Medical</p>
      {/* Sub-tabs */}
      <div style={{display:"flex",gap:0,marginBottom:14,border:"1px solid var(--border)",borderRadius:10,overflow:"hidden"}}>
        {[["context","📋 Protocol"],["docs","🗂 Documents"]].map(([t,label])=>(
          <button key={t} onClick={()=>setMedTab(t)}
            style={{flex:1,padding:"9px 6px",fontSize:10,letterSpacing:".06em",textTransform:"uppercase",border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace",
              background:medTab===t?"var(--green)":"white",color:medTab===t?"white":"var(--ink3)"}}>
            {label}
          </button>
        ))}
      </div>

      {medTab==="context"&&(
        <>
          <p style={{fontSize:11,color:"var(--ink3)",marginBottom:14,lineHeight:1.6}}>Medical information Salus uses to personalize your advice.</p>
          {sections.map(s=>(
            <div className="med-card" key={s.key}>
              <div className="med-card-title">
                {s.icon} {s.title}
                {editing===s.key
                  ?<div style={{display:"flex",gap:7}}><button className="btn btn-primary btn-sm" onClick={saveEdit}>Save</button><button className="btn btn-outline btn-sm" onClick={()=>setEditing(null)}>Cancel</button></div>
                  :<button className="btn btn-outline btn-sm" onClick={()=>startEdit(s.key)}>Edit</button>}
              </div>
              {editing===s.key
                ?<textarea className="text-input" style={{width:"100%",minHeight:120,fontSize:11}} value={editVal} onChange={e=>setEditVal(e.target.value)}/>
                :<div className="med-text">{medical[s.key]}</div>}
            </div>
          ))}
        </>
      )}

      {medTab==="docs"&&(
        <>
          <p style={{fontSize:11,color:"var(--ink3)",marginBottom:12,lineHeight:1.5}}>Upload prescriptions, lab results, imaging, or doctor notes. Each file is saved with a name and category.</p>
          {/* Upload area */}
          <div className="add-food-area" style={{marginBottom:14}}>
            <div className="add-food-title">Add document</div>
            <input className="text-input" style={{width:"100%",marginBottom:7}} placeholder="Document name (e.g. Lab results Nov 2025)"
              value={docName} onChange={e=>setDocName(e.target.value)}/>
            <select className="text-input" style={{width:"100%",marginBottom:7}} value={docCat} onChange={e=>setDocCat(e.target.value)}>
              {DOC_CATS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <label style={{display:"block"}}>
              <div style={{border:"2px dashed var(--border)",borderRadius:10,padding:14,textAlign:"center",background:"white",cursor:docName.trim()?"pointer":"not-allowed",opacity:docName.trim()?1:.5}}>
                {uploading?<><span className="loading-spin" style={{borderTopColor:"var(--green)"}}/> Saving…</>
                :<><div style={{fontSize:22,marginBottom:4}}>📎</div><div style={{fontSize:11,color:"var(--green)",fontWeight:500}}>{docName.trim()?"Tap to upload file":"Enter a name first"}</div><div style={{fontSize:10,color:"var(--ink3)",marginTop:3}}>Photo, PDF, or any image</div></>}
              </div>
              <input type="file" accept="image/*,application/pdf" style={{display:"none"}} disabled={!docName.trim()||uploading}
                onChange={e=>{if(e.target.files[0])handleDocUpload(e.target.files[0]);e.target.value="";}}/>
            </label>
          </div>
          {/* AI analysis result */}
          {analyzing&&(
            <div style={{background:"var(--green3)",border:"1px solid var(--green2)",borderRadius:10,padding:13,marginBottom:12,fontSize:11,color:"var(--green)",display:"flex",alignItems:"center",gap:10}}>
              <span className="loading-spin" style={{borderTopColor:"var(--green)",flexShrink:0}}/>
              Reading your document and extracting nutrition targets…
            </div>
          )}
          {suggestions&&(
            <div style={{background:"var(--blue2)",border:"1px solid var(--blue)",borderRadius:10,padding:14,marginBottom:14}}>
              <div style={{fontSize:10,letterSpacing:".1em",textTransform:"uppercase",color:"var(--blue)",marginBottom:8}}>📋 AI found recommendations in your document</div>
              <div style={{fontSize:11,color:"var(--ink)",marginBottom:10,lineHeight:1.6}}>{suggestions.medical_summary}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                {suggestions.sodium_mg&&<span style={{background:"white",border:"1px solid var(--border)",borderRadius:20,padding:"3px 10px",fontSize:10}}>Sodium ≤{suggestions.sodium_mg}mg</span>}
                {suggestions.calcium_mg&&<span style={{background:"white",border:"1px solid var(--border)",borderRadius:20,padding:"3px 10px",fontSize:10}}>Calcium {suggestions.calcium_mg}mg</span>}
                {suggestions.water_glasses&&<span style={{background:"white",border:"1px solid var(--border)",borderRadius:20,padding:"3px 10px",fontSize:10}}>Water {suggestions.water_glasses} glasses</span>}
                {suggestions.protein_g_max&&<span style={{background:"white",border:"1px solid var(--border)",borderRadius:20,padding:"3px 10px",fontSize:10}}>Protein ≤{suggestions.protein_g_max}g</span>}
                {suggestions.conditions?.map((c,i)=><span key={i} style={{background:"var(--green3)",border:"1px solid var(--green2)",borderRadius:20,padding:"3px 10px",fontSize:10,color:"var(--green)"}}>{c}</span>)}
                {suggestions.other_restrictions?.map((r,i)=><span key={i} style={{background:"var(--terra2)",border:"1px solid var(--terra)",borderRadius:20,padding:"3px 10px",fontSize:10,color:"var(--terra)"}}>{r}</span>)}
              </div>
              <div style={{fontSize:10,color:"var(--ink3)",marginBottom:10,fontStyle:"italic"}}>Confidence: {suggestions.confidence} — tap Apply to update your profile targets automatically.</div>
              <div style={{display:"flex",gap:7}}>
                <button className="btn btn-primary" style={{flex:2}} onClick={applySuggestions}>✓ Apply to my profile</button>
                <button className="btn btn-outline" style={{flex:1}} onClick={()=>setSuggestions(null)}>Dismiss</button>
              </div>
            </div>
          )}
          {/* Document library */}
          {medDocs.length===0
            ?<div className="empty-state"><div className="empty-icon">🗂</div><div>No documents yet — upload your first one above</div></div>
            :DOC_CATS.map(cat=>grouped[cat]&&grouped[cat].length>0&&(
              <div key={cat} style={{marginBottom:14}}>
                <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:6,borderBottom:"1px solid var(--border)",paddingBottom:4}}>{cat}</div>
                {grouped[cat].map(doc=>(
                  <div key={doc.id} style={{background:"white",border:"1px solid var(--border)",borderRadius:8,padding:"10px 13px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:22,flexShrink:0}}>{doc.fileType==="application/pdf"?"📄":"🖼"}</div>
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>openDoc(doc)}>
                      <div style={{fontSize:12,color:"var(--green)",textDecoration:"underline"}}>{doc.name}</div>
                      <div style={{fontSize:9,color:"var(--ink3)",marginTop:2}}>{doc.fileName} · {doc.size}KB · {doc.date}</div>
                    </div>
                    <button className="food-delete" onClick={()=>removeDoc(doc.id)}>×</button>
                  </div>
                ))}
              </div>
            ))
          }
        </>
      )}
    </div>
  );
}

// ─── PANTRY TAB — FIX #11: Custom categories + multi-photo ───────────────────
function PantryTab({pantry,setPantry}){
  const[name,setName]=useState("");const[qty,setQty]=useState("");const[cat,setCat]=useState("dairy");
  const[customCatInput,setCustomCatInput]=useState("");
  const[extraCats,setExtraCats]=useState([]);
  const BASE_CATS=["dairy","fish","protein","grain","produce","seeds & nuts","condiment","supplement","other"];
  const ALL_CATS=[...BASE_CATS,...extraCats];

  const[micOn,setMicOn]=useState(false);const recRef2=React.useRef(null);
  function startMic(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Use Safari on iPhone.");return;}var r=new SR();r.lang="en-US";r.continuous=false;r.interimResults=false;r.onstart=()=>setMicOn(true);r.onresult=e=>{if(e.results[0][0].transcript)setName(p=>p?p+" "+e.results[0][0].transcript:e.results[0][0].transcript);setMicOn(false);};r.onerror=()=>setMicOn(false);r.onend=()=>setMicOn(false);try{r.start();recRef2.current=r;}catch(e){setMicOn(false);}}
  function stopMic(){if(recRef2.current)recRef2.current.stop();setMicOn(false);}

  function addItem(){if(!name.trim())return;const u=[...pantry,{id:Date.now(),name:name.trim(),qty:qty.trim(),cat}];setPantry(u);store.set("pantry",u);setName("");setQty("");}
  function removeItem(id){const u=pantry.filter(p=>p.id!==id);setPantry(u);store.set("pantry",u);}

  // FIX #11: Add custom category
  function addCustomCat(){
    const c=customCatInput.trim().toLowerCase();
    if(!c||ALL_CATS.includes(c))return;
    setExtraCats(p=>[...p,c]);
    setCat(c);
    setCustomCatInput("");
  }

  const grouped=ALL_CATS.reduce((a,c)=>{a[c]=pantry.filter(p=>p.cat===c);return a;},{});

  return(
    <div className="section">
      <p className="section-title">Pantry</p>
      <p style={{fontSize:11,color:"var(--ink3)",marginBottom:12,lineHeight:1.5}}>Your products. Scan a label in the Scan tab to add automatically.</p>
      <div className="add-food-area" style={{marginBottom:14}}>
        <div className="add-food-title">Add item</div>
        <div className="input-row" style={{marginBottom:6}}>
          <input className="text-input" style={{flex:1}} placeholder="Product name" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()}/>
          <button className={"mic-btn "+(micOn?"listening":"idle")} onClick={micOn?stopMic:startMic}>{micOn?"🔴":"🎤"}</button>
          {/* FIX #1: Multiple photos for pantry */}
          <label style={{width:38,height:38,borderRadius:"50%",background:"var(--cream2)",border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,fontSize:16,position:"relative"}}>
            📷
            <input type="file" accept="image/*" multiple style={{position:"absolute",inset:0,opacity:0,cursor:"pointer"}}
              onChange={async e=>{
                const files=Array.from(e.target.files);
                if(!files.length)return;
                const imgs=await Promise.all(files.map(f=>compressImage(f)));
                const raw=await callClaudeWithImages(imgs,"Read the product name from these label photos. Return just the product name, nothing else.","Return only the product name.");
                setName(raw.slice(0,80)||"Scanned product");
                e.target.value="";
              }}/>
          </label>
        </div>
        <div className="input-row">
          <input className="text-input" style={{flex:1}} placeholder="Notes (e.g. 300mg Ca/cup)" value={qty} onChange={e=>setQty(e.target.value)}/>
          <select className="text-input" value={cat} onChange={e=>setCat(e.target.value)} style={{maxWidth:110}}>
            {ALL_CATS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <button className="btn btn-primary" onClick={addItem}>Add</button>
        </div>
        {/* FIX #11: Add custom category */}
        <div style={{display:"flex",gap:6,marginTop:6}}>
          <input className="text-input" style={{flex:1,fontSize:11}} placeholder="New category name…"
            value={customCatInput} onChange={e=>setCustomCatInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addCustomCat()}/>
          <button className="btn btn-outline btn-sm" onClick={addCustomCat} disabled={!customCatInput.trim()}>+ Category</button>
        </div>
      </div>
      {pantry.length===0?(<div className="empty-state"><div className="empty-icon">🥫</div><div>Add your regular products here</div></div>)
      :ALL_CATS.map(c=>grouped[c]&&grouped[c].length>0&&(
        <div key={c} style={{marginBottom:14}}>
          <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:6,borderBottom:"1px solid var(--border)",paddingBottom:4}}>{c}</div>
          {grouped[c].map(item=>(
            <div className="pantry-item" key={item.id}>
              <div style={{flex:1}}><div style={{fontSize:12,color:"var(--ink)",fontWeight:500}}>{item.name}</div>{item.qty&&<div style={{fontSize:9,color:"var(--ink3)",marginTop:2}}>{item.qty}</div>}</div>
              <button className="food-delete" onClick={()=>removeItem(item.id)}>×</button>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── COACH TAB ───────────────────────────────────────────────────────────────
function CoachTab({profile,foodLog,pantry,water,master,takenToday,exLogs,medical,sleepLog,skChecks,injections,setFoodLog,setWater,setExLogs,setSleepLog,setMaster,setTakenToday}){
  const[messages,setMessages]=useState([{role:"assistant",content:"Hi! I have your full context — conditions, medications, food log, sleep, exercise and upcoming procedures. Everything is connected. Ask me anything — or send me a photo of a meal, menu, or medication bottle!"}]);
  const[input,setInput]=useState("");const[loading,setLoading]=useState(false);
  const[stagedPhotos,setStagedPhotos]=useState([]);
  const[voiceOpen,setVoiceOpen]=useState(false);
  const[voiceWorking,setVoiceWorking]=useState(false);
  const[voiceResult,setVoiceResult]=useState(null);
  const chatRef=useRef(null);
  const{listening,startListening,stopListening}=useVoice(text=>{setInput(p=>p?p+" "+text:text);});
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[messages]);
  const QUICK=["What should I eat for dinner?","How am I doing on my targets today?","What's missing nutritionally?","Suggest something from my pantry","Did I take all my meds?","How's my water intake?","I just ate — log it","I'm at a restaurant — help me choose"];

  async function stagePhotos(files){
    if(!files||!files.length)return;
    const newPhotos=await Promise.all(Array.from(files).map(async f=>{
      const compressed=await compressImage(f,1200,0.85);
      return{...compressed,preview:URL.createObjectURL(f)};
    }));
    setStagedPhotos(p=>[...p,...newPhotos]);
  }

  async function send(text){
    if((!text.trim()&&!stagedPhotos.length)||loading)return;
    const displayText=text.trim()||(stagedPhotos.length?"[Photo]":"");
    const userMsg={role:"user",content:displayText};
    const newMsgs=[...(messages||[]),userMsg];
    setMessages(newMsgs);setInput("");setLoading(true);
    const systemPrompt=buildCoachPrompt(profile,foodLog,pantry,water,master,takenToday,exLogs,medical,sleepLog,skChecks,injections);
    var reply;
    if(stagedPhotos.length){
      const photoPrompt=text.trim()?text:"Identify this food/document/medication and give me relevant health information based on my full profile. If it's food, estimate nutritional values. If it's a menu, suggest what I should order based on what I've already had today.";
      reply=await callClaudeWithImages(stagedPhotos,systemPrompt+"\n\n"+photoPrompt,"You are Salus, a personal health AI agent. Be specific, reference the user's actual logged data.");
      setStagedPhotos([]);
    } else {
      reply=await callClaude(newMsgs.map(function(m){return{role:m.role,content:m.content};}),systemPrompt);
    }
    var finalReply=reply||"Sorry, I couldn't respond. Try again.";
    setMessages([...newMsgs,{role:"assistant",content:finalReply}]);

    // Auto-route: if user said they ate/drank something, try to parse and log it
    if(setFoodLog&&text&&(text.toLowerCase().includes("i ate")||text.toLowerCase().includes("i had")||text.toLowerCase().includes("i'm having")||text.toLowerCase().includes("i just had"))){
      try{
        var parsed=await parseVoiceCommand(text,profile,exLogs||[]);
        if(parsed.foods&&parsed.foods.length&&setFoodLog){
          var ml={breakfast:"🌅",lunch:"☀️",dinner:"🌙",snack:"🍎"};
          var newFL=[...(foodLog||[])];
          for(var i=0;i<parsed.foods.length;i++){
            var fd=parsed.foods[i];
            var res=await parseFood(fd.name,pantry||[],newFL);
            if(res&&res.name&&!res.error){
              newFL.push({id:Date.now()+Math.random(),name:res.name,meal:fd.meal||"snack",mealLabel:ml[fd.meal]||"🍽",time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),nutrients:{sodium:res.sodium||0,calcium:res.calcium||0,calories:res.calories||0,protein:res.protein||0,potassium:res.potassium||0,magnesium:res.magnesium||0},oxalate:res.oxalate||"low",notes:res.notes||""});
            }
          }
          if(newFL.length!==(foodLog||[]).length){setFoodLog(newFL);store.set("food-log-"+todayKey(),newFL);}
        }
        if(parsed.water_glasses&&parsed.water_glasses>0&&setWater){
          var nw=Math.min(profile.targets&&profile.targets.water_glasses||12,(water||0)+Math.round(parsed.water_glasses));
          setWater(nw);store.set("water-"+todayKey(),nw);
        }
      } catch(e){}
    }
    setLoading(false);
  }

  function renderText(text){return text.split(/(\*\*[^*]+\*\*)/).map((p,i)=>p.startsWith("**")?<strong key={i}>{p.slice(2,-2)}</strong>:p);}

  return(
    <div className="section">
      <p className="section-title">Salus</p>
      <div className="quick-prompts">{QUICK.map((q,i)=><button key={i} className="quick-btn" onClick={()=>send(q)}>{q}</button>)}</div>
      <div className="chat-window" ref={chatRef}>
        {(messages||[]).map((m,i)=>(
          <div key={i} className={`msg msg-${m.role==="user"?"user":"ai"}`}>
            <div className="msg-label">{m.role==="user"?"You":"Salus"}</div>
            <div className="msg-bubble">{renderText(m.content)}</div>
          </div>
        ))}
        {loading&&<div className="msg msg-ai"><div className="msg-label">Salus</div><div className="msg-bubble"><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div></div>}
      </div>
      {/* Staged photos preview strip */}
      {stagedPhotos.length>0&&(
        <div style={{display:"flex",gap:6,flexWrap:"wrap",padding:"6px 0",alignItems:"center"}}>
          {stagedPhotos.map((p,i)=>(
            <div key={i} style={{position:"relative"}}>
              <img src={p.preview} alt="" style={{width:44,height:44,objectFit:"cover",borderRadius:6,border:"1px solid var(--green2)"}}/>
              <button onClick={()=>setStagedPhotos(photos=>photos.filter((_,j)=>j!==i))}
                style={{position:"absolute",top:-5,right:-5,background:"var(--terra)",color:"white",border:"none",borderRadius:"50%",width:15,height:15,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>×</button>
            </div>
          ))}
          <span style={{fontSize:10,color:"var(--green)"}}>{stagedPhotos.length} photo{stagedPhotos.length>1?"s":""} — add question or Send</span>
        </div>
      )}
      <div className="chat-input-area">
        <textarea className="chat-input" placeholder={stagedPhotos.length?"Ask about the photos… (optional)":"Ask Salus… or send photos 📷"} value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}}
          rows={1}/>
        <button className={`mic-btn ${listening?"listening":"idle"}`} onClick={listening?stopListening:startListening}>{listening?"🔴":"🎤"}</button>
        {/* Camera button */}
        <label style={{width:38,height:38,borderRadius:"50%",background:"var(--cream2)",border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,fontSize:16,position:"relative"}}>
          📷<input type="file" accept="image/*" capture="environment" style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}} onChange={e=>{if(e.target.files.length)stagePhotos(e.target.files);e.target.value="";}} disabled={loading}/>
        </label>
        <label style={{width:38,height:38,borderRadius:"50%",background:"var(--cream2)",border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,fontSize:16,position:"relative"}} title="Choose photos">
          🖼<input type="file" accept="image/*" multiple style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}} onChange={e=>{if(e.target.files.length)stagePhotos(e.target.files);e.target.value="";}} disabled={loading}/>
        </label>
        <button className="btn btn-primary" onClick={()=>send(input)} disabled={loading||(!input.trim()&&!stagedPhotos.length)}>{loading?<span className="loading-spin"/>:"Send"}</button>
      </div>
    </div>
  );
}

// ─── PROFILE TAB ─────────────────────────────────────────────────────────────
function ProfileTab({profile,setProfile,onRedo}){
  const[newR,setNewR]=useState("");const[newC,setNewC]=useState("");
  function updateTarget(key,val){const u={...profile,targets:{...profile.targets,[key]:isNaN(Number(val))?val:Number(val)}};setProfile(u);store.set("profile",u);}
  function updateField(key,val){const u={...profile,[key]:isNaN(Number(val))?val:Number(val)};setProfile(u);store.set("profile",u);}
  function addR(){if(!newR.trim())return;const u={...profile,restrictions:[...profile.restrictions,newR.trim()]};setProfile(u);store.set("profile",u);setNewR("");}
  function removeR(i){const r=[...profile.restrictions];r.splice(i,1);const u={...profile,restrictions:r};setProfile(u);store.set("profile",u);}
  function addC(){if(!newC.trim())return;const u={...profile,conditions:[...profile.conditions,newC.trim()]};setProfile(u);store.set("profile",u);setNewC("");}
  function removeC(i){const c=[...profile.conditions];c.splice(i,1);const u={...profile,conditions:c};setProfile(u);store.set("profile",u);}
  // BMI calc
  const bmi=profile.weight_kg&&profile.height_cm?Math.round((profile.weight_kg/((profile.height_cm/100)**2))*10)/10:null;
  return(
    <div className="section">
      <p className="section-title">Profile</p>

      {/* Re-do setup button */}
      <button className="btn btn-outline" style={{width:"100%",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={onRedo}>
        <span>↩</span> Re-do Setup
      </button>
      <button className="btn btn-outline" style={{width:"100%",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8,borderColor:"var(--terra)",color:"var(--terra)"}} onClick={function(){
        if(window.confirm("This will delete ALL your data and restart the app from scratch. Are you sure?")){
          try{
            Object.keys(localStorage).filter(function(k){return k.startsWith("sn_");}).forEach(function(k){localStorage.removeItem(k);});
            localStorage.clear();
          }catch(e){}
          window.location.reload();
        }
      }}>
        <span>🗑</span> Reset all data — start fresh
      </button>

      {/* Personal info — weight & height */}
      <div className="profile-section">
        <div className="profile-section-title">Personal</div>
        <div className="target-grid">
          <div className="target-card">
            <div className="target-label">Weight</div>
            <div style={{display:"flex",alignItems:"baseline",gap:5}}>
              <input className="target-input" type="number" step="0.1" value={profile.weight_kg||""} onChange={e=>updateField("weight_kg",e.target.value)}/>
              <span style={{fontSize:10,color:"var(--ink3)"}}>kg</span>
            </div>
            {profile.weight_kg&&<div style={{fontSize:9,color:"var(--ink3)",marginTop:3}}>{Math.round(profile.weight_kg*2.205*10)/10} lbs</div>}
          </div>
          <div className="target-card">
            <div className="target-label">Height</div>
            <div style={{display:"flex",alignItems:"baseline",gap:5}}>
              <input className="target-input" type="number" value={profile.height_cm||""} onChange={e=>updateField("height_cm",e.target.value)}/>
              <span style={{fontSize:10,color:"var(--ink3)"}}>cm</span>
            </div>
            {profile.height_cm&&<div style={{fontSize:9,color:"var(--ink3)",marginTop:3}}>{Math.floor(profile.height_cm/2.54/12)}'{Math.round(profile.height_cm/2.54%12)}"</div>}
          </div>
        </div>
        {bmi&&<div style={{fontSize:10,color:"var(--ink3)",marginTop:8}}>BMI: {bmi} · {bmi<18.5?"Underweight":bmi<25?"Normal":bmi<30?"Overweight":"Obese"}</div>}
      </div>

      <div className="profile-section">
        <div className="profile-section-title">Daily targets</div>
        <div className="target-grid">
          {[{key:"water_glasses",label:"Water glasses",unit:"glasses"},{key:"water_glass_oz",label:"Glass size",unit:"oz"},{key:"sodium_mg",label:"Sodium max",unit:"mg"},{key:"calcium_mg",label:"Calcium",unit:"mg"},{key:"magnesium_mg",label:"Magnesium",unit:"mg"},{key:"potassium_mg",label:"Potassium",unit:"mg"},{key:"calories",label:"Base calories",unit:"kcal"},{key:"protein_g",label:"Base protein",unit:"g"}].map(t=>(
            <div className="target-card" key={t.key}><div className="target-label">{t.label}</div><div style={{display:"flex",alignItems:"baseline",gap:5}}><input className="target-input" type="number" value={profile.targets[t.key]} onChange={e=>updateTarget(t.key,e.target.value)}/><span style={{fontSize:10,color:"var(--ink3)"}}>{t.unit}</span></div></div>
          ))}
        </div>
        <div style={{fontSize:10,color:"var(--ink3)",marginTop:8,fontStyle:"italic"}}>Protein and calorie targets adjust automatically based on exercise logged.</div>
      </div>
      <div className="profile-section">
        <div className="profile-section-title">Conditions</div>
        {profile.conditions.map((c,i)=><div className="condition-tag" key={i}>{c}<button className="remove-tag" onClick={()=>removeC(i)}>×</button></div>)}
        <div className="input-row" style={{marginTop:6}}><input className="text-input" style={{flex:1}} placeholder="Add condition…" value={newC} onChange={e=>setNewC(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addC()}/><button className="btn btn-outline" onClick={addC}>Add</button></div>
      </div>
      <div className="profile-section">
        <div className="profile-section-title">Dietary restrictions</div>
        {profile.restrictions.map((r,i)=><div className="restriction-tag" key={i}>{r}<button className="remove-tag" onClick={()=>removeR(i)}>×</button></div>)}
        <div className="input-row" style={{marginTop:6}}><input className="text-input" style={{flex:1}} placeholder="Add restriction…" value={newR} onChange={e=>setNewR(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addR()}/><button className="btn btn-outline" onClick={addR}>Add</button></div>
      </div>
      <div className="profile-section">
        <div className="profile-section-title">Notes for coach</div>
        <textarea className="text-input" style={{width:"100%",minHeight:70}} value={profile.notes} onChange={e=>{const u={...profile,notes:e.target.value};setProfile(u);store.set("profile",u);}}/>
      </div>
    </div>
  );
}

// ─── DOCUMENT UPLOAD STEP ────────────────────────────────────────────────────
function DocUploadStep({onBack,onNext}){
  var useState=React.useState;
  var useRef=React.useRef;
  var[docs,setDocs]=useState([]);
  var[analyzing,setAnalyzing]=useState(false);
  var[status,setStatus]=useState("");
  var[extracted,setExtracted]=useState(null);
  var cameraRef=useRef(null);
  var galleryRef=useRef(null);
  var pdfRef=useRef(null);

  function fileToBase64(file){
    return new Promise(function(resolve){
      var reader=new FileReader();
      reader.onloadend=function(){
        var b64=reader.result.split(",")[1];
        resolve({b64:b64,mediaType:file.type||"image/jpeg",preview:reader.result,name:file.name});
      };
      reader.readAsDataURL(file);
    });
  }

  async function pdfToImages(file){
    var arrayBuffer=await file.arrayBuffer();
    var uint8=new Uint8Array(arrayBuffer);
    if(!window.pdfjsLib){return[];}
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    var pdf=await pdfjsLib.getDocument({data:uint8}).promise;
    var images=[];
    for(var i=1;i<=Math.min(pdf.numPages,6);i++){
      var page=await pdf.getPage(i);
      var vp=page.getViewport({scale:1.5});
      var canvas=document.createElement("canvas");
      canvas.width=vp.width;canvas.height=vp.height;
      var ctx=canvas.getContext("2d");
      await page.render({canvasContext:ctx,viewport:vp}).promise;
      var dataUrl=canvas.toDataURL("image/jpeg",0.85);
      images.push({b64:dataUrl.split(",")[1],mediaType:"image/jpeg",preview:dataUrl,name:file.name+" p."+i});
    }
    return images;
  }

  async function handleFiles(files){
    if(!files||!files.length)return;
    setStatus("Processing files…");
    var newDocs=[];
    for(var i=0;i<files.length;i++){
      var f=files[i];
      if(f.type==="application/pdf"){
        var pages=await pdfToImages(f);
        pages.forEach(function(p){newDocs.push(p);});
      } else {
        var img=await fileToBase64(f);
        newDocs.push(img);
      }
    }
    setDocs(function(prev){return prev.concat(newDocs);});
    setStatus("");
  }

  async function analyze(){
    if(!docs.length)return;
    setAnalyzing(true);
    setStatus("Salus is reading your documents…");
    var prompt="Analyze these health documents and extract ALL relevant information. Return ONLY a JSON object (no other text) with this exact structure:\n{\"conditions\":[],\"medications\":[{\"name\":\"\",\"dose\":\"\",\"frequency\":\"\"}],\"restrictions\":[],\"targets\":{\"sodium_mg\":0,\"calcium_mg\":0,\"protein_g\":0,\"water_L\":0,\"calories\":0,\"fiber_g\":0},\"notes\":\"\"}.\nFor conditions: list all medical diagnoses. For medications: list all drugs/supplements with dose and frequency. For restrictions: dietary rules (e.g. 'low sodium','no sugar','pescatarian'). For targets: any numeric daily targets your doctor specified (use 0 if not mentioned). For notes: any other important health information.";
    var system="You are a health document analyzer. Extract structured health data from any documents — medical records, prescriptions, lab results, medication labels, handwritten notes. Return ONLY valid JSON, nothing else.";
    var raw=await callClaudeWithImages(docs,prompt,system);
    setAnalyzing(false);
    try{
      var clean=raw.replace(/```json|```/g,"").trim();
      var parsed=JSON.parse(clean);
      setExtracted(parsed);
      setStatus("Done! Salus found your health data.");
    } catch(e){
      setStatus("Could not parse — tap Next to continue manually.");
      setExtracted(null);
    }
  }

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column"}}>
      <div style={{fontSize:9,letterSpacing:".12em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:4}}>Optional Step</div>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:300,color:"var(--green)",marginBottom:6}}>Upload health documents</h2>
      <p style={{fontSize:11,color:"var(--ink3)",marginBottom:14,lineHeight:1.6}}>Salus will read your documents and set up your profile automatically. Add photos of prescriptions, lab results, medicine bottles, or any health records.</p>

      {/* Upload buttons */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <label style={{flex:1,padding:"12px 0",background:"var(--cream2)",border:"1px solid var(--border)",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",position:"relative"}}>
          <span style={{fontSize:22}}>📷</span>
          <span style={{fontSize:9,letterSpacing:".06em",textTransform:"uppercase",color:"var(--ink3)"}}>Camera</span>
          <input ref={cameraRef} type="file" accept="image/*" capture="environment" multiple style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}} onChange={function(e){handleFiles(e.target.files);e.target.value="";}}/>
        </label>
        <label style={{flex:1,padding:"12px 0",background:"var(--cream2)",border:"1px solid var(--border)",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",position:"relative"}}>
          <span style={{fontSize:22}}>🖼</span>
          <span style={{fontSize:9,letterSpacing:".06em",textTransform:"uppercase",color:"var(--ink3)"}}>Library</span>
          <input ref={galleryRef} type="file" accept="image/*" multiple style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}} onChange={function(e){handleFiles(e.target.files);e.target.value="";}}/>
        </label>
        <label style={{flex:1,padding:"12px 0",background:"var(--cream2)",border:"1px solid var(--border)",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",position:"relative"}}>
          <span style={{fontSize:22}}>📄</span>
          <span style={{fontSize:9,letterSpacing:".06em",textTransform:"uppercase",color:"var(--ink3)"}}>PDF</span>
          <input ref={pdfRef} type="file" accept="application/pdf,image/*" multiple style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}} onChange={function(e){handleFiles(e.target.files);e.target.value="";}}/>
        </label>
      </div>

      {/* Preview strip */}
      {docs.length>0&&(
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {docs.map(function(d,i){
            return(
              <div key={i} style={{position:"relative"}}>
                <img src={d.preview} alt="" style={{width:52,height:52,objectFit:"cover",borderRadius:8,border:"1px solid var(--green2)"}}/>
                <button onClick={function(){setDocs(function(prev){return prev.filter(function(_,j){return j!==i;});});}} style={{position:"absolute",top:-5,right:-5,background:"var(--terra)",color:"white",border:"none",borderRadius:"50%",width:16,height:16,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,lineHeight:1}}>×</button>
              </div>
            );
          })}
        </div>
      )}

      {/* Status */}
      {status!=""&&<p style={{fontSize:11,color:"var(--green)",marginBottom:8}}>{status}</p>}

      {/* Extracted summary */}
      {extracted&&(
        <div style={{background:"var(--green3)",border:"1px solid var(--green2)",borderRadius:10,padding:10,marginBottom:10,fontSize:10,color:"var(--ink2)",lineHeight:1.7}}>
          {extracted.conditions&&extracted.conditions.length>0&&<div><strong>Conditions:</strong> {extracted.conditions.join(", ")}</div>}
          {extracted.medications&&extracted.medications.length>0&&<div><strong>Meds:</strong> {extracted.medications.map(function(m){return m.name+(m.dose?" "+m.dose:"");}).join(", ")}</div>}
          {extracted.restrictions&&extracted.restrictions.length>0&&<div><strong>Dietary rules:</strong> {extracted.restrictions.join(", ")}</div>}
          {extracted.notes&&<div><strong>Notes:</strong> {extracted.notes}</div>}
        </div>
      )}

      {/* Analyze button */}
      {docs.length>0&&!extracted&&(
        <button className="btn btn-primary" style={{width:"100%",padding:"12px",marginBottom:10}} onClick={analyze} disabled={analyzing}>
          {analyzing?<span className="loading-spin"/>:"✦ Let Salus read these documents"}
        </button>
      )}

      {/* Navigation */}
      <div style={{display:"flex",gap:7,marginTop:"auto",paddingTop:12}}>
        <button className="btn btn-outline" style={{flex:1}} onClick={onBack}>Back</button>
        <button className="btn btn-primary" style={{flex:2}} onClick={function(){onNext(extracted);}}>
          {docs.length===0?"Skip for now →":"Next →"}
        </button>
      </div>
    </div>
  );
}

// ─── SLEEP TAB ────────────────────────────────────────────────────────────────
function SleepTab({sleepLog,setSleepLog,master,takenToday}){
  const[bedtime,setBedtime]=useState("");
  const[waketime,setWaketime]=useState("");
  const[quality,setQuality]=useState(0);
  const[notes,setNotes]=useState("");
  const[showAdd,setShowAdd]=useState(false);
  const[sleepType,setSleepType]=useState("night");
  const[editingSleepId,setEditingSleepId]=useState(null);
  const[editSleep,setEditSleep]=useState(null);

  // Calculate hours slept
  function calcHours(bed,wake){
    if(!bed||!wake)return null;
    const [bh,bm]=bed.split(":").map(Number);
    const [wh,wm]=wake.split(":").map(Number);
    let mins=(wh*60+wm)-(bh*60+bm);
    if(mins<0)mins+=1440; // overnight
    return Math.round(mins/60*10)/10;
  }

  function logSleep(){
    if(!bedtime||!waketime)return;
    const hours=calcHours(bedtime,waketime);
    // Check if sleep aid was marked taken today
    const aidTaken=(master||[]).some(m=>{
      const isSleepAid=m.name.toLowerCase().includes("sleep")||m.name.toLowerCase().includes("melatonin")||m.name.toLowerCase().includes("ambien")||m.name.toLowerCase().includes("kirkland");
      return isSleepAid && takenToday && takenToday[m.id]===true;
    });
    const entry={id:Date.now(),date:todayKey(),bedtime,waketime,hours,quality,notes:notes.trim(),aidTaken,sleepType:sleepType||"night"};
    const u=[...sleepLog,entry];
    setSleepLog(u);store.set("sleep-log",u);
    setBedtime("");setWaketime("");setQuality(0);setNotes("");setSleepType("night");setShowAdd(false);
  }

  function removeEntry(id){const u=sleepLog.filter(e=>e.id!==id);setSleepLog(u);store.set("sleep-log",u);}

  // Last 7 entries for chart
  const recent=[...sleepLog].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7).reverse();
  const avgHours=recent.length?Math.round(recent.reduce((s,e)=>s+(e.hours||0),0)/recent.length*10)/10:null;

  const qualityEmoji=["","😴","😐","🙂","😊","⭐️"];
  const hoursColor=(h)=>h>=7?"var(--green2)":h>=5?"var(--gold)":"var(--terra)";

  return(
    <div className="section">
      <p className="section-title">Sleep</p>

      {/* Weekly summary ribbon */}
      {recent.length>0&&(
        <div className="day-ribbon" style={{marginBottom:14}}>
          <div><div className="ribbon-label">Avg this week</div><div className="ribbon-val">{avgHours}h</div></div>
          <div style={{textAlign:"center"}}><div className="ribbon-label">Nights logged</div><div className="ribbon-val">{recent.length}</div></div>
          <div style={{textAlign:"right"}}><div className="ribbon-label">Last night</div><div className="ribbon-val">{recent[recent.length-1]?.hours||"—"}h</div></div>
        </div>
      )}

      {/* Bar chart */}
      {recent.length>0&&(
        <div style={{background:"white",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:10}}>Last {recent.length} nights</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>
            {recent.map((e,i)=>{
              const pct=Math.min(100,Math.round(((e.hours||0)/10)*100));
              const dayName=new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"});
              return(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{fontSize:8,color:"var(--ink3)"}}>{e.hours||"?"}</div>
                  <div style={{width:"100%",height:44,display:"flex",alignItems:"flex-end"}}>
                    <div style={{width:"100%",height:pct+"%",minHeight:4,borderRadius:"3px 3px 0 0",background:hoursColor(e.hours||0),transition:"height .3s"}}/>
                  </div>
                  <div style={{fontSize:8,color:"var(--ink3)"}}>{dayName}</div>
                  {e.aidTaken&&<div style={{fontSize:7,color:"var(--rose)"}}>💊</div>}
                </div>
              );
            })}
          </div>
          <div style={{fontSize:9,color:"var(--ink3)",marginTop:6}}>💊 = sleep aid taken · 🟢 ≥7h · 🟡 5-7h · 🔴 &lt;5h</div>
        </div>
      )}

      {/* Log button */}
      <button className="btn btn-primary" style={{width:"100%",marginBottom:14}} onClick={()=>setShowAdd(!showAdd)}>
        {showAdd?"— Cancel":"+ Log a sleep session"}
      </button>

      {showAdd&&(
        <div className="add-food-area" style={{marginBottom:14}}>
          <div className="add-food-title">Log sleep session</div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            {[["night","🌙 Night"],["nap","☀️ Nap"],["rest","😌 Rest"],["interrupted","⚡ Wake-up"]].map(function(t){return(
              <button key={t[0]} onClick={function(){setSleepType(t[0]);}}
                style={{flex:1,padding:"7px 4px",fontSize:9,border:"1px solid",borderRadius:8,cursor:"pointer",
                  fontFamily:"'DM Mono',monospace",textAlign:"center",lineHeight:1.3,
                  background:sleepType===t[0]?"var(--green)":"white",
                  color:sleepType===t[0]?"white":"var(--ink3)",
                  borderColor:sleepType===t[0]?"var(--green)":"var(--border)"}}>
                {t[1]}
              </button>
            );})}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <div>
              <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:4}}>Bedtime</div>
              <input className="text-input" type="time" style={{width:"100%"}} value={bedtime} onChange={e=>setBedtime(e.target.value)}/>
            </div>
            <div>
              <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:4}}>Wake time</div>
              <input className="text-input" type="time" style={{width:"100%"}} value={waketime} onChange={e=>setWaketime(e.target.value)}/>
            </div>
          </div>
          {bedtime&&waketime&&(
            <div style={{textAlign:"center",fontSize:14,color:"var(--green)",fontFamily:"'Cormorant Garamond',serif",marginBottom:10}}>
              {calcHours(bedtime,waketime)} hours slept
            </div>
          )}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:6}}>Sleep quality</div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              {[1,2,3,4,5].map(q=>(
                <button key={q} onClick={()=>setQuality(q)}
                  style={{fontSize:22,background:"none",border:"none",cursor:"pointer",opacity:quality>=q?1:.3,transition:"opacity .15s"}}>
                  {qualityEmoji[q]}
                </button>
              ))}
            </div>
            {quality>0&&<div style={{textAlign:"center",fontSize:10,color:"var(--ink3)",marginTop:4}}>{["","Very poor","Poor","Fair","Good","Excellent"][quality]}</div>}
          </div>
          <input className="text-input" style={{width:"100%",marginBottom:8}} placeholder="Notes (e.g. woke up at 3am, vivid dreams…)" value={notes} onChange={e=>setNotes(e.target.value)}/>
          <button className="btn btn-primary" style={{width:"100%"}} onClick={logSleep} disabled={!bedtime||!waketime}>Save</button>
        </div>
      )}

      {/* History */}
      {sleepLog.length===0?(
        <div className="empty-state"><div className="empty-icon">🌙</div><div>No sleep logged yet — tap above to start</div></div>
      ):(
        <div>
          <div className="cat-label">History</div>
          {[...sleepLog].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{
            const isEditingSleep=editingSleepId===e.id&&editSleep;
            return(
            <div key={e.id} style={{background:"white",border:"1px solid",borderColor:isEditingSleep?"var(--green2)":"var(--border)",borderRadius:10,padding:"11px 13px",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontSize:24}}>{(e.hours||0)>=7?"😊":(e.hours||0)>=5?"😐":"😴"}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:hoursColor(e.hours||0)}}>{e.hours}h</span>
                    <span style={{fontSize:10,color:"var(--ink3)"}}>{e.bedtime} → {e.waketime}</span>
                    {e.aidTaken&&<span style={{fontSize:9,color:"var(--rose)"}}>💊 aid</span>}
                  </div>
                  <div style={{fontSize:10,color:"var(--ink3)",marginTop:2}}>{e.sleepType==="nap"?"☀️ Nap":e.sleepType==="rest"?"😌 Rest":e.sleepType==="interrupted"?"⚡ Wake-up":"🌙 Night"}{" · "}{e.date}{e.quality>0&&" · "+qualityEmoji[e.quality].repeat(e.quality)}</div>
                  {e.notes&&<div style={{fontSize:10,color:"var(--ink3)",fontStyle:"italic",marginTop:2}}>{e.notes}</div>}
                </div>
                <div style={{display:"flex",gap:4}}>
                  {!isEditingSleep&&<button className="food-edit" onClick={()=>{setEditingSleepId(e.id);setEditSleep({...e});}}>✏️</button>}
                  <button className="food-delete" onClick={()=>removeEntry(e.id)}>×</button>
                </div>
              </div>
              {isEditingSleep&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
                    <div>
                      <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:3}}>Bedtime</div>
                      <input className="text-input" type="time" style={{width:"100%"}} value={editSleep.bedtime}
                        onChange={e=>{const bed=e.target.value;const h=calcHours(bed,editSleep.waketime);setEditSleep({...editSleep,bedtime:bed,hours:h||editSleep.hours});}}/>
                    </div>
                    <div>
                      <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:3}}>Wake time</div>
                      <input className="text-input" type="time" style={{width:"100%"}} value={editSleep.waketime}
                        onChange={e=>{const wake=e.target.value;const h=calcHours(editSleep.bedtime,wake);setEditSleep({...editSleep,waketime:wake,hours:h||editSleep.hours});}}/>
                    </div>
                  </div>

      )}

}


// ─── HISTORY TAB ──────────────────────────────────────────────────────────────
function HistoryTab({sleepLog}){
  const[selectedDate,setSelectedDate]=useState(null);
  const[dayData,setDayData]=useState(null);
  const[loading,setLoading]=useState(false);
  const[viewMonth,setViewMonth]=useState(new Date());

  // Load data for a specific day from localStorage
  async function loadDay(dateStr){
    setLoading(true);setSelectedDate(dateStr);
    const food=await store.get("food-log-"+dateStr)||[];
    const water=await store.get("water-"+dateStr)||0;
    const ex=await store.get("ex-"+dateStr)||[];
    const sleep=sleepLog.filter(s=>s.date===dateStr);
    setDayData({food,water,ex,sleep});
    setLoading(false);
  }

  // Build calendar grid
  const year=viewMonth.getFullYear();
  const month=viewMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=todayKey();
  const monthName=viewMonth.toLocaleDateString("en-US",{month:"long",year:"numeric"});

  // Check which days have data
  function hasData(dateStr){
    // Check localStorage for food log key
    try{return!!localStorage.getItem("sn_food-log-"+dateStr);}catch{return false;}
  }

  function dateStr(d){
    return `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }

  function prevMonth(){setViewMonth(new Date(year,month-1,1));setSelectedDate(null);setDayData(null);}
  function nextMonth(){setViewMonth(new Date(year,month+1,1));setSelectedDate(null);setDayData(null);}

  const totals=dayData?.food?computeTotals(dayData.food):{};
  const DAYS=["Su","Mo","Tu","We","Th","Fr","Sa"];

  return(
    <div className="section">
      <p className="section-title">History</p>

      {/* Calendar */}
      <div style={{background:"white",border:"1px solid var(--border)",borderRadius:12,padding:14,marginBottom:14}}>
        {/* Month nav */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={prevMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--green)",padding:"4px 8px"}}>‹</button>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"var(--green)"}}>{monthName}</div>
          <button onClick={nextMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--green)",padding:"4px 8px",opacity:dateStr(1)>=today?"0.3":"1"}} disabled={dateStr(1)>=today}>›</button>
        </div>
        {/* Day headers */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:"var(--ink3)",letterSpacing:".06em",padding:"3px 0"}}>{d}</div>)}
        </div>
        {/* Day cells */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i}/>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const d=i+1;
            const ds=dateStr(d);
            const isToday=ds===today;
            const isFuture=ds>today;
            const isSelected=ds===selectedDate;
            const hasFoodData=hasData(ds);
            const hasSleep=sleepLog.some(s=>s.date===ds);
            return(
              <button key={d} onClick={()=>!isFuture&&loadDay(ds)}
                style={{
                  aspectRatio:"1",borderRadius:8,border:"1px solid",cursor:isFuture?"default":"pointer",
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,
                  background:isSelected?"var(--green)":isToday?"var(--green3)":"white",
                  borderColor:isSelected?"var(--green)":isToday?"var(--green2)":"var(--border)",
                  opacity:isFuture?.3:1,position:"relative"

                <span style={{fontSize:11,color:isSelected?"white":isToday?"var(--green)":"var(--ink)",fontWeight:isToday?"600":"normal"}}>{d}</span>
                <div style={{display:"flex",gap:2}}>
                  {hasFoodData&&<div style={{width:4,height:4,borderRadius:"50%",background:isSelected?"rgba(255,255,255,.7)":"var(--green2)"}}/>}
                  {hasSleep&&<div style={{width:4,height:4,borderRadius:"50%",background:isSelected?"rgba(255,255,255,.7)":"var(--rose)"}}/>}
                </div>
              </button>
            );
          })}
        </div>
        <div style={{display:"flex",gap:12,marginTop:10,fontSize:9,color:"var(--ink3)"}}>
          <span><span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:"var(--green2)",marginRight:3,verticalAlign:"middle"}}/>Food logged</span>
          <span><span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:"var(--rose)",marginRight:3,verticalAlign:"middle"}}/>Sleep logged</span>
        </div>
      </div>

      {/* Selected day detail */}
      {loading&&<div style={{textAlign:"center",padding:20,color:"var(--ink3)",fontSize:11}}>Loading…</div>}

      {selectedDate&&dayData&&!loading&&(
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"var(--green)",marginBottom:12}}>
            {new Date(selectedDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
          </div>

          {/* Day summary ribbon */}
          {dayData.food.length>0&&(
            <div className="day-ribbon" style={{marginBottom:12}}>
              <div><div className="ribbon-label">Calories</div><div className="ribbon-val">{totals.calories||0}</div></div>

          {/* Water */}
          {dayData.water>0&&(
            <div style={{background:"var(--green3)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>💧</span>
              <span style={{fontSize:12,color:"var(--green)"}}>{dayData.water} glasses of water</span>
            </div>

          {/* Exercise */}
          {dayData.ex.length>0&&(
            <div style={{background:"white",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:10}}>

              {dayData.ex.map((e,i)=>{

                return act?<div key={i} style={{fontSize:12,color:"var(--ink)",marginBottom:3}}>{act.emoji} {act.name} · {e.duration}min{e.distance?" · "+e.distance+" "+e.distanceUnit:""}</div>:null;
              })}
            </div>
          )}

          {/* Sleep */}
          {dayData.sleep.length>0&&dayData.sleep.map((s,i)=>(
            <div key={i} style={{background:"white",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>🌙</span>
              <div>
                <div style={{fontSize:13,color:"var(--ink)",fontFamily:"'Cormorant Garamond',serif"}}>{s.hours}h sleep</div>
                <div style={{fontSize:10,color:"var(--ink3)"}}>{s.bedtime} → {s.waketime}{s.aidTaken?" · 💊 aid":""}</div>
                {s.notes&&<div style={{fontSize:10,color:"var(--ink3)",fontStyle:"italic"}}>{s.notes}</div>}
              </div>
            </div>
          ))}

          {/* Food log */}
          {dayData.food.length===0?(
            <div className="empty-state"><div className="empty-icon">🥗</div><div>No food logged this day</div></div>
          ):(
            <div>
              <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:8,borderBottom:"1px solid var(--border)",paddingBottom:4}}>Food log</div>
              {dayData.food.map(f=>(
                <div key={f.id} style={{background:"white",border:"1px solid var(--border)",borderRadius:10,padding:"10px 13px",marginBottom:7,display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{fontSize:10,color:"var(--ink3)",minWidth:32}}><div>{f.mealLabel||""}</div><div>{f.time}</div></div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:"var(--ink)",marginBottom:3}}>{f.name}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {f.nutrients?.calories>0&&<span className="macro-tag">{f.nutrients.calories} kcal</span>}
                      {f.nutrients?.sodium>0&&<span className={`macro-tag ${f.nutrients.sodium>400?"warn":""}`}>Na {f.nutrients.sodium}mg</span>}
                      {f.nutrients?.calcium>0&&<span className="macro-tag">Ca {f.nutrients.calcium}mg</span>}
                      {f.nutrients?.protein>0&&<span className="macro-tag">{f.nutrients.protein}g prot</span>}
                      {f.oxalate&&<span className={`ox-${f.oxalate}`}>ox {f.oxalate}</span>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {dayData.food.length===0&&dayData.water===0&&dayData.ex.length===0&&dayData.sleep.length===0&&(
            <div className="empty-state"><div className="empty-icon">📅</div><div>Nothing logged this day</div></div>
          )}
        </div>
      )}

      {!selectedDate&&(
        <div className="empty-state"><div className="empty-icon">📅</div><div>Tap a day on the calendar to see your log</div></div>
      )}
    </div>
  );
}

function getNutrientsForConditions(conditions){
  var seen={};var result=[];
  conditions.forEach(function(c){
    var list=CONDITION_NUTRIENTS[c]||[];
    list.forEach(function(n){
      if(!seen[n.key]){seen[n.key]=true;result.push({...n});}
    });
  });
  if(result.length===0)return CONDITION_NUTRIENTS["default"];
  // Always include water if not already there
  if(!seen["water_l"]&&!seen["water_glasses"]){
    result.push({key:"water_l",label:"Water",unit:"L",target:2.0,isMax:false,color:"#90caf9",why:"Essential hydration"});
  }
  return result;
}

    </div>
  );

  const today=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  // FIX #5: Shortened tab labels to prevent overlap
  const TABS=[
    {id:"today",label:"Today"},
    {id:"history",label:"History"},
    {id:"exercise",label:"Exercise"},
    {id:"skincare",label:"Skin"},
    {id:"meds",label:"Meds"},
    {id:"scan",label:"📷 Scan"},
    {id:"sleep",label:"Sleep"},
    {id:"injections",label:"Proced."},
    {id:"medical",label:"Medical"},
    {id:"pantry",label:"Pantry"},
    {id:"salus",label:"Salus ✦"},
    {id:"profile",label:"Profile"},
  ];

  return(
    <>
      <style>{STYLE}</style>
      <div className="app">
        <div className="header">
          <div><div style={{fontSize:9,color:"var(--ink3)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:3}}>{profile.name?"Your Nutrition":"NutriCoach"}</div><div className="header-title">{profile.name||"NutriCoach"}</div></div>
          <div style={{textAlign:"right"}}><div className="header-date">{today}</div><div style={{fontSize:8,color:"var(--ink3)",letterSpacing:".08em",marginTop:2}}>v1.13</div></div>
        </div>
        <nav className="nav">{TABS.map(t=><button key={t.id} className={`nav-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}</nav>
        {tab==="today"&&<TodayTab foodLog={foodLog} setFoodLog={setFoodLog} water={water} setWater={setWater} profile={profile} master={master} takenToday={takenToday} setTakenToday={setTakenToday} exLogs={exLogs} pantry={pantry}/>}
        {tab==="history"&&<HistoryTab sleepLog={sleepLog}/>}
        {tab==="exercise"&&<ExerciseTab exLogs={exLogs} setExLogs={setExLogs}/>}
        {tab==="skincare"&&<SkincareTab skChecks={skChecks} setSkChecks={setSkChecks} skinProducts={skinProducts} setSkinProducts={setSkinProducts}/>}
        {tab==="meds"&&<MedsTab master={master} setMaster={setMaster}/>}
        {tab==="scan"&&<ScanTab profile={profile} onSave={handleScanSave} skinProducts={skinProducts} setSkinProducts={setSkinProducts}/>}
        {tab==="sleep"&&<SleepTab sleepLog={sleepLog} setSleepLog={setSleepLog} master={master} takenToday={takenToday}/>}
        {tab==="injections"&&<InjectionsTab injections={injections} setInjections={setInjections}/>}
        {tab==="medical"&&<MedicalTab medical={medical} setMedical={setMedical} medDocs={medDocs} setMedDocs={setMedDocs} profile={profile} setProfile={setProfile}/>}
        {tab==="pantry"&&<PantryTab pantry={pantry} setPantry={setPantry}/>}
        {tab==="salus"&&<CoachTab profile={profile} foodLog={foodLog} pantry={pantry} water={water} master={master} takenToday={takenToday} exLogs={exLogs} medical={medical} sleepLog={sleepLog} skChecks={skChecks} injections={injections} setFoodLog={setFoodLog} setWater={setWater} setExLogs={setExLogs} setSleepLog={setSleepLog} setMaster={setMaster} setTakenToday={setTakenToday}/>}
        {tab==="profile"&&<ProfileTab profile={profile} setProfile={setProfile} onRedo={()=>{store.set("onboarded",null);setOnboarded(false);}}/>}

        {/* Floating Salus button — visible on every tab except salus itself */}
        {tab!=="salus"&&(
          <button
            onClick={()=>setSalusOpen(true)}
            style={{
              position:"fixed",bottom:24,right:20,
              width:56,height:56,borderRadius:"50%",
              background:"var(--green)",color:"white",
              border:"none",cursor:"pointer",
              fontSize:22,
              boxShadow:"0 4px 20px rgba(44,74,62,.35)",
              display:"flex",alignItems:"center",justifyContent:"center",
              zIndex:200,
              transition:"transform .2s"
            }}
            title="Talk to Salus"
          >
            ✦
          </button>
        )}
      {salusOpen&&<SalusOverlay
          onClose={()=>setSalusOpen(false)}
          profile={profile}
          foodLog={foodLog}
          pantry={pantry}
          water={water}
          master={master}
          takenToday={takenToday}
          exLogs={exLogs}
          medical={medical}
          sleepLog={sleepLog}
          skChecks={skChecks}
          injections={injections}
          setFoodLog={setFoodLog}
          setWater={setWater}
          setExLogs={setExLogs}
          setSleepLog={setSleepLog}
          setMaster={setMaster}
          setTakenToday={setTakenToday}
        />}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
