function getProteinTarget(exLogs){
  if(!exLogs||!exLogs.length)return 65;
  const best=exLogs.reduce((m,e)=>{
    const a=ACTIVITIES.find(x=>x.id===e.activityId);
    const score={recovery:0,light:1,moderate:2,intense:3}[a?.intensity||"recovery"]||0;
    return Math.max(m,score);
  },0);
  return[65,75,80,90][best];
}
function getCalTarget(exLogs,base=1800){
  if(!exLogs||!exLogs.length)return base;
  const burned=exLogs.reduce((s,e)=>{const a=ACTIVITIES.find(x=>x.id===e.activityId);return s+(a?a.cal:0);},0);
  return base+Math.round(burned*0.6);
}
function computeTotals(fl){
  const t={sodium:0,calcium:0,calories:0,protein:0,potassium:0,magnesium:0};
  for(const f of fl)if(f.nutrients)for(const k of Object.keys(t))t[k]+=f.nutrients[k]||0;
  return t;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function fetchWithTimeout(url, options, timeoutMs=25000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const r = await fetch(url, {...options, signal: controller.signal});
    clearTimeout(timer);
    return r;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === "AbortError") throw new Error("Request timed out — please try again");
    throw e;
  }
}

async function callClaude(messages, system, retries=3) {
  for (let i = 0; i < retries; i++) {
    try {
      if (i > 0) await sleep(3000 * i);
      const r = await fetchWithTimeout("/.netlify/functions/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 1000, system, messages }),
      });
      if (!r.ok) {
        const err = await r.text();
        if (i < retries-1) { await sleep(3000); continue; }
        return "⚠️ Server error " + r.status + " — tap Add to try again";
      }
      const d = await r.json();
      if (d.error) {
        if (i < retries-1) { await sleep(5000); continue; }
        return "Error: " + d.error.message;
      }
      return d.content?.[0]?.text || "No response.";
    } catch(e) {
      if (i === retries-1) return "⚠️ " + e.message + " — tap Add to try again";
      await sleep(3000);
    }
  }
}

async function callClaudeWithImages(images, textPrompt, system, retries=3) {
  for (let i = 0; i < retries; i++) {
    try {
      if (i > 0) await sleep(3000 * i);
      const content = [
        ...images.map(img => ({ type:"image", source:{ type:"base64", media_type:img.mediaType, data:img.b64 }})),

      ];
      const r = await fetchWithTimeout("/.netlify/functions/claude", {

        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model:"claude-haiku-4-5-20251001", max_tokens:1200, system, messages:[{role:"user",content}] }),
      });
      if (!r.ok) { if(i<retries-1){await sleep(3000);continue;} return "⚠️ Server error "+r.status; }
      const d = await r.json();
      if (d.error) { if(i<retries-1){await sleep(5000);continue;} return "Error: "+d.error.message; }
      return d.content?.[0]?.text || "No response.";
    } catch(e) { if(i===retries-1) return "⚠️ "+e.message; await sleep(3000); }
  }
}

function chkKP(d){
  var dl=d.toLowerCase();
  for(var i=0;i<KP.length;i++){
    var p=KP[i];
    for(var j=0;j<p.n.length;j++){
      if(dl.indexOf(p.n[j])!==-1){
        var oz=null,oz2=dl.indexOf("oz");
        if(oz2!==-1){var pt=dl.slice(0,oz2).trim().split(" ");var ln=parseFloat(pt[pt.length-1]);if(!isNaN(ln))oz=ln;}
        var m=oz?oz/8:1;
        var v=p.c||p.s||p.cn||{};
        return{name:d,sodium:Math.round((v.na||0)*m),calcium:Math.round((v.ca||0)*m),calories:Math.round((v.cal||0)*m),protein:Math.round((v.pr||0)*m*10)/10,potassium:0,magnesium:0,oxalate:"low",notes:"Label values"+(oz?" ("+oz+"oz)":"")};
      }
    }
  }
  return null;
}

function safeParseJSON(raw) {
  if (!raw) return null;
  // Strip markdown fences and whitespace
  let cleaned = raw.replace(/```json|```/g, "").trim();
  // Extract first JSON object
  const s = cleaned.indexOf("{"); const e = cleaned.lastIndexOf("}");
  if (s === -1 || e === -1) return null;
  try { return JSON.parse(cleaned.slice(s, e+1)); } catch {}
  // Try fixing common issues: trailing commas, single quotes
  try {
    const fixed = cleaned.slice(s, e+1)
      .replace(/,\s*([}\]])/g, "$1")
      .replace(/'/g, '"');
    return JSON.parse(fixed);
  } catch { return null; }
}

function fuzzyMatch(a, b) {
  const al=a.toLowerCase(); const bl=b.toLowerCase();
  if(al.includes(bl)||bl.includes(al))return true;
  const aw=al.split(/\s+/).filter(w=>w.length>3);
  const bw=bl.split(/\s+/).filter(w=>w.length>3);
  return aw.filter(w=>bw.some(bwi=>bwi.includes(w)||w.includes(bwi))).length>=1;
}

function chkTodayLog(desc, foodLog) {
  if(!foodLog||!foodLog.length)return null;
  for(const entry of [...foodLog].reverse()){
    if(entry.nutrients&&fuzzyMatch(desc,entry.name)){
      // Use nutrients from earlier entry, but keep the name the user just typed
      return{...entry.nutrients,name:desc,oxalate:entry.oxalate||"low",notes:"Nutrition matched today\'s earlier entry for "+entry.name.slice(0,40)};
    }
  }
  return null;
}

function chkPantryMatch(desc, pantry) {
  if(!pantry||!pantry.length)return null;
  for(const item of pantry){if(fuzzyMatch(desc,item.name))return item;}
  return null;
}

const NUTRITION_SYS=`You are a nutrition database. Pescatarian only - no meat.
Respond with ONLY a raw JSON object, no markdown, no backticks:
{"name":"display name","sodium":number,"calcium":number,"calories":number,"protein":number,"potassium":number,"magnesium":number,"oxalate":"low","notes":"one sentence"}
All values in mg except calories(kcal) and protein(g). oxalate must be "low", "med", or "high".`;

async function parseFood(desc, pantry, foodLog) {
  const logMatch=chkTodayLog(desc,foodLog);if(logMatch)return logMatch;
  var kp=chkKP(desc);if(kp)return kp;
  const pantryItem=chkPantryMatch(desc,pantry);
  const query=pantryItem?`${desc} (brand: ${pantryItem.name}${pantryItem.qty?" - "+pantryItem.qty:""})`:desc;
  try {
    const raw=await callClaude([{role:"user",content:`Nutrition for: ${query}`}],NUTRITION_SYS);
    if(!raw||raw.startsWith("⚠️")||raw.startsWith("Error"))return{error:raw||"Failed"};
    const parsed=safeParseJSON(raw);
    if(!parsed)return{error:"Could not parse - try again"};
    if(pantryItem)parsed.notes=(parsed.notes||"")+` (pantry: ${pantryItem.name})`;
    return parsed;
  } catch(e){return{error:"Try again - "+e.message};}
}

async function parseFoodCombined(text, photos, pantry, foodLog) {
  if(photos.length===0)return parseFood(text,pantry,foodLog);
  if(text.trim()){const kp=chkKP(text);if(kp)return kp;}
  const pantryItem=chkPantryMatch(text,pantry);
  const sys=`You are a nutrition database. Pescatarian only - no meat.
IMPORTANT: If a nutrition label photo is included, use those EXACT values - do not estimate.
If multiple photos (front + label), use both to identify product and get label values.
Include ALL foods mentioned in the description - add their nutrition to the total.
Respond with ONLY a raw JSON object, no markdown, no backticks:
{"name":"full meal description","sodium":number,"calcium":number,"calories":number,"protein":number,"potassium":number,"magnesium":number,"oxalate":"low","notes":"one sentence"}
All values in mg except calories(kcal) and protein(g). oxalate must be "low", "med", or "high".`;
  const brandHint=pantryItem?` This may be: ${pantryItem.name}.`:"";
  const prompt=text.trim()
    ?`Photos show the product(s).${brandHint} I had: "${text}". Use label photo for exact values. Include everything I described.`
    :`Identify all food in the photo(s).${brandHint} Return combined nutrition.`;
  try {
    const raw=await callClaudeWithImages(photos,prompt,sys);
    if(!raw||raw.startsWith("⚠️")||raw.startsWith("Error"))return{error:raw||"Failed"};
    const parsed=safeParseJSON(raw);
    if(!parsed)return{error:"Could not parse - try again"};
    return parsed;
  } catch(e){return{error:"Try again - "+e.message};}
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("fail"));
    r.readAsDataURL(file);
  });
}

// Compress image to max ~800px wide and quality 0.75 before sending
function compressImage(file, maxWidth=800, quality=0.75) {
  return new Promise((res) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const b64 = canvas.toDataURL("image/jpeg", quality).split(",")[1];
        res({ b64, mediaType: "image/jpeg" });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function useVoice(onResult){
  const [listening,setListening]=useState(false);
  const recRef=useRef(null);
  function startListening(){
    const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SpeechRecognition){alert("Voice input not supported on this browser. Use Safari on iPhone.");return;}
    const rec=new SpeechRecognition();
    rec.lang="en-US";rec.continuous=false;rec.interimResults=false;
    rec.onresult=e=>{const t=e.results[0][0].transcript;onResult(t);setListening(false);};
    rec.onerror=()=>setListening(false);
    rec.onend=()=>setListening(false);
    rec.start();recRef.current=rec;setListening(true);
  }
  function stopListening(){recRef.current?.stop();setListening(false);}
  return{listening,startListening,stopListening};
}

  .loading-spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .typing-dot{display:inline-block;width:5px;height:5px;background:var(--green2);border-radius:50%;animation:bounce 1.2s infinite;margin-right:2px}
  .typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .empty-state{text-align:center;padding:24px;color:var(--ink3);font-size:11px}
  .empty-icon{font-size:26px;margin-bottom:6px}
  select.text-input{appearance:none;cursor:pointer}
  textarea.text-input{resize:vertical}
  @media(max-width:500px){.nutrient-grid,.target-grid,.ex-grid{grid-template-columns:1fr}}
`;

// ─── TODAY TAB ────────────────────────────────────────────────────────────────
// EditNameArea — textarea with autoFocus and cursor at end
function EditNameArea({value, onChange}){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;
    if(!el)return;
    const t=setTimeout(()=>{
      el.focus();
      const len=el.value.length;
      el.setSelectionRange(len,len);
    },60);
    return()=>clearTimeout(t);
  },[]);
  return(
    <textarea
      ref={ref}
      rows={3}
      className="text-input"
      style={{width:"100%",minHeight:72,resize:"none",fontSize:12,lineHeight:1.5,marginBottom:4}}
      value={value}
      onChange={e=>onChange(e.target.value)}
    />
  );
}

function TodayTab({foodLog,setFoodLog,water,setWater,profile,master,takenToday,setTakenToday,exLogs,pantry}){
  const[foodInput,setFoodInput]=useState("");
  const[parsing,setParsing]=useState(false);
  const[parseResult,setParseResult]=useState(null);
  const[meal,setMeal]=useState("breakfast");
  const[coachTip,setCoachTip]=useState(null);
  const[editingId,setEditingId]=useState(null);
  const[editEntry,setEditEntry]=useState(null);
  // FIX #1 & #3: Staged photos for combined entry
  const[stagedPhotos,setStagedPhotos]=useState([]);

  const totals=computeTotals(foodLog);
  const proteinTarget=getProteinTarget(exLogs);
  const calTarget=getCalTarget(exLogs,profile.targets.calories);
  const targets=profile.targets;
  const pct=(v,m)=>Math.min(100,Math.round((v/m)*100));
  const barClass=(v,m,isMax=false)=>{const p=pct(v,m);if(isMax)return p>90?"bar-over":p>70?"bar-warn":"bar-ok";return"bar-ok";};

  const{listening,startListening,stopListening}=useVoice(text=>{setFoodInput(p=>p?p+" "+text:text);});

  function toggleTaken(id){const u={...takenToday,[id]:!takenToday[id]};setTakenToday(u);store.set("taken-"+todayKey(),u);}

  async function stagePhotos(files){
    const newPhotos=await Promise.all(Array.from(files).map(async f=>{
      const compressed=await compressImage(f);
      return{...compressed,preview:URL.createObjectURL(f)};
    }));
    setStagedPhotos(p=>[...p,...newPhotos]);
  }
  function removePhoto(idx){setStagedPhotos(p=>p.filter((_,i)=>i!==idx));}

  async function handleAddFood(){
    const text=foodInput.trim();
    if(!text && stagedPhotos.length===0) return;
    setParsing(true);setParseResult(null);setCoachTip(null);
    // FIX #3: Combined photo + text
    const result=await parseFoodCombined(text, stagedPhotos, pantry, foodLog);
    if(!result||result.error){
      setParseResult({error: result?.error || "API call failed — tap Add to retry"});
      setParsing(false);
      return;
    }
    if(result&&result.name){
      const mealLabel={breakfast:"🌅",lunch:"☀️",dinner:"🌙",snack:"🍎"}[meal]||"";
      const entry={id:Date.now(),name:result.name||text||"Food",meal,mealLabel,
        time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
        nutrients:{sodium:result.sodium||0,calcium:result.calcium||0,calories:result.calories||0,protein:result.protein||0,potassium:result.potassium||0,magnesium:result.magnesium||0},
        oxalate:result.oxalate||"low",notes:result.notes};
      const u=[...foodLog,entry];
      setFoodLog(u);store.set("food-log-"+todayKey(),u);
      setParseResult(result);
      setFoodInput("");
      setStagedPhotos([]); // FIX: clear staged photos after logging
      const newTotals=computeTotals(u);
      getCoachTip(result.name,newTotals,profile.targets,proteinTarget).then(tip=>{if(tip)setCoachTip(tip);});
    }
    setParsing(false);
  }

  // FIX #2: Clear coachTip when removing last food item
  function removeFood(id){
    const u=foodLog.filter(f=>f.id!==id);
    setFoodLog(u);
    store.set("food-log-"+todayKey(),u);
    if(u.length===0) setCoachTip(null);
  }

  const progToday=isProgDay(todayKey());
  const daysUntil=daysUntilProg(todayKey());
  const todayActivity=exLogs&&exLogs.length?exLogs.map(e=>ACTIVITIES.find(a=>a.id===e.activityId)?.name).filter(Boolean).join(", "):null;

  const supps=master.filter(m=>m.category==="supplement");
  const meds=master.filter(m=>m.category==="medication");

  return(
    <div className="section">
      <div className="day-ribbon">
        <div><div className="ribbon-label">Calories</div><div className="ribbon-val">{totals.calories}<span style={{fontSize:13,opacity:.7}}> / {calTarget}</span></div></div>
        <div style={{textAlign:"center"}}><div className="ribbon-label">Sodium</div><div className="ribbon-val">{totals.sodium}<span style={{fontSize:13,opacity:.7}}>mg</span></div></div>
        <div style={{textAlign:"right"}}><div className="ribbon-label">Protein</div><div className="ribbon-val">{totals.protein}<span style={{fontSize:13,opacity:.7}}>g / {proteinTarget}g</span></div></div>
      </div>

      <div className="status-strip">
        {progToday
          ?<div className="status-pill prog">🌙 Progesterone day</div>
          :daysUntil!==null?<div className="status-pill prog-off">🌙 Progesterone in {daysUntil}d</div>:null}
        {todayActivity&&<div className="status-pill ex">💪 {todayActivity}</div>}
        <div className="status-pill protein">🐟 Protein target: {proteinTarget}g</div>
      </div>

      <div className="water-track">
        <div style={{minWidth:72}}>
          <div className="water-label">Water</div>
          <div className="water-count">
            {(water*(targets.water_glass_oz||8)/128).toFixed(1)}<span style={{fontSize:10,color:"var(--green2)"}}>L</span>
          </div>
          <div style={{fontSize:9,color:"var(--green2)"}}>{water} / {targets.water_glasses} glasses</div>
          <div style={{fontSize:8,color:"var(--ink3)",marginTop:1}}>{targets.water_glass_oz||8}oz each</div>
        </div>
        <div className="water-glasses">
          {Array.from({length:targets.water_glasses}).map((_,i)=>(
            <button key={i} className={`water-glass ${i<water?"filled":""}`} onClick={()=>{const n=i<water?i:i+1;setWater(n);store.set("water-"+todayKey(),n);}}/>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          <button className="btn btn-primary btn-sm" onClick={()=>{const n=Math.min(targets.water_glasses,water+1);setWater(n);store.set("water-"+todayKey(),n);}}>+ Glass</button>
          <button className="btn btn-outline btn-sm" onClick={()=>{setWater(0);store.set("water-"+todayKey(),0);}}>Reset</button>
        </div>
      </div>

      <div className="cat-label">Supplements — tap when taken</div>
      {supps.map(item=>{
        const taken=!!takenToday[item.id];
        const syns=taken&&item.synergies?item.synergies.map(syn=>{const cur=totals[syn.nutrient]||0;const met=cur>=syn.threshold;const pctVal=Math.min(100,Math.round((cur/syn.threshold)*100));return{...syn,cur,met,pctVal};}):[];
        return(
          <div key={item.id} className={`master-item ${taken?"taken":""}`}>
            <div className="master-header" onClick={()=>toggleTaken(item.id)}>
              <div className={`master-check ${taken?"checked":""}`}>{taken?"✓":""}</div>
              <div style={{flex:1}}><div className="master-name">{item.name}</div>{item.dose&&<div className="master-dose">{item.dose}</div>}</div>
              <div className="master-dose">{item.time}</div>
            </div>
            {item.notes&&<div className={`master-notes ${item.notes.includes("⚠")||item.notes.includes("paused")?"warn":""}`}>{item.notes}</div>}
            {taken&&syns.length>0&&(
              <div className="supp-synergies">
                <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:3}}>Food cofactors needed today</div>
                {syns.map((syn,i)=>(
                  <div key={i} className={`synergy-alert ${syn.met?"met":"unmet"}`}>
                    <div style={{fontSize:14,flexShrink:0}}>{syn.met?"✅":"⚡"}</div>
                    <div style={{flex:1}}>
                      <div className="syn-label">{syn.label}</div>
                      <div className="syn-why">{syn.why}</div>
                      {!syn.met&&<div className="syn-foods">Sources: {syn.foods}</div>}
                      <div className="syn-bar-track"><div className={`syn-bar-fill ${syn.met?"met":"unmet"}`} style={{width:syn.pctVal+"%"}}/></div>
                      <div className="syn-pct">{syn.cur}{syn.nutrient.includes("_mg")?"mg":"g"} of {syn.threshold}{syn.nutrient.includes("_mg")?"mg":"g"} — {syn.pctVal}%{syn.met?" ✓":""}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}

      <div className="cat-label">Medications <span className="cat-badge">as needed</span></div>
      {meds.map(item=>{
        const taken=!!takenToday[item.id];
        return(
          <div key={item.id} className={`master-item medication ${taken?"taken":""}`}>
            <div className="master-header" onClick={()=>toggleTaken(item.id)}>
              <div className={`master-check ${taken?"checked":""}`}>{taken?"✓":""}</div>
              <div style={{flex:1}}><div className="master-name">{item.name}</div>{item.dose&&<div className="master-dose">{item.dose}</div>}</div>
              <div className="master-dose">{item.time}</div>
            </div>
            {item.notes&&<div className={`master-notes ${item.notes.includes("⚠")?"warn":""}`}>{item.notes}</div>}
          </div>
        );
      })}

      <div className="nutrient-grid" style={{marginTop:16}}>
        {[
          {key:"sodium",label:"Sodium",val:totals.sodium,max:targets.sodium_mg,unit:"mg",isMax:true,note:"≤"+targets.sodium_mg+"mg"},
          {key:"calcium",label:"Calcium",val:totals.calcium,max:targets.calcium_mg,unit:"mg",note:"always with meals"},
          {key:"magnesium",label:"Magnesium",val:totals.magnesium,max:targets.magnesium_mg,unit:"mg",note:"activates Vit D"},
          {key:"protein",label:"Protein",val:totals.protein,max:proteinTarget,unit:"g",note:"target: "+proteinTarget+"g today"},
        ].map(n=>(
          <div className="nutrient-card" key={n.key}>
            <div className="nutrient-name">{n.label}</div>
            <div className="nutrient-value">{n.val} <span>{n.unit}</span></div>
            <div className="bar-track"><div className={`bar-fill ${barClass(n.val,n.max,n.isMax)}`} style={{width:pct(n.val,n.max)+"%"}}/></div>
            <div className="nutrient-note">{n.note}</div>
          </div>
        ))}
      </div>

      <p className="section-title" style={{marginTop:18}}>Today's food</p>
      {foodLog.length===0?(<div className="empty-state"><div className="empty-icon">🥗</div><div>Nothing logged yet</div></div>):(
        <div className="food-log">
          {foodLog.map(f=>{
            const isEditing=editingId===f.id&&editEntry;
            return(
            <div className="food-entry" key={f.id} style={{flexDirection:"column",gap:6}}>
              {/* Header row — always visible */}
              <div style={{display:"flex",alignItems:"flex-start",gap:11,width:"100%"}}>
                <div className="food-time"><div>{f.mealLabel||""}</div><div>{f.time}</div></div>
                <div className="food-info" style={{flex:1}}>
                  {isEditing?(
                    /* EDIT MODE — textarea expands inside card */
                    <EditNameArea
                      value={editEntry.name}
                      onChange={v=>setEditEntry({...editEntry,name:v})}
                    />
                  ):(
                    <div className="food-name">{f.name}</div>
                  )}
                  {!isEditing&&(
                    <>
                      <div className="food-macros">
                        {f.nutrients?.calories>0&&<span className="macro-tag">{f.nutrients.calories} kcal</span>}
                        {f.nutrients?.sodium>0&&<span className={`macro-tag ${f.nutrients.sodium>400?"warn":""}`}>Na {f.nutrients.sodium}mg</span>}
                        {f.nutrients?.calcium>0&&<span className="macro-tag">Ca {f.nutrients.calcium}mg</span>}
                        {f.nutrients?.magnesium>0&&<span className="macro-tag hi">Mg {f.nutrients.magnesium}mg</span>}
                        {f.nutrients?.protein>0&&<span className="macro-tag">{f.nutrients.protein}g prot</span>}
                        {f.oxalate&&<span className={`ox-${f.oxalate}`}>ox {f.oxalate}</span>}

                <div style={{display:"flex",gap:2,flexShrink:0}}>

                <div style={{paddingLeft:43}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:6}}>
                    {[["calories","kcal"],["sodium","Na mg"],["calcium","Ca mg"],["protein","prot g"],["magnesium","Mg mg"],["potassium","K mg"]].map(([key,label])=>(
                      <div key={key} style={{display:"flex",alignItems:"center",gap:4}}>
                        <span style={{fontSize:9,color:"var(--ink3)",minWidth:36}}>{label}</span>
                        <input type="number" className="text-input" style={{flex:1,padding:"4px 6px",fontSize:11}}

                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:4,marginBottom:6}}>
                    {["low","med","high"].map(ox=>(
                      <button key={ox} onClick={()=>setEditEntry({...editEntry,oxalate:ox})}
                        style={{flex:1,padding:"4px",fontSize:9,border:"1px solid",borderRadius:6,cursor:"pointer",fontFamily:"monospace",
                          background:editEntry.oxalate===ox?"var(--green)":"white",
                          color:editEntry.oxalate===ox?"white":"var(--ink3)",
                          borderColor:editEntry.oxalate===ox?"var(--green)":"var(--border)"}}>ox {ox}</button>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:5}}>
                    <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={()=>{

                      setFoodLog(u);store.set("food-log-"+todayKey(),u);setEditingId(null);setEditEntry(null);
                    }}>Save</button>
                    <button className="btn btn-outline btn-sm" onClick={()=>{setEditingId(null);setEditEntry(null);}}>Cancel</button>

          })}
        </div>
      )}

      {/* FIX #2: Only show coachTip if there's food logged */}
      {coachTip && foodLog.length>0 &&(
        <div style={{background:"var(--green3)",border:"1px solid var(--green2)",borderRadius:10,padding:"11px 14px",marginBottom:10,fontSize:11,color:"var(--green)",lineHeight:1.6}}>
          <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--green2)",marginBottom:4}}>Coach tip</div>
          {coachTip}
        </div>
      )}

      {/* ADD FOOD — FIX #1 #3: Multi-photo + combined */}
      <div className="add-food-area">
        <div className="add-food-title">Add food</div>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          {["breakfast","lunch","dinner","snack"].map(m=>(
            <button key={m} onClick={()=>setMeal(m)} style={{flex:1,padding:"5px 4px",fontSize:9,letterSpacing:".06em",textTransform:"uppercase",border:"1px solid",borderRadius:6,cursor:"pointer",fontFamily:"'DM Mono',monospace",background:meal===m?"var(--green)":"white",color:meal===m?"white":"var(--ink3)",borderColor:meal===m?"var(--green)":"var(--border)"}}>
              {{"breakfast":"🌅","lunch":"☀️","dinner":"🌙","snack":"🍎"}[m]} {m}
            </button>
          ))}
        </div>

        {/* FIX #1 #3: Photo strip — add multiple, preview, remove */}
        <div className="photo-strip">
          {stagedPhotos.map((p,i)=>(
            <div className="photo-thumb" key={i}>
              <img src={p.preview} alt=""/>
              <button className="photo-thumb-remove" onClick={()=>removePhoto(i)}>×</button>
            </div>
          ))}
          <div className="photo-add-btn">
            <span>📷</span>
            <span className="photo-add-label">Add photo</span>
            <input type="file" accept="image/*" multiple onChange={e=>{stagePhotos(e.target.files);e.target.value="";}} disabled={parsing}/>
          </div>
        </div>

        <div className="input-row">
          <input className="text-input add-food-input" style={{flex:1}}
            placeholder={stagedPhotos.length>0?"Describe portions or add detail…":"Describe what you ate…"}
            value={foodInput}
            onChange={e=>setFoodInput(e.target.value)}
            onCompositionEnd={e=>setFoodInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleAddFood()}/>
          <button className={`mic-btn ${listening?"listening":"idle"}`} onClick={listening?stopListening:startListening}>
            {listening?"🔴":"🎤"}
          </button>
          <button className="btn btn-primary" onClick={handleAddFood} disabled={parsing||(!foodInput.trim()&&stagedPhotos.length===0)}>
            {parsing?<span className="loading-spin"/>:"Add"}
          </button>
        </div>
        <div className="add-note">
          {stagedPhotos.length>0
            ?`${stagedPhotos.length} photo${stagedPhotos.length>1?"s":""} staged — add text if needed, then tap Add`
            :"Type 🎤 speak, or 📷 add photos (multiple ok), then tap Add"}
        </div>

        {parseResult&&parseResult.error&&(
          <div style={{background:"var(--terra2)",border:"1px solid var(--terra)",borderRadius:8,padding:"9px 12px",marginTop:7,fontSize:11,color:"var(--terra)"}}>
            ⚠️ {parseResult.error}
          </div>
        )}
        {parseResult&&!parseResult.error&&(
          <div className="parse-result">
            ✓ <strong>{parseResult.name}</strong> — {parseResult.calories} kcal · Na {parseResult.sodium}mg · Ca {parseResult.calcium}mg · Mg {parseResult.magnesium}mg · ox {parseResult.oxalate}
            {parseResult.notes&&<><br/><span style={{color:"var(--ink3)"}}>{parseResult.notes}</span></>}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── EXERCISE TAB — FIX #7: Walking distance ─────────────────────────────────
function ExerciseTab({exLogs,setExLogs}){
  const[customDur,setCustomDur]=useState({});
  const[distance,setDistance]=useState({});
  const[distUnit,setDistUnit]=useState({});

  function logActivity(act){
    const dur=customDur[act.id]||act.duration;
    const dist=distance[act.id]||"";
    const unit=distUnit[act.id]||"blocks";
    const entry={id:Date.now(),activityId:act.id,duration:dur,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
      ...(act.hasDistance&&dist?{distance:dist,distanceUnit:unit}:{})};
    const u=[...exLogs,entry];setExLogs(u);store.set("ex-"+todayKey(),u);
  }
  function removeEx(id){const u=exLogs.filter(e=>e.id!==id);setExLogs(u);store.set("ex-"+todayKey(),u);}

  const proteinTarget=getProteinTarget(exLogs);
  const calBurned=exLogs.reduce((s,e)=>{const a=ACTIVITIES.find(x=>x.id===e.activityId);return s+(a?a.cal:0);},0);

  return(
    <div className="section">
      <p className="section-title">Exercise</p>
      {exLogs.length>0&&(
        <div className="day-ribbon" style={{marginBottom:14}}>
          <div><div className="ribbon-label">Protein target today</div><div className="ribbon-val">{proteinTarget}g</div></div>
          <div style={{textAlign:"center"}}><div className="ribbon-label">Cal burned</div><div className="ribbon-val">{calBurned}</div></div>
          <div style={{textAlign:"right"}}><div className="ribbon-label">Sessions</div><div className="ribbon-val">{exLogs.length}</div></div>
        </div>
      )}
      {exLogs.length>0&&(
        <div style={{marginBottom:14}}>
          <div className="cat-label">Today's sessions</div>
          {exLogs.map(e=>{
            const act=ACTIVITIES.find(a=>a.id===e.activityId);
            if(!act)return null;
            return(
              <div className="ex-log-item" key={e.id}>
                <span style={{fontSize:20}}>{act.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"var(--ink)"}}>{act.name}</div>
                  <div style={{fontSize:10,color:"var(--ink3)"}}>
                    {e.time} · {e.duration}min
                    {e.distance&&` · ${e.distance} ${e.distanceUnit}`}
                    {` · ${act.cal} cal · protein target ${act.protein}g`}
                  </div>
                  {act.notes&&<div style={{fontSize:10,color:"var(--ink3)",fontStyle:"italic"}}>{act.notes}</div>}
                </div>
                <button className="food-delete" onClick={()=>removeEx(e.id)}>×</button>
              </div>
            );
          })}
        </div>
      )}
      <div className="cat-label">Log a session</div>
      <div className="ex-grid">
        {ACTIVITIES.map(act=>{
          const alreadyLogged=exLogs.some(e=>e.activityId===act.id);
          return(
            <div key={act.id} className={`ex-card ${alreadyLogged?"logged":""}`}>
              <div className="ex-emoji">{act.emoji}</div>
              <div className="ex-name">{act.name}</div>
              <div className="ex-detail">{act.duration}min · {act.cal>0?act.cal+"cal":"recovery"}</div>
              <div style={{display:"flex",alignItems:"center",gap:4,marginTop:8,justifyContent:"center"}}>
                <input type="number" className="text-input" style={{width:46,padding:"4px 5px",fontSize:11,textAlign:"center"}}
                  placeholder={act.duration} value={customDur[act.id]||""}
                  onChange={e=>setCustomDur({...customDur,[act.id]:Number(e.target.value)||act.duration})}/>
                <span style={{fontSize:9,color:"var(--ink3)"}}>min</span>
              </div>
              {/* FIX #7: Distance input for walking */}

const NUTRITIONIX_APP_KEY = "YOUR_APP_KEY";

function usdaConfigured(){ return USDA_API_KEY !== "YOUR_USDA_KEY"; }
function nutritionixConfigured(){ return NUTRITIONIX_APP_ID !== "YOUR_APP_ID" && NUTRITIONIX_APP_KEY !== "YOUR_APP_KEY"; }

// 1. USDA FoodData Central (primary — US government, very accurate for US branded products)
async function lookupUSDA(barcode){
  try{
    const key=usdaConfigured()?USDA_API_KEY:"DEMO_KEY";
    const r=await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${barcode}&dataType=Branded&api_key=${key}&pageSize=1`);
    if(!r.ok)return null;
    const d=await r.json();
    const item=d.foods&&d.foods[0];
    if(!item)return null;
    // Extract nutrients by nutrient number
    const nuts=item.foodNutrients||[];
    const get=(id)=>{const n=nuts.find(x=>x.nutrientId===id||x.nutrientNumber===String(id));return n?n.value||0:0;};
    // USDA nutrient IDs: 1008=calories, 1093=sodium, 1087=calcium, 1003=protein, 1092=potassium, 1090=magnesium, 1004=fat, 1079=fiber
    const servG=parseFloat(item.servingSize)||100;
    const f=servG/100;
    return{
      product_name:item.description||"Unknown product",
      brand:item.brandOwner||item.brandName||"",
      barcode,
      serving:item.servingSize?(item.servingSize+(item.servingSizeUnit||"g")):"",
      calories:Math.round(get(1008)*f)||Math.round(get("208")*f),
      sodium:Math.round(get(1093)*f)||Math.round(get("307")*f),
      calcium:Math.round(get(1087)*f)||Math.round(get("301")*f),
      protein:Math.round((get(1003)||get("203"))*f*10)/10,
      potassium:Math.round((get(1092)||get("306"))*f),
      magnesium:Math.round((get(1090)||get("304"))*f),
      fat:Math.round((get(1004)||get("204"))*f*10)/10,
      fiber:Math.round((get(1079)||get("291"))*f*10)/10,
      ingredients:item.ingredients||"",
      image:null,
      source:"USDA FoodData",
      per:"serving",
    };
  }catch(e){return null;}
}

// Open Food Facts fallback — fixes nutrient parsing for per-serving accuracy
async function lookupOpenFoodFacts(barcode){
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
    const d=await r.json();
    if(d.status!==1||!d.product)return null;
    const p=d.product;
    const n=p.nutriments||{};
    // Serving size for per-100g conversion
    const servingG=parseFloat(p.serving_quantity)||240;
    const f=servingG/100;
    // Helper: try _serving first, then _100g * factor, minerals stored in g so *1000
    const mg=(sk,pk)=>n[sk]!=null&&n[sk]>0?Math.round(n[sk]*1000):Math.round((n[pk]||0)*f*1000);
    const g=(sk,pk)=>n[sk]!=null&&n[sk]>0?Math.round(n[sk]*10)/10:Math.round((n[pk]||0)*f*10)/10;
    const kcal=n["energy-kcal_serving"]||Math.round((n["energy-kcal_100g"]||0)*f);
    const prot=n["proteins_serving"]!=null&&n["proteins_serving"]>0?Math.round(n["proteins_serving"]*10)/10:Math.round((n["proteins_100g"]||0)*f*10)/10;
    const cal_mg=n["calcium_serving"]!=null&&n["calcium_serving"]>0?Math.round(n["calcium_serving"]*1000):Math.round((n["calcium_100g"]||0)*f*1000);
    const sod=n["sodium_serving"]!=null&&n["sodium_serving"]>0?Math.round(n["sodium_serving"]*1000):Math.round((n["sodium_100g"]||0)*f*1000);
    return{
      product_name:p.product_name||p.product_name_en||"Unknown product",
      brand:p.brands||"",
      barcode,
      serving:p.serving_size||"",
      calories:Math.round(kcal),
      sodium:sod,
      calcium:cal_mg,
      protein:prot,
      potassium:mg("potassium_serving","potassium_100g"),
      magnesium:mg("magnesium_serving","magnesium_100g"),
      fat:g("fat_serving","fat_100g"),
      fiber:g("fiber_serving","fiber_100g"),
      ingredients:p.ingredients_text_en||p.ingredients_text||"",
      image:p.image_front_small_url||null,
      source:"Open Food Facts",
      per:"serving",
    };
  }catch(e){return null;}
}

// Flag suspicious values — prompt user to verify with label photo
function checkSuspiciousValues(product){
  const warnings=[];
  const name=(product.product_name||"").toLowerCase();
  const isMilk=name.includes("milk")||name.includes("soy")||name.includes("oat")||name.includes("almond")||name.includes("kefir")||name.includes("yogurt");
  const isMeat=name.includes("chicken")||name.includes("beef")||name.includes("fish")||name.includes("tuna")||name.includes("salmon");
  if(isMilk&&product.calcium<50) warnings.push("Calcium seems low for a milk product — verify with label");
  if(isMilk&&product.protein<2) warnings.push("Protein seems low — verify with label");
  if(product.calories>0&&product.sodium===0&&!name.includes("water")) warnings.push("Sodium shows 0mg — may be missing from database");
  if(product.calories===0&&product.protein===0) warnings.push("Nutrient data appears incomplete — use label photo for accuracy");
  return warnings;
}

// Main lookup: USDA → Nutritionix → Open Food Facts
async function lookupBarcode(barcode){
  let product=null;
  // 1. USDA FoodData Central (best for US products)
  product=await lookupUSDA(barcode);
  // 2. Nutritionix (when configured)
  if(!product&&nutritionixConfigured()){
    product=await lookupNutritionix(barcode);
  }
  // 3. Open Food Facts (global fallback)
  if(!product){
    product=await lookupOpenFoodFacts(barcode);
  }
  if(!product)return{error:"Product not found in any database. Try scanning the label photo instead."};
  product.warnings=checkSuspiciousValues(product);
  return product;
}

async function getBarcodeVerdict(product){
  const sys=`You are analyzing a food product for Sofia.
Sofia: kidney stones, sodium MUST stay under 1500mg/day total, low oxalate diet, calcium ~1000mg/day WITH meals, pescatarian (no meat).
Return ONLY raw JSON:
{"verdict":"yes"|"caution"|"no","verdict_emoji":"✅"|"⚠️"|"🚫","headline":"one punchy line","reasoning":"2 sentences specific to kidney stone risk","watch_out":"specific concern or null","oxalate":"low"|"med"|"high","serving_advice":"how much is safe or null"}`;
  const msg=`Product: ${product.product_name} by ${product.brand}
Per ${product.per}: ${product.calories}kcal, sodium ${product.sodium}mg, calcium ${product.calcium}mg, protein ${product.protein}g, potassium ${product.potassium}mg
Ingredients: ${(product.ingredients||"").slice(0,300)}
Is this safe for Sofia?`;
  const raw=await callClaude([{role:"user",content:msg}],sys);
  return safeParseJSON(raw)||{verdict:"caution",verdict_emoji:"⚠️",headline:"Could not analyze",reasoning:raw?.slice(0,200)||"",watch_out:null,oxalate:"low",serving_advice:null};
}

  function addItem(){if(!name.trim())return;const u=[...pantry,{id:Date.now(),name:name.trim(),qty:qty.trim(),cat}];setPantry(u);store.set("pantry",u);setName("");setQty("");}

// ─── COACH TAB ───────────────────────────────────────────────────────────────
function CoachTab({profile,foodLog,pantry,water,master,takenToday,exLogs,medical,sleepLog,skChecks,injections}){
  const[messages,setMessages]=useState([{role:"assistant",content:"Hi! I have your full context — conditions, medications, food log, sleep, exercise and upcoming procedures. Everything is connected. Ask me anything."}]);
  const[input,setInput]=useState("");const[loading,setLoading]=useState(false);
  const chatRef=useRef(null);
  const{listening,startListening,stopListening}=useVoice(text=>{setInput(p=>p?p+" "+text:text);});
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[messages]);
  const QUICK=["What should I eat for dinner?","Am I getting enough protein today?","Is my Vitamin D working?","What's missing nutritionally?","Suggest something from my pantry","How's my sodium today?","Can I take Actron today?","What should I buy this week?","How are my kidneys doing nutrition-wise?"];
  async function send(text){
    if(!text.trim()||loading)return;
    const userMsg={role:"user",content:text};const newMsgs=[...(messages||[]),userMsg];
    setMessages(newMsgs);setInput("");setLoading(true);
    const reply=await callClaude(newMsgs.map(m=>({role:m.role,content:m.content})),buildCoachPrompt(profile,foodLog,pantry,water,master,takenToday,exLogs,medical,sleepLog,skChecks,injections));
    setMessages([...newMsgs,{role:"assistant",content:reply}]);setLoading(false);
  }
  function renderText(text){return text.split(/(\*\*[^*]+\*\*)/).map((p,i)=>p.startsWith("**")?<strong key={i}>{p.slice(2,-2)}</strong>:p);}
  return(
    <div className="section">
      <p className="section-title">Nutrition Coach</p>
      <div className="quick-prompts">{QUICK.map((q,i)=><button key={i} className="quick-btn" onClick={()=>send(q)}>{q}</button>)}</div>
      <div className="chat-window" ref={chatRef}>
        {(messages||[]).map((m,i)=>(
          <div key={i} className={`msg msg-${m.role==="user"?"user":"ai"}`}>
            <div className="msg-label">{m.role==="user"?"You":"Coach"}</div>
            <div className="msg-bubble">{renderText(m.content)}</div>
          </div>
        ))}
        {loading&&<div className="msg msg-ai"><div className="msg-label">Coach</div><div className="msg-bubble"><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div></div>}
      </div>
      <div className="chat-input-area">
        <textarea className="chat-input" placeholder="Ask your coach… or tap 🎤" value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}}
          rows={1}/>
        <button className={`mic-btn ${listening?"listening":"idle"}`} onClick={listening?stopListening:startListening}>{listening?"🔴":"🎤"}</button>
        <button className="btn btn-primary" onClick={()=>send(input)} disabled={loading||!input.trim()}>{loading?<span className="loading-spin"/>:"Send"}</button>
      </div>
    </div>
  );
}

  // Pre-fill from existing profile when re-doing setup
  useEffect(()=>{

// ─── SLEEP TAB ────────────────────────────────────────────────────────────────
function SleepTab({sleepLog,setSleepLog,master,takenToday}){
  const[bedtime,setBedtime]=useState("");
  const[waketime,setWaketime]=useState("");
  const[quality,setQuality]=useState(0);
  const[notes,setNotes]=useState("");
  const[showAdd,setShowAdd]=useState(false);
  const[editingSleepId,setEditingSleepId]=useState(null);
  const[editSleep,setEditSleep]=useState(null);

  // Calculate hours slept
  function calcHours(bed,wake){
    if(!bed||!wake)return null;
    const [bh,bm]=bed.split(":").map(Number);
    const [wh,wm]=wake.split(":").map(Number);
    let mins=(wh*60+wm)-(bh*60+bm);
    if(mins<0)mins+=1440; // overnight
    return Math.round(mins/60*10)/10;
  }

  function logSleep(){
    if(!bedtime||!waketime)return;
    const hours=calcHours(bedtime,waketime);
    // Check if sleep aid was marked taken today
    const aidTaken=(master||[]).some(m=>{
      const isSleepAid=m.name.toLowerCase().includes("sleep")||m.name.toLowerCase().includes("melatonin")||m.name.toLowerCase().includes("ambien")||m.name.toLowerCase().includes("kirkland");
      return isSleepAid && takenToday && takenToday[m.id]===true;
    });
    const entry={id:Date.now(),date:todayKey(),bedtime,waketime,hours,quality,notes:notes.trim(),aidTaken};
    const u=[...sleepLog,entry];
    setSleepLog(u);store.set("sleep-log",u);
    setBedtime("");setWaketime("");setQuality(0);setNotes("");setShowAdd(false);
  }

  function removeEntry(id){const u=sleepLog.filter(e=>e.id!==id);setSleepLog(u);store.set("sleep-log",u);}

  // Last 7 entries for chart
  const recent=[...sleepLog].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7).reverse();
  const avgHours=recent.length?Math.round(recent.reduce((s,e)=>s+(e.hours||0),0)/recent.length*10)/10:null;

  const qualityEmoji=["","😴","😐","🙂","😊","⭐️"];
  const hoursColor=(h)=>h>=7?"var(--green2)":h>=5?"var(--gold)":"var(--terra)";

  return(
    <div className="section">
      <p className="section-title">Sleep</p>

      {/* Weekly summary ribbon */}
      {recent.length>0&&(
        <div className="day-ribbon" style={{marginBottom:14}}>
          <div><div className="ribbon-label">Avg this week</div><div className="ribbon-val">{avgHours}h</div></div>
          <div style={{textAlign:"center"}}><div className="ribbon-label">Nights logged</div><div className="ribbon-val">{recent.length}</div></div>
          <div style={{textAlign:"right"}}><div className="ribbon-label">Last night</div><div className="ribbon-val">{recent[recent.length-1]?.hours||"—"}h</div></div>
        </div>
      )}

      {/* Bar chart */}
      {recent.length>0&&(
        <div style={{background:"white",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:10}}>Last {recent.length} nights</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>
            {recent.map((e,i)=>{
              const pct=Math.min(100,Math.round(((e.hours||0)/10)*100));
              const dayName=new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"});
              return(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{fontSize:8,color:"var(--ink3)"}}>{e.hours||"?"}</div>
                  <div style={{width:"100%",height:44,display:"flex",alignItems:"flex-end"}}>
                    <div style={{width:"100%",height:pct+"%",minHeight:4,borderRadius:"3px 3px 0 0",background:hoursColor(e.hours||0),transition:"height .3s"}}/>
                  </div>
                  <div style={{fontSize:8,color:"var(--ink3)"}}>{dayName}</div>
                  {e.aidTaken&&<div style={{fontSize:7,color:"var(--rose)"}}>💊</div>}
                </div>
              );
            })}
          </div>
          <div style={{fontSize:9,color:"var(--ink3)",marginTop:6}}>💊 = sleep aid taken · 🟢 ≥7h · 🟡 5-7h · 🔴 &lt;5h</div>
        </div>
      )}

      {/* Log button */}
      <button className="btn btn-primary" style={{width:"100%",marginBottom:14}} onClick={()=>setShowAdd(!showAdd)}>
        {showAdd?"— Cancel":"+ Log last night's sleep"}
      </button>

      {showAdd&&(
        <div className="add-food-area" style={{marginBottom:14}}>
          <div className="add-food-title">Log sleep</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <div>
              <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:4}}>Bedtime</div>
              <input className="text-input" type="time" style={{width:"100%"}} value={bedtime} onChange={e=>setBedtime(e.target.value)}/>
            </div>
            <div>
              <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:4}}>Wake time</div>
              <input className="text-input" type="time" style={{width:"100%"}} value={waketime} onChange={e=>setWaketime(e.target.value)}/>
            </div>
          </div>
          {bedtime&&waketime&&(
            <div style={{textAlign:"center",fontSize:14,color:"var(--green)",fontFamily:"'Cormorant Garamond',serif",marginBottom:10}}>
              {calcHours(bedtime,waketime)} hours slept
            </div>
          )}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:6}}>Sleep quality</div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              {[1,2,3,4,5].map(q=>(
                <button key={q} onClick={()=>setQuality(q)}
                  style={{fontSize:22,background:"none",border:"none",cursor:"pointer",opacity:quality>=q?1:.3,transition:"opacity .15s"}}>
                  {qualityEmoji[q]}
                </button>
              ))}
            </div>
            {quality>0&&<div style={{textAlign:"center",fontSize:10,color:"var(--ink3)",marginTop:4}}>{["","Very poor","Poor","Fair","Good","Excellent"][quality]}</div>}
          </div>
          <input className="text-input" style={{width:"100%",marginBottom:8}} placeholder="Notes (e.g. woke up at 3am, vivid dreams…)" value={notes} onChange={e=>setNotes(e.target.value)}/>
          <button className="btn btn-primary" style={{width:"100%"}} onClick={logSleep} disabled={!bedtime||!waketime}>Save</button>
        </div>
      )}

      {/* History */}
      {sleepLog.length===0?(
        <div className="empty-state"><div className="empty-icon">🌙</div><div>No sleep logged yet — tap above to start</div></div>
      ):(
        <div>
          <div className="cat-label">History</div>
          {[...sleepLog].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{
            const isEditingSleep=editingSleepId===e.id&&editSleep;
            return(
            <div key={e.id} style={{background:"white",border:"1px solid",borderColor:isEditingSleep?"var(--green2)":"var(--border)",borderRadius:10,padding:"11px 13px",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontSize:24}}>{(e.hours||0)>=7?"😊":(e.hours||0)>=5?"😐":"😴"}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:hoursColor(e.hours||0)}}>{e.hours}h</span>
                    <span style={{fontSize:10,color:"var(--ink3)"}}>{e.bedtime} → {e.waketime}</span>
                    {e.aidTaken&&<span style={{fontSize:9,color:"var(--rose)"}}>💊 aid</span>}
                  </div>
                  <div style={{fontSize:10,color:"var(--ink3)",marginTop:2}}>{e.date}{e.quality>0&&" · "+qualityEmoji[e.quality].repeat(e.quality)}</div>
                  {e.notes&&<div style={{fontSize:10,color:"var(--ink3)",fontStyle:"italic",marginTop:2}}>{e.notes}</div>}
                </div>
                <div style={{display:"flex",gap:4}}>
                  {!isEditingSleep&&<button className="food-edit" onClick={()=>{setEditingSleepId(e.id);setEditSleep({...e});}}>✏️</button>}
                  <button className="food-delete" onClick={()=>removeEntry(e.id)}>×</button>
                </div>
              </div>
              {isEditingSleep&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
                    <div>
                      <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:3}}>Bedtime</div>
                      <input className="text-input" type="time" style={{width:"100%"}} value={editSleep.bedtime}
                        onChange={e=>{const bed=e.target.value;const h=calcHours(bed,editSleep.waketime);setEditSleep({...editSleep,bedtime:bed,hours:h||editSleep.hours});}}/>
                    </div>
                    <div>
                      <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:3}}>Wake time</div>
                      <input className="text-input" type="time" style={{width:"100%"}} value={editSleep.waketime}
                        onChange={e=>{const wake=e.target.value;const h=calcHours(editSleep.bedtime,wake);setEditSleep({...editSleep,waketime:wake,hours:h||editSleep.hours});}}/>
                    </div>
                  </div>
                  {editSleep.hours&&<div style={{textAlign:"center",fontSize:13,color:"var(--green)",fontFamily:"'Cormorant Garamond',serif",marginBottom:8}}>{editSleep.hours} hours</div>}
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:5}}>Quality</div>
                    <div style={{display:"flex",gap:8}}>
                      {[1,2,3,4,5].map(q=>(
                        <button key={q} onClick={()=>setEditSleep({...editSleep,quality:q})}
                          style={{fontSize:20,background:"none",border:"none",cursor:"pointer",opacity:editSleep.quality>=q?1:.3}}>
                          {qualityEmoji[q]}
                        </button>
                      ))}
                    </div>
                  </div>
                  <input className="text-input" style={{width:"100%",marginBottom:8}} placeholder="Notes…"
                    value={editSleep.notes} onChange={e=>setEditSleep({...editSleep,notes:e.target.value})}/>
                  <div onClick={()=>setEditSleep({...editSleep,aidTaken:!editSleep.aidTaken})}
                    style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:editSleep.aidTaken?"var(--rose2)":"var(--cream2)",borderRadius:8,cursor:"pointer",marginBottom:8,border:"1px solid",borderColor:editSleep.aidTaken?"var(--rose)":"var(--border)"}}>
                    <div style={{width:16,height:16,borderRadius:3,border:"2px solid",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,
                      background:editSleep.aidTaken?"var(--rose)":"white",borderColor:editSleep.aidTaken?"var(--rose)":"var(--border)",color:"white"}}>
                      {editSleep.aidTaken?"✓":""}
                    </div>
                    <span style={{fontSize:11,color:"var(--ink)"}}>💊 Sleep aid taken</span>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={()=>{
                      const u=sleepLog.map(x=>x.id===editingSleepId?{...editSleep}:x);
                      setSleepLog(u);store.set("sleep-log",u);setEditingSleepId(null);setEditSleep(null);
                    }}>Save</button>
                    <button className="btn btn-outline btn-sm" onClick={()=>{setEditingSleepId(null);setEditSleep(null);}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ─── HISTORY TAB ──────────────────────────────────────────────────────────────
function HistoryTab({sleepLog}){
  const[selectedDate,setSelectedDate]=useState(null);
  const[dayData,setDayData]=useState(null);
  const[loading,setLoading]=useState(false);
  const[viewMonth,setViewMonth]=useState(new Date());

  // Load data for a specific day from localStorage
  async function loadDay(dateStr){
    setLoading(true);setSelectedDate(dateStr);
    const food=await store.get("food-log-"+dateStr)||[];
    const water=await store.get("water-"+dateStr)||0;
    const ex=await store.get("ex-"+dateStr)||[];
    const sleep=sleepLog.filter(s=>s.date===dateStr);
    setDayData({food,water,ex,sleep});
    setLoading(false);
  }

  // Build calendar grid
  const year=viewMonth.getFullYear();
  const month=viewMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=todayKey();
  const monthName=viewMonth.toLocaleDateString("en-US",{month:"long",year:"numeric"});

  // Check which days have data
  function hasData(dateStr){
    // Check localStorage for food log key
    try{return!!localStorage.getItem("sn_food-log-"+dateStr);}catch{return false;}
  }

  function dateStr(d){
    return `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }

  function prevMonth(){setViewMonth(new Date(year,month-1,1));setSelectedDate(null);setDayData(null);}
  function nextMonth(){setViewMonth(new Date(year,month+1,1));setSelectedDate(null);setDayData(null);}

  const totals=dayData?.food?computeTotals(dayData.food):{};
  const DAYS=["Su","Mo","Tu","We","Th","Fr","Sa"];

  return(
    <div className="section">
      <p className="section-title">History</p>

      {/* Calendar */}
      <div style={{background:"white",border:"1px solid var(--border)",borderRadius:12,padding:14,marginBottom:14}}>
        {/* Month nav */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={prevMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--green)",padding:"4px 8px"}}>‹</button>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"var(--green)"}}>{monthName}</div>
          <button onClick={nextMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--green)",padding:"4px 8px",opacity:dateStr(1)>=today?"0.3":"1"}} disabled={dateStr(1)>=today}>›</button>
        </div>
        {/* Day headers */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:"var(--ink3)",letterSpacing:".06em",padding:"3px 0"}}>{d}</div>)}
        </div>
        {/* Day cells */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i}/>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const d=i+1;
            const ds=dateStr(d);
            const isToday=ds===today;
            const isFuture=ds>today;
            const isSelected=ds===selectedDate;
            const hasFoodData=hasData(ds);
            const hasSleep=sleepLog.some(s=>s.date===ds);
            return(
              <button key={d} onClick={()=>!isFuture&&loadDay(ds)}
                style={{
                  aspectRatio:"1",borderRadius:8,border:"1px solid",cursor:isFuture?"default":"pointer",
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,
                  background:isSelected?"var(--green)":isToday?"var(--green3)":"white",
                  borderColor:isSelected?"var(--green)":isToday?"var(--green2)":"var(--border)",
                  opacity:isFuture?.3:1,position:"relative"
                }}>
                <span style={{fontSize:11,color:isSelected?"white":isToday?"var(--green)":"var(--ink)",fontWeight:isToday?"600":"normal"}}>{d}</span>
                <div style={{display:"flex",gap:2}}>
                  {hasFoodData&&<div style={{width:4,height:4,borderRadius:"50%",background:isSelected?"rgba(255,255,255,.7)":"var(--green2)"}}/>}
                  {hasSleep&&<div style={{width:4,height:4,borderRadius:"50%",background:isSelected?"rgba(255,255,255,.7)":"var(--rose)"}}/>}
                </div>
              </button>
            );
          })}
        </div>
        <div style={{display:"flex",gap:12,marginTop:10,fontSize:9,color:"var(--ink3)"}}>
          <span><span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:"var(--green2)",marginRight:3,verticalAlign:"middle"}}/>Food logged</span>
          <span><span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:"var(--rose)",marginRight:3,verticalAlign:"middle"}}/>Sleep logged</span>
        </div>
      </div>

      {/* Selected day detail */}
      {loading&&<div style={{textAlign:"center",padding:20,color:"var(--ink3)",fontSize:11}}>Loading…</div>}

      {selectedDate&&dayData&&!loading&&(
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"var(--green)",marginBottom:12}}>
            {new Date(selectedDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
          </div>

          {/* Day summary ribbon */}
          {dayData.food.length>0&&(
            <div className="day-ribbon" style={{marginBottom:12}}>
              <div><div className="ribbon-label">Calories</div><div className="ribbon-val">{totals.calories||0}</div></div>
              <div style={{textAlign:"center"}}><div className="ribbon-label">Sodium</div><div className="ribbon-val">{totals.sodium||0}<span style={{fontSize:12,opacity:.7}}>mg</span></div></div>
              <div style={{textAlign:"right"}}><div className="ribbon-label">Calcium</div><div className="ribbon-val">{totals.calcium||0}<span style={{fontSize:12,opacity:.7}}>mg</span></div></div>
            </div>
          )}

          {/* Water */}
          {dayData.water>0&&(
            <div style={{background:"var(--green3)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>💧</span>
              <span style={{fontSize:12,color:"var(--green)"}}>{dayData.water} glasses of water</span>
            </div>
          )}

          {/* Exercise */}
          {dayData.ex.length>0&&(
            <div style={{background:"white",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:10}}>
              <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:6}}>Exercise</div>
              {dayData.ex.map((e,i)=>{
                const act=ACTIVITIES.find(a=>a.id===e.activityId);
                return act?<div key={i} style={{fontSize:12,color:"var(--ink)",marginBottom:3}}>{act.emoji} {act.name} · {e.duration}min{e.distance?" · "+e.distance+" "+e.distanceUnit:""}</div>:null;
              })}
            </div>
          )}

          {/* Sleep */}
          {dayData.sleep.length>0&&dayData.sleep.map((s,i)=>(
            <div key={i} style={{background:"white",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>🌙</span>
              <div>
                <div style={{fontSize:13,color:"var(--ink)",fontFamily:"'Cormorant Garamond',serif"}}>{s.hours}h sleep</div>
                <div style={{fontSize:10,color:"var(--ink3)"}}>{s.bedtime} → {s.waketime}{s.aidTaken?" · 💊 aid":""}</div>
                {s.notes&&<div style={{fontSize:10,color:"var(--ink3)",fontStyle:"italic"}}>{s.notes}</div>}
              </div>
            </div>
          ))}

          {/* Food log */}
          {dayData.food.length===0?(
            <div className="empty-state"><div className="empty-icon">🥗</div><div>No food logged this day</div></div>
          ):(
            <div>
              <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:8,borderBottom:"1px solid var(--border)",paddingBottom:4}}>Food log</div>
              {dayData.food.map(f=>(
                <div key={f.id} style={{background:"white",border:"1px solid var(--border)",borderRadius:10,padding:"10px 13px",marginBottom:7,display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{fontSize:10,color:"var(--ink3)",minWidth:32}}><div>{f.mealLabel||""}</div><div>{f.time}</div></div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:"var(--ink)",marginBottom:3}}>{f.name}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {f.nutrients?.calories>0&&<span className="macro-tag">{f.nutrients.calories} kcal</span>}
                      {f.nutrients?.sodium>0&&<span className={`macro-tag ${f.nutrients.sodium>400?"warn":""}`}>Na {f.nutrients.sodium}mg</span>}
                      {f.nutrients?.calcium>0&&<span className="macro-tag">Ca {f.nutrients.calcium}mg</span>}
                      {f.nutrients?.protein>0&&<span className="macro-tag">{f.nutrients.protein}g prot</span>}
                      {f.oxalate&&<span className={`ox-${f.oxalate}`}>ox {f.oxalate}</span>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {dayData.food.length===0&&dayData.water===0&&dayData.ex.length===0&&dayData.sleep.length===0&&(
            <div className="empty-state"><div className="empty-icon">📅</div><div>Nothing logged this day</div></div>
          )}
        </div>
      )}

      {!selectedDate&&(
        <div className="empty-state"><div className="empty-icon">📅</div><div>Tap a day on the calendar to see your log</div></div>
      )}
    </div>
  );
}

  name:"Sofia",
  // FIX #10: protein_g 65 not 55
  weight_kg:44,height_cm:160,targets:{water_glasses:12,water_glass_oz:8,sodium_mg:1500,calcium_mg:1000,calories:1800,protein_g:65,potassium_mg:3500,magnesium_mg:320},
  conditions:["Kidney stones (bilateral, multiple small)","HRT (started December)","Subscapular nerve — recovering"],
  restrictions:["High-oxalate foods without calcium pairing","Sodium > 1500mg/day","High animal protein in one sitting","NSAIDs/Ibuprofen unless necessary","Pescatarian"],

};

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("today");
  const[foodLog,setFoodLog]=useState([]);
  const[water,setWater]=useState(0);
  const[pantry,setPantry]=useState([]);
  const[profile,setProfile]=useState(DEFAULT_PROFILE);
  const[master,setMaster]=useState(DEFAULT_MASTER);
  const[takenToday,setTakenToday]=useState({});
  const[exLogs,setExLogs]=useState([]);
  const[skChecks,setSkChecks]=useState({});
  const[injections,setInjections]=useState([]);
  const[medical,setMedical]=useState(DEFAULT_MEDICAL);
  const[skinProducts,setSkinProducts]=useState([]);
  const[medDocs,setMedDocs]=useState([]);
  const[sleepLog,setSleepLog]=useState([]);
  const[loaded,setLoaded]=useState(false);
  const[onboarded,setOnboarded]=useState(false);

  useEffect(()=>{
    async function load(){
      loadUSDAKey().catch(()=>{}); // non-blocking
      try{
        const ob=await store.get("onboarded");if(ob)setOnboarded(true);
        const p=await store.get("profile");if(p)setProfile(p);
        const pan=await store.get("pantry");if(pan)setPantry(pan);
        const log=await store.get("food-log-"+todayKey());if(log)setFoodLog(log);
        const w=await store.get("water-"+todayKey());if(w!==null)setWater(w);
        const m=await store.get("master");if(m)setMaster(m);
        const t=await store.get("taken-"+todayKey());if(t)setTakenToday(t);
        const ex=await store.get("ex-"+todayKey());if(ex)setExLogs(ex);
        const sk=await store.get("sk-checks");if(sk)setSkChecks(sk);
        const inj=await store.get("injections");if(inj)setInjections(inj);
        const med=await store.get("medical");if(med)setMedical(med);
        const sp=await store.get("skin-products");if(sp)setSkinProducts(sp);
        const md=await store.get("med-docs");if(md)setMedDocs(md);
        const sl=await store.get("sleep-log");if(sl)setSleepLog(sl);
      }catch(e){console.warn(e);}
      finally{
        setLoaded(true);
        document.getElementById("splash").style.display="none";
        document.getElementById("root").style.display="block";
      }
    }
    load();
    if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
  },[]);

  // FIX #8: Handle scan save including skin
  function handleScanSave(r,dest){
    if(dest==="pantry"){
      const item={id:Date.now(),name:r.product_name||"Scanned",qty:r.serving_advice||"",cat:"other"};
      const u=[...pantry,item];setPantry(u);store.set("pantry",u);
    } else if(dest==="skin"){
      const item={id:Date.now(),name:r.product_name||"Scanned",verdict:r.verdict,verdict_emoji:r.verdict_emoji,headline:r.headline,reasoning:r.reasoning,date:todayKey()};
      const u=[...skinProducts,item];setSkinProducts(u);store.set("skin-products",u);
    } else if(dest==="medical"){
      const note=" ["+new Date().toLocaleDateString()+"] "+(r.product_name||"")+": "+(r.reasoning||"");
      const nm={...medical,other:(medical.other||"")+note};setMedical(nm);store.set("medical",nm);
    } else if(dest==="meds"){
      const ni={id:Date.now(),name:r.product_name||"Scanned",dose:r.serving_advice||"",category:"supplement",time:"morning",notes:r.reasoning||"",paused:false,synergies:[]};
      const u2=[...master,ni];setMaster(u2);store.set("master",u2);
    }
  }

  if(!loaded)return null;
  if(!onboarded)return <OnboardingFlow onComplete={(p)=>{setProfile(p);setOnboarded(true);}} existingProfile={profile}/>;

  const today=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  // FIX #5: Shortened tab labels to prevent overlap
  const TABS=[
    {id:"today",label:"Today"},
    {id:"history",label:"History"},
    {id:"exercise",label:"Exercise"},
    {id:"skincare",label:"Skin"},
    {id:"meds",label:"Meds"},
    {id:"scan",label:"📷 Scan"},
    {id:"sleep",label:"Sleep"},
    {id:"injections",label:"Proced."},
    {id:"medical",label:"Medical"},
    {id:"pantry",label:"Pantry"},
    {id:"coach",label:"Coach ✦"},
    {id:"profile",label:"Profile"},
  ];

  return(
    <>
      <style>{STYLE}</style>
      <div className="app">
        <div className="header">
          <div><div style={{fontSize:9,color:"var(--ink3)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:3}}>Personal Nutrition</div><div className="header-title">Sofia</div></div>
          <div style={{textAlign:"right"}}><div className="header-date">{today}</div><div style={{fontSize:8,color:"var(--ink3)",letterSpacing:".08em",marginTop:2}}>v1.12</div></div>
        </div>
        <nav className="nav">{TABS.map(t=><button key={t.id} className={`nav-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}</nav>
        {tab==="today"&&<TodayTab foodLog={foodLog} setFoodLog={setFoodLog} water={water} setWater={setWater} profile={profile} master={master} takenToday={takenToday} setTakenToday={setTakenToday} exLogs={exLogs} pantry={pantry}/>}
        {tab==="history"&&<HistoryTab sleepLog={sleepLog}/>}
        {tab==="exercise"&&<ExerciseTab exLogs={exLogs} setExLogs={setExLogs}/>}
        {tab==="skincare"&&<SkincareTab skChecks={skChecks} setSkChecks={setSkChecks} skinProducts={skinProducts} setSkinProducts={setSkinProducts}/>}
        {tab==="meds"&&<MedsTab master={master} setMaster={setMaster}/>}
        {tab==="scan"&&<ScanTab profile={profile} onSave={handleScanSave} skinProducts={skinProducts} setSkinProducts={setSkinProducts}/>}
        {tab==="sleep"&&<SleepTab sleepLog={sleepLog} setSleepLog={setSleepLog} master={master} takenToday={takenToday}/>}
        {tab==="injections"&&<InjectionsTab injections={injections} setInjections={setInjections}/>}
        {tab==="medical"&&<MedicalTab medical={medical} setMedical={setMedical} medDocs={medDocs} setMedDocs={setMedDocs} profile={profile} setProfile={setProfile}/>}
        {tab==="pantry"&&<PantryTab pantry={pantry} setPantry={setPantry}/>}
        {tab==="coach"&&<CoachTab profile={profile} foodLog={foodLog} pantry={pantry} water={water} master={master} takenToday={takenToday} exLogs={exLogs} medical={medical} sleepLog={sleepLog} skChecks={skChecks} injections={injections}/>}
        {tab==="profile"&&<ProfileTab profile={profile} setProfile={setProfile} onRedo={()=>{store.set("onboarded",null);setOnboarded(false);}}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
