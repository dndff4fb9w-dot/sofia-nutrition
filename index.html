<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sofia · Nutrition Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f4efe9;
  --surface: #fffcf8;
  --border: #e2d9ce;
  --text: #2a201a;
  --muted: #8a7b6f;
  --accent: #4d7c5f;
  --accent-bg: #eaf2ee;
  --warn: #b86e2a;
  --warn-bg: #fdf1e4;
  --danger: #a83232;
  --danger-bg: #fde8e8;
  --user-bubble: #2a201a;
  --claude-bubble: #fffcf8;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-left h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.3px;
}

.header-left p {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

.reset-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
}

/* TOTALS BAR */
.totals-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.totals-bar::-webkit-scrollbar { display: none; }

.metric {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 10px;
  min-width: 58px;
  flex-shrink: 0;
}

.metric.good { background: var(--accent-bg); border-color: #c2deca; }
.metric.warn { background: var(--warn-bg); border-color: #f0cfa0; }
.metric.danger { background: var(--danger-bg); border-color: #f0b0b0; }

.metric-value {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
}

.metric-label {
  font-size: 9px;
  color: var(--muted);
  margin-top: 1px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* CHAT */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
}

.message {
  display: flex;
  gap: 8px;
  max-width: 100%;
}

.message.user {
  flex-direction: row-reverse;
}

.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.55;
  max-width: 85%;
  word-break: break-word;
}

.user .bubble {
  background: var(--user-bubble);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.assistant .bubble {
  background: var(--claude-bubble);
  color: var(--text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

/* Markdown-style formatting in bubbles */
.bubble strong { font-weight: 500; }
.bubble em { font-style: italic; }

.bubble table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 12px;
}

.bubble th {
  background: var(--bg);
  padding: 5px 8px;
  text-align: left;
  font-weight: 500;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.bubble td {
  padding: 5px 8px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.bubble tr:last-child td { border-bottom: none; }

.flag-warn {
  display: inline-block;
  background: var(--warn-bg);
  color: var(--warn);
  border: 1px solid #f0cfa0;
  border-radius: 6px;
  padding: 2px 7px;
  font-size: 12px;
  margin: 2px 2px 2px 0;
}

.flag-ok {
  display: inline-block;
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid #c2deca;
  border-radius: 6px;
  padding: 2px 7px;
  font-size: 12px;
  margin: 2px 2px 2px 0;
}

.flag-danger {
  display: inline-block;
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid #f0b0b0;
  border-radius: 6px;
  padding: 2px 7px;
  font-size: 12px;
  margin: 2px 2px 2px 0;
}

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 14px;
  background: var(--claude-bubble);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.typing-dot {
  width: 6px;
  height: 6px;
  background: var(--muted);
  border-radius: 50%;
  animation: typingPulse 1.4s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingPulse {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
  30% { opacity: 1; transform: scale(1); }
}

/* INPUT */
.input-area {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  flex-shrink: 0;
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-box {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text);
  resize: none;
  max-height: 120px;
  outline: none;
  line-height: 1.4;
  -webkit-appearance: none;
}

.input-box::placeholder { color: var(--muted); }
.input-box:focus { border-color: var(--accent); }

.send-btn {
  width: 40px;
  height: 40px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.15s;
}

.send-btn:disabled { opacity: 0.4; }

.send-btn svg { width: 18px; height: 18px; fill: white; }

/* Photo button */
.photo-btn {
  width: 40px;
  height: 40px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}

.photo-btn svg { width: 18px; height: 18px; stroke: var(--muted); fill: none; }

/* Quick prompts */
.quick-prompts {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.quick-prompts::-webkit-scrollbar { display: none; }

.quick-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 5px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  cursor: pointer;
  flex-shrink: 0;
}

.quick-btn:active { background: var(--accent-bg); }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
}

.empty-state .logo {
  font-family: 'Instrument Serif', serif;
  font-size: 36px;
  color: var(--text);
  opacity: 0.15;
}

.empty-state p { font-size: 14px; max-width: 240px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Sofia · Nutrition</h1>
    <p id="date-label">Today's log</p>
  </div>
  <button class="reset-btn" onclick="resetDay()">New day</button>
</header>

<div class="totals-bar" id="totals-bar">
  <div class="metric" id="m-ca">
    <span class="metric-value" id="v-ca">0</span>
    <span class="metric-label">Ca mg</span>
  </div>
  <div class="metric" id="m-na">
    <span class="metric-value" id="v-na">0</span>
    <span class="metric-label">Na mg</span>
  </div>
  <div class="metric" id="m-pro">
    <span class="metric-value" id="v-pro">0g</span>
    <span class="metric-label">Protein</span>
  </div>
  <div class="metric" id="m-ox">
    <span class="metric-value" id="v-ox">0</span>
    <span class="metric-label">Oxalate</span>
  </div>
  <div class="metric" id="m-cal">
    <span class="metric-value" id="v-cal">0</span>
    <span class="metric-label">kcal</span>
  </div>
  <div class="metric" id="m-water">
    <span class="metric-value" id="v-water">0/12</span>
    <span class="metric-label">Water</span>
  </div>
</div>

<div class="chat-area" id="chat-area">
  <div class="empty-state" id="empty-state">
    <div class="logo">S</div>
    <p>Log a meal, snack, or drink. I'll check oxalate, sodium & calcium in real time.</p>
  </div>
</div>

<div class="input-area">
  <div class="quick-prompts" id="quick-prompts">
    <button class="quick-btn" onclick="quickSend('Daily summary')">📊 Summary</button>
    <button class="quick-btn" onclick="quickSend('I drank a glass of water')">💧 +1 water</button>
    <button class="quick-btn" onclick="quickSend('What should I eat for lunch today?')">🍽 Lunch idea</button>
    <button class="quick-btn" onclick="quickSend('What calcium-rich foods can I still add today?')">🦴 Ca boost</button>
    <button class="quick-btn" onclick="quickSend('Is my sodium okay so far?')">🧂 Na check</button>
  </div>
  <div class="input-row">
    <label class="photo-btn" for="photo-input" title="Attach photo">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
    </label>
    <textarea class="input-box" id="msg-input" placeholder="What did you eat?" rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are Sofia's dedicated real-time kidney stone prevention nutrition tracker.

MEDICAL CONTEXT:
Sofia has idiopathic hypercalciuria (kidneys excrete too much calcium, driving kidney stone formation). She has 5 kidney stones. She is pescatarian and cooks without added salt. She stays in Miami temporarily, shops primarily at Trader Joe's.

DAILY TARGETS:
- Calcium: 1,000–1,200 mg/day (NEVER restrict — it binds oxalate in gut)
- Sodium: <1,500 mg/day (primary lever for urinary calcium — CRITICAL)
- Protein: 65–80 g/day
- Oxalate: <40 mg/day (always pair high-oxalate foods with calcium at SAME meal)
- Calories: 1,600–1,800 kcal/day
- Fiber: 25–30 g/day
- Water: 12 glasses (3 liters)/day — every glass at home has lemon/orange juice (protective citrate)

DIETARY RULES:
1. SODIUM is the #1 lever — keeps urinary calcium low. Flag any meal that risks exceeding 1,500 mg/day.
2. CALCIUM must never be restricted. Pair with every meal. If running low by evening, suggest a calcium source.
3. HIGH-OXALATE foods (spinach, kale, Swiss chard, beets, sweet potatoes, almonds, cashews, peanuts, chocolate, rhubarb, soy flour, berries) MUST be eaten with a calcium source at the SAME meal.
4. Oxalate pairing rule: calcium must be at the SAME meal, not just the same day.
5. Spinach/kale only usable in shakes with ≥1 full cup of kefir, max 1 cup of blend.
6. High-sodium combos to avoid: canned fish + cheese together frequently causes sodium overages.
7. Smoked fish (e.g. smoked salmon) is very high sodium — flag it.
8. Chocolate is off-limits (oxalate). Gummy/fruit candies are fine.
9. Kiwi is moderate-high oxalate — pair with calcium.
10. Chickpeas + tofu together = moderate combined oxalate (~28 mg) — pair with calcium.
11. Rinse canned chickpeas to reduce sodium by ~40%.
12. TJ's Greek Chickpeas = ~700 mg sodium per ½ cup — portion carefully.
13. Collagen peptides: occasional, not daily (acid load).
14. Alcohol slightly increases urinary calcium.
15. Magnesium supplement nightly (already confirmed).
16. Citrate is protective: lemon/orange juice in water is optimal.

KEY PRODUCTS (Trader Joe's):
- Silk Original soy milk (green carton): 300 mg calcium/cup — confirmed from label
- TJ's plain unsweetened low-fat kefir: ~440 mg calcium/cup
- Swiss cheese: higher calcium, lower sodium than Gouda (preferred)
- TJ's Lightly Smoked Mussels: track sodium
- Ortiz Bonito del Norte tuna: moderate sodium
- TJ's High Protein Organic Super Firm Tofu: good protein
- TJ's multigrain bread: ~150 mg sodium/slice
- Sardines with bones: excellent calcium + omega-3

TRACKING BEHAVIOR:
- You maintain running nutritional totals throughout the day.
- After EVERY food/drink logged, show an updated totals table in this exact format:

| Nutrient | Running Total | Target | Status |
|----------|--------------|--------|--------|
| Calcium | Xmg | 1,000–1,200mg | ✅/⚠️/❌ |
| Sodium | Xmg | <1,500mg | ✅/⚠️/❌ |
| Protein | Xg | 65–80g | ✅/⚠️/❌ |
| Oxalate | Xmg | <40mg | ✅/⚠️/❌ |
| Calories | Xkcal | 1,600–1,800 | ✅/⚠️/❌ |
| Water | X glasses | 12 | ✅/⚠️/❌ |

- Flag the MOST ACTIONABLE concern per meal (don't list all issues equally).
- Before she eats: flag any oxalate or sodium issues. Suggest swaps if needed.
- Keep responses concise and conversational — this is a mobile app, so no long essays.
- If she sends a photo of food, identify the items and estimate portions, then log them.
- Never suggest chicken, beef, pork, or other meat — she is pescatarian.
- One sodium overage day doesn't derail the protocol; weekly pattern matters.
- Extract totals data for the app UI by ending EVERY response after a food log with this JSON block (hidden from display):
<!--TOTALS:{"ca":X,"na":X,"pro":X,"ox":X,"cal":X,"water":X}-->`;

let conversationHistory = [];
let totals = { ca: 0, na: 0, pro: 0, ox: 0, cal: 0, water: 0 };
let pendingImage = null;
let isLoading = false;

// ─── Load saved state ────────────────────────────────────────────────────────
function getTodayKey() {
  return 'sofia_' + new Date().toISOString().split('T')[0];
}

function saveState() {
  try {
    sessionStorage.setItem(getTodayKey(), JSON.stringify({ conversationHistory, totals }));
  } catch(e) {}
}

function loadState() {
  try {
    const saved = sessionStorage.getItem(getTodayKey());
    if (saved) {
      const s = JSON.parse(saved);
      conversationHistory = s.conversationHistory || [];
      totals = s.totals || { ca: 0, na: 0, pro: 0, ox: 0, cal: 0, water: 0 };
      // Re-render messages
      conversationHistory.forEach(msg => {
        if (msg.role === 'user') {
          appendMessage('user', typeof msg.content === 'string' ? msg.content : '[photo + message]');
        } else {
          appendMessage('assistant', msg.content);
        }
      });
      updateTotalsBar();
    }
  } catch(e) {}
}

// ─── UI helpers ─────────────────────────────────────────────────────────────
function formatDate() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

document.getElementById('date-label').textContent = formatDate();

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('send-btn').disabled = !el.value.trim() && !pendingImage;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
    e.preventDefault();
    sendMessage();
  }
}

function quickSend(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

function hideEmpty() {
  const el = document.getElementById('empty-state');
  if (el) el.remove();
}

function appendMessage(role, text) {
  hideEmpty();
  const area = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderMarkdown(text);
  wrap.appendChild(bubble);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
  return bubble;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'message assistant';
  wrap.id = 'typing-wrap';
  wrap.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-wrap');
  if (t) t.remove();
}

function renderMarkdown(text) {
  // Remove the hidden TOTALS comment before rendering
  text = text.replace(/<!--TOTALS:.*?-->/gs, '');

  // Tables
  text = text.replace(/\|(.+)\|/g, (match) => match);
  const lines = text.split('\n');
  let html = '';
  let inTable = false;
  let tableHtml = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      if (!inTable) {
        inTable = true;
        tableHtml = '<table>';
        // Check if next line is separator
        const isHeader = lines[i+1] && lines[i+1].includes('---');
        const cells = line.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
        tableHtml += '<tr>';
        cells.forEach(c => { tableHtml += `<th>${c.trim()}</th>`; });
        tableHtml += '</tr>';
        continue;
      }
      if (line.includes('---')) continue; // separator row
      const cells = line.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
      tableHtml += '<tr>';
      cells.forEach(c => { tableHtml += `<td>${c.trim()}</td>`; });
      tableHtml += '</tr>';
    } else {
      if (inTable) {
        tableHtml += '</table>';
        html += tableHtml;
        tableHtml = '';
        inTable = false;
      }
      let l = line
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^### (.+)/, '<strong>$1</strong>')
        .replace(/^## (.+)/, '<strong>$1</strong>')
        .replace(/^# (.+)/, '<strong>$1</strong>')
        .replace(/^- (.+)/, '• $1')
        .replace(/✅/g, '<span class="flag-ok">✅</span>')
        .replace(/⚠️/g, '<span class="flag-warn">⚠️</span>')
        .replace(/❌/g, '<span class="flag-danger">❌</span>');
      html += l + (line.trim() ? '<br>' : '<br>');
    }
  }
  if (inTable) html += tableHtml + '</table>';

  // Clean up extra <br>s
  html = html.replace(/(<br>){3,}/g, '<br><br>');
  html = html.replace(/^<br>/, '');
  return html;
}

function extractAndUpdateTotals(text) {
  const match = text.match(/<!--TOTALS:(.*?)-->/s);
  if (match) {
    try {
      const data = JSON.parse(match[1]);
      totals = { ...totals, ...data };
      updateTotalsBar();
    } catch(e) {}
  }
}

function updateTotalsBar() {
  document.getElementById('v-ca').textContent = Math.round(totals.ca);
  document.getElementById('v-na').textContent = Math.round(totals.na);
  document.getElementById('v-pro').textContent = Math.round(totals.pro) + 'g';
  document.getElementById('v-ox').textContent = Math.round(totals.ox);
  document.getElementById('v-cal').textContent = Math.round(totals.cal);
  document.getElementById('v-water').textContent = totals.water + '/12';

  // Calcium coloring
  const ca = totals.ca;
  setMetricColor('m-ca', ca >= 1000 && ca <= 1200 ? 'good' : ca >= 800 ? '' : ca > 1200 ? 'warn' : 'danger');

  // Sodium coloring
  const na = totals.na;
  setMetricColor('m-na', na < 1000 ? 'good' : na < 1400 ? 'warn' : 'danger');

  // Protein
  const pro = totals.pro;
  setMetricColor('m-pro', pro >= 65 && pro <= 80 ? 'good' : pro > 80 ? 'warn' : '');

  // Oxalate
  const ox = totals.ox;
  setMetricColor('m-ox', ox < 25 ? 'good' : ox < 40 ? 'warn' : 'danger');

  // Calories
  const cal = totals.cal;
  setMetricColor('m-cal', cal >= 1600 && cal <= 1800 ? 'good' : cal > 1800 ? 'warn' : '');

  // Water
  const w = totals.water;
  setMetricColor('m-water', w >= 12 ? 'good' : w >= 8 ? 'warn' : '');
}

function setMetricColor(id, state) {
  const el = document.getElementById(id);
  el.classList.remove('good', 'warn', 'danger');
  if (state) el.classList.add(state);
}

function resetDay() {
  if (!confirm('Start a new day? This clears today\'s log.')) return;
  conversationHistory = [];
  totals = { ca: 0, na: 0, pro: 0, ox: 0, cal: 0, water: 0 };
  saveState();
  updateTotalsBar();
  const area = document.getElementById('chat-area');
  area.innerHTML = `<div class="empty-state" id="empty-state"><div class="logo">S</div><p>Log a meal, snack, or drink. I'll check oxalate, sodium & calcium in real time.</p></div>`;
  pendingImage = null;
  document.getElementById('date-label').textContent = formatDate();
}

// ─── Photo handling ──────────────────────────────────────────────────────────
function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const base64 = e.target.result.split(',')[1];
    const mediaType = file.type || 'image/jpeg';
    pendingImage = { base64, mediaType };
    document.getElementById('send-btn').disabled = false;
    // Show preview hint
    const input = document.getElementById('msg-input');
    if (!input.value) input.value = '📷 Photo attached — ';
    input.focus();
    autoResize(input);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// ─── Send message ────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if ((!text && !pendingImage) || isLoading) return;

  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  // Build user message content
  let userContent;
  let displayText = text;

  if (pendingImage) {
    userContent = [
      { type: 'image', source: { type: 'base64', media_type: pendingImage.mediaType, data: pendingImage.base64 } },
      { type: 'text', text: text || 'What is this food? Please identify and log it for me.' }
    ];
    displayText = (text || 'Photo sent') + (text ? '' : ' — please identify and log.');
  } else {
    userContent = text;
  }

  // Clear input
  input.value = '';
  input.style.height = 'auto';
  pendingImage = null;

  // Add to history & display
  conversationHistory.push({ role: 'user', content: userContent });
  appendMessage('user', displayText);
  showTyping();

  try {
    const response = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    if (!response.ok) {
      const err = await response.text();
      throw new Error('API error: ' + response.status + ' ' + err);
    }

    const data = await response.json();
    const replyText = data.content?.[0]?.text || 'Sorry, I had trouble with that. Try again?';

    removeTyping();
    appendMessage('assistant', replyText);
    conversationHistory.push({ role: 'assistant', content: replyText });
    extractAndUpdateTotals(replyText);
    saveState();

  } catch (err) {
    removeTyping();
    appendMessage('assistant', '⚠️ Connection error. Check your internet and try again.\n\n_(' + err.message + ')_');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

// ─── Init ────────────────────────────────────────────────────────────────────
loadState();
updateTotalsBar();
document.getElementById('msg-input').addEventListener('input', function() {
  document.getElementById('send-btn').disabled = !this.value.trim() && !pendingImage;
});
</script>
