function getProteinTarget(exLogs){
  if(!exLogs||!exLogs.length)return 55;
  const best=exLogs.reduce((m,e)=>{
    const a=ACTIVITIES.find(x=>x.id===e.activityId);
    const score={recovery:0,light:1,moderate:2,intense:3}[a?.intensity||"recovery"]||0;
    return Math.max(m,score);
  },0);
  return[55,75,80,90][best];
}
function getCalTarget(exLogs,base=1800){
  if(!exLogs||!exLogs.length)return base;
  const burned=exLogs.reduce((s,e)=>{const a=ACTIVITIES.find(x=>x.id===e.activityId);return s+(a?a.cal:0);},0);
  return base+Math.round(burned*0.6);
}

function computeTotals(fl){
  const t={sodium:0,calcium:0,calories:0,protein:0,potassium:0,magnesium:0};
  for(const f of fl)if(f.nutrients)for(const k of Object.keys(t))t[k]+=f.nutrients[k]||0;
  return t;
}

// ─── API functions (direct Anthropic calls) ───────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function fetchWithTimeout(url, options, timeoutMs=25000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const r = await fetch(url, {...options, signal: controller.signal});
    clearTimeout(timer);
    return r;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === "AbortError") throw new Error("Request timed out — please try again");
    throw e;
  }
}

async function callClaude(messages, system, retries=3) {
  for (let i = 0; i < retries; i++) {
    try {
      if (i > 0) await sleep(3000 * i);
      const r = await fetchWithTimeout("/.netlify/functions/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 300, system, messages }),
      });
      if (!r.ok) {
        const err = await r.text();
        if (i < retries-1) { await sleep(3000); continue; }
        return "⚠️ Server error " + r.status + " — tap Add to try again";
      }
      const d = await r.json();
      if (d.error) {
        if (i < retries-1) { await sleep(5000); continue; }
        return "Error: " + d.error.message;
      }
      return d.content?.[0]?.text || "No response.";
    } catch(e) {
      if (i === retries-1) return "⚠️ " + e.message + " — tap Add to try again";
      await sleep(3000);
    }
  }
}

}

async function parseFood(desc) {
  const sys = `You are a nutrition database. Return ONLY a JSON object, no other text:
{"name":"food name","sodium":0,"calcium":0,"calories":0,"protein":0,"potassium":0,"magnesium":0,"oxalate":"low","notes":"brief note"}
Numbers in mg except calories(kcal) and protein(g). Silk soy milk: 300Ca, 115Na, 7pro per cup. Pescatarian only.`;
  try {
    const raw = await callClaude([{ role: "user", content: "Nutrition for: " + desc }], sys);
    if (!raw || raw.startsWith("⚠️") || raw.startsWith("Error")) return {error: raw||"Failed"};
    // Find JSON object in response
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) return {error: "No data returned — try again"};
    const parsed = JSON.parse(match[0]);
    return parsed;
  } catch(e) { return {error: "Try again — " + e.message}; }
}

async function parseFoodFromImage(b64, mediaType) {
  const sys = `You are looking at a photo of food. Identify what's on the plate and estimate nutrition.
Return ONLY valid JSON, no markdown:
{"name":"description of what you see","sodium":number,"calcium":number,"calories":number,"protein":number,"potassium":number,"magnesium":number,"oxalate":"low"|"med"|"high","notes":"one sentence for kidney stone prevention"}
All mg except calories(kcal) and protein(g). Be specific about what you see.`;
  try {
    const raw = await callClaudeWithImage(b64, mediaType, "What food is this? Estimate the nutrition.", sys);
    return JSON.parse(raw.replace(/```json|```/g, "").trim());
  } catch { return null; }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("fail"));
    r.readAsDataURL(file);
  });
}

// ─── Voice input hook ─────────────────────────────────────────────────────────
function useVoice(onResult){
  const [listening,setListening]=useState(false);
  const recRef=useRef(null);

  function startListening(){
    const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SpeechRecognition){alert("Voice input requires Safari on iPhone.");return;}
    if(recRef.current){try{recRef.current.stop();}catch(e){}}
    const rec=new SpeechRecognition();
    rec.lang="en-US";rec.continuous=false;rec.interimResults=false;rec.maxAlternatives=1;
    rec.onstart=()=>setListening(true);
    rec.onresult=e=>{
      if(e.results&&e.results.length>0){const t=e.results[0][0].transcript;if(t&&t.trim())onResult(t.trim());}
      setListening(false);
    };
    rec.onerror=e=>{
      setListening(false);
      if(e.error==="not-allowed")alert("Microphone blocked. Go to iPhone Settings → Safari → Microphone → Allow.");
    };
    rec.onend=()=>setListening(false);
    try{rec.start();recRef.current=rec;}catch(e){setListening(false);}
  }
  function stopListening(){if(recRef.current){try{recRef.current.stop();}catch(e){}}setListening(false);}

  return{listening,startListening,stopListening};
}

// ─── Universal mic button component ──────────────────────────────────────────
function MicBtn({onResult,size=38}){
  const{listening,startListening,stopListening}=useVoice(onResult);
  return(
    <button className={`mic-btn ${listening?"listening":"idle"}`} 
      style={{width:size,height:size,flexShrink:0}}
      onClick={listening?stopListening:startListening} type="button">
      {listening?"🔴":"🎤"}
    </button>
  );
}

// ─── Universal photo button component ────────────────────────────────────────
function PhotoBtn({onPhoto,size=38}){
  const inputRef=useRef(null);
  function handleFile(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const b64=ev.target.result.split(",")[1];
      onPhoto(b64,file.type||"image/jpeg");
    };
    reader.readAsDataURL(file);
    e.target.value="";
  }
  return(
    <label style={{width:size,height:size,borderRadius:"50%",background:"var(--cream2)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,fontSize:16,border:"1px solid var(--border)"}}>
      📷
      <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
    </label>
  );
}

// ─── TODAY TAB ────────────────────────────────────────────────────────────────
function TodayTab({foodLog,setFoodLog,water,setWater,profile,master,takenToday,setTakenToday,exLogs}){
  const[foodInput,setFoodInput]=useState("");
  const[parsing,setParsing]=useState(false);
  const[parseResult,setParseResult]=useState(null);
  const[meal,setMeal]=useState("breakfast");
  const[coachTip,setCoachTip]=useState(null);
  const[cooldown,setCooldown]=useState(0);
  const lastCallRef=useRef(0);

  const totals=computeTotals(foodLog);
  const proteinTarget=getProteinTarget(exLogs);
  const calTarget=getCalTarget(exLogs,profile.targets.calories);
  const targets=profile.targets;
  const pct=(v,m)=>Math.min(100,Math.round((v/m)*100));
  const barClass=(v,m,isMax=false)=>{const p=pct(v,m);if(isMax)return p>90?"bar-over":p>70?"bar-warn":"bar-ok";return"bar-ok";};

  const{listening,startListening,stopListening}=useVoice(text=>{setFoodInput(p=>p?p+" "+text:text);});

  function toggleTaken(id){const u={...takenToday,[id]:!takenToday[id]};setTakenToday(u);store.set("taken-"+todayKey(),u);}

  async function handleAddFood(input){
    const domVal = document.querySelector('.add-food-input')?.value || "";
    const text=input||foodInput||domVal;
    if(!text.trim())return;
    if(text!==foodInput) setFoodInput(text);
    // Enforce 4 second gap between API calls to avoid rate limiting
    const now=Date.now();
    const elapsed=now-lastCallRef.current;
    if(elapsed<4000&&lastCallRef.current>0){
      const wait=Math.ceil((4000-elapsed)/1000);
      setCooldown(wait);
      const iv=setInterval(()=>{
        setCooldown(c=>{
          if(c<=1){clearInterval(iv);return 0;}
          return c-1;
        });
      },1000);
      return;
    }
    lastCallRef.current=now;
    setParsing(true);setParseResult(null);setCoachTip(null);
    const result=await parseFood(text);
    if(!result||result.error){
      setParseResult({error: result?.error || "API call failed — tap Add to retry"});
      setParsing(false);
      return;
    }
    if(result&&result.name){
      const mealLabel={breakfast:"🌅",lunch:"☀️",dinner:"🌙",snack:"🍎"}[meal]||"";
      const entry={id:Date.now(),name:result.name||text,meal,mealLabel,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),nutrients:{sodium:result.sodium||0,calcium:result.calcium||0,calories:result.calories||0,protein:result.protein||0,potassium:result.potassium||0,magnesium:result.magnesium||0},oxalate:result.oxalate||guessOxalate(text),notes:result.notes};
      const u=[...foodLog,entry];
      setFoodLog(u);store.set("food-log-"+todayKey(),u);setParseResult(result);setFoodInput("");
      // Get coach tip asynchronously after logging
      const newTotals=computeTotals(u);
      getCoachTip(result.name,newTotals,profile.targets,proteinTarget).then(tip=>{if(tip)setCoachTip(tip);});
    }
    setParsing(false);
  }

  async function handlePhotoFood(file){
    if(!file)return;
    setParsing(true);setParseResult(null);setCoachTip(null);
    const b64=await fileToBase64(file);
    const result=await parseFoodFromImage(b64,file.type||"image/jpeg");
    if(result){
      const mealLabel={breakfast:"🌅",lunch:"☀️",dinner:"🌙",snack:"🍎"}[meal]||"";
      const entry={id:Date.now(),name:result.name||"Food from photo",meal,mealLabel,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),nutrients:{sodium:result.sodium||0,calcium:result.calcium||0,calories:result.calories||0,protein:result.protein||0,potassium:result.potassium||0,magnesium:result.magnesium||0},oxalate:result.oxalate||"low",notes:result.notes};
      const u=[...foodLog,entry];
      setFoodLog(u);store.set("food-log-"+todayKey(),u);setParseResult(result);
      const newTotals=computeTotals(u);
      getCoachTip(result.name,newTotals,profile.targets,proteinTarget).then(tip=>{if(tip)setCoachTip(tip);});
    }
    setParsing(false);
  }

  function removeFood(id){const u=foodLog.filter(f=>f.id!==id);setFoodLog(u);store.set("food-log-"+todayKey(),u);}

  const progToday=isProgDay(todayKey());
  const daysUntil=daysUntilProg(todayKey());
  const todayActivity=exLogs&&exLogs.length?exLogs.map(e=>ACTIVITIES.find(a=>a.id===e.activityId)?.name).filter(Boolean).join(", "):null;

  const supps=master.filter(m=>m.category==="supplement");
  const meds=master.filter(m=>m.category==="medication");

  return(
    <div className="section">
      <div className="day-ribbon">
        <div><div className="ribbon-label">Calories</div><div className="ribbon-val">{totals.calories}<span style={{fontSize:13,opacity:.7}}> / {calTarget}</span></div></div>
        <div style={{textAlign:"center"}}><div className="ribbon-label">Sodium</div><div className="ribbon-val">{totals.sodium}<span style={{fontSize:13,opacity:.7}}>mg</span></div></div>
        <div style={{textAlign:"right"}}><div className="ribbon-label">Protein</div><div className="ribbon-val">{totals.protein}<span style={{fontSize:13,opacity:.7}}>g / {proteinTarget}g</span></div></div>
      </div>

      {/* Status pills */}
      <div className="status-strip">
        {progToday
          ?<div className="status-pill prog">🌙 Progesterone day</div>
          :daysUntil!==null?<div className="status-pill prog-off">🌙 Progesterone in {daysUntil}d</div>:null}
        {todayActivity&&<div className="status-pill ex">💪 {todayActivity}</div>}
        <div className="status-pill protein">🥩 Protein target: {proteinTarget}g</div>
      </div>

      {/* Water */}
      <div className="water-track">
        <div style={{minWidth:60}}><div className="water-label">Water</div><div className="water-count">{water}<span style={{fontSize:12,color:"var(--green2)"}}> / {targets.water_glasses}</span></div></div>
        <div className="water-glasses">
          {Array.from({length:targets.water_glasses}).map((_,i)=>(
            <button key={i} className={`water-glass ${i<water?"filled":""}`} onClick={()=>{const n=i<water?i:i+1;setWater(n);store.set("water-"+todayKey(),n);}}/>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          <button className="btn btn-primary btn-sm" onClick={()=>{const n=Math.min(targets.water_glasses,water+1);setWater(n);store.set("water-"+todayKey(),n);}}>+ Glass</button>
          <button className="btn btn-outline btn-sm" onClick={()=>{setWater(0);store.set("water-"+todayKey(),0);}}>Reset</button>
        </div>
      </div>

      {/* Supplements */}
      <div className="cat-label">Supplements — tap when taken</div>
      {supps.map(item=>{
        const taken=!!takenToday[item.id];
        const syns=taken&&item.synergies?item.synergies.map(syn=>{const cur=totals[syn.nutrient]||0;const met=cur>=syn.threshold;const pctVal=Math.min(100,Math.round((cur/syn.threshold)*100));return{...syn,cur,met,pctVal};}):[];
        return(
          <div key={item.id} className={`master-item ${taken?"taken":""}`}>
            <div className="master-header" onClick={()=>toggleTaken(item.id)}>
              <div className={`master-check ${taken?"checked":""}`}>{taken?"✓":""}</div>
              <div style={{flex:1}}><div className="master-name">{item.name}</div>{item.dose&&<div className="master-dose">{item.dose}</div>}</div>

                  {f.nutrients?.calcium>0&&<span className="macro-tag">Ca {f.nutrients.calcium}mg</span>}
                  {f.nutrients?.magnesium>0&&<span className="macro-tag hi">Mg {f.nutrients.magnesium}mg</span>}

          <input className="text-input add-food-input" style={{flex:1}} placeholder="Describe what you ate…"
            value={foodInput} 
            onChange={e=>setFoodInput(e.target.value)}

            {listening?"🔴":"🎤"}

          <label style={{width:38,height:38,borderRadius:"50%",background:"var(--cream2)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,fontSize:16}}>

            {parseResult.notes&&<><br/><span style={{color:"var(--ink3)"}}>{parseResult.notes}</span></>}

        )}

    </div>
  );
}

// ─── EXERCISE TAB ─────────────────────────────────────────────────────────────
function ExerciseTab({exLogs,setExLogs}){
  const[customDur,setCustomDur]=useState({});

  function logActivity(act){
    const dur=customDur[act.id]||act.duration;
    const entry={id:Date.now(),activityId:act.id,duration:dur,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
    const u=[...exLogs,entry];setExLogs(u);store.set("ex-"+todayKey(),u);
  }
  function removeEx(id){const u=exLogs.filter(e=>e.id!==id);setExLogs(u);store.set("ex-"+todayKey(),u);}

  const proteinTarget=getProteinTarget(exLogs);
  const calBurned=exLogs.reduce((s,e)=>{const a=ACTIVITIES.find(x=>x.id===e.activityId);return s+(a?a.cal:0);},0);

  return(
    <div className="section">
      <p className="section-title">Exercise</p>

      {exLogs.length>0&&(
        <div className="day-ribbon" style={{marginBottom:14}}>
          <div><div className="ribbon-label">Protein target today</div><div className="ribbon-val">{proteinTarget}g</div></div>
          <div style={{textAlign:"center"}}><div className="ribbon-label">Cal burned</div><div className="ribbon-val">{calBurned}</div></div>
          <div style={{textAlign:"right"}}><div className="ribbon-label">Sessions</div><div className="ribbon-val">{exLogs.length}</div></div>
        </div>
      )}

      {exLogs.length>0&&(
        <div style={{marginBottom:14}}>
          <div className="cat-label">Today's sessions</div>
          {exLogs.map(e=>{
            const act=ACTIVITIES.find(a=>a.id===e.activityId);
            if(!act)return null;
            return(
              <div className="ex-log-item" key={e.id}>
                <span style={{fontSize:20}}>{act.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"var(--ink)"}}>{act.name}</div>
                  <div style={{fontSize:10,color:"var(--ink3)"}}>{e.time} · {e.duration}min · {act.cal} cal · protein target {act.protein}g</div>
                  {act.notes&&<div style={{fontSize:10,color:"var(--ink3)",fontStyle:"italic"}}>{act.notes}</div>}
                </div>
                <button className="food-delete" onClick={()=>removeEx(e.id)}>×</button>
              </div>
            );
          })}
        </div>
      )}

      <div className="cat-label">Log a session</div>
      <div className="ex-grid">
        {ACTIVITIES.map(act=>{
          const alreadyLogged=exLogs.some(e=>e.activityId===act.id);
          return(
            <div key={act.id} className={`ex-card ${alreadyLogged?"logged":""}`}>
              <div className="ex-emoji">{act.emoji}</div>
              <div className="ex-name">{act.name}</div>
              <div className="ex-detail">{act.duration}min · {act.cal>0?act.cal+"cal":"recovery"}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,justifyContent:"center"}}>
                <input type="number" className="text-input" style={{width:54,padding:"4px 6px",fontSize:11,textAlign:"center"}}
                  placeholder={act.duration} value={customDur[act.id]||""} onChange={e=>setCustomDur({...customDur,[act.id]:Number(e.target.value)||act.duration})}/>
                <span style={{fontSize:9,color:"var(--ink3)"}}>min</span>
              </div>
              <button className="btn btn-primary btn-sm" style={{marginTop:8,width:"100%"}} onClick={()=>logActivity(act)}>
                {alreadyLogged?"Log again":"Log"}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── INJECTIONS TAB ───────────────────────────────────────────────────────────
function InjectionsTab({injections,setInjections}){
  const[name,setName]=useState("");
  const[area,setArea]=useState("");
  const[date,setDate]=useState(todayKey());
  const[notes,setNotes]=useState("");

  const COMMON=["Botox","Hyaluronic acid filler","PRP","Mesotherapy","Lip filler","Jaw filler","Cheek filler","Chin filler","Undereye filler","Skinbooster"];

  function addInjection(){
    if(!name.trim())return;
    const entry={id:Date.now(),name:name.trim(),area:area.trim(),date,notes:notes.trim()};
    const u=[...injections,entry];setInjections(u);store.set("injections",u);
    setName("");setArea("");setNotes("");setDate(todayKey());
  }
  function removeInj(id){const u=injections.filter(i=>i.id!==id);setInjections(u);store.set("injections",u);}

  function daysSince(dateStr){
    const diff=Math.floor((new Date()-new Date(dateStr+"T12:00:00"))/86400000);
    if(diff===0)return"Today";if(diff===1)return"Yesterday";return`${diff} days ago`;
  }

  return(
    <div className="section">
      <p className="section-title">Aesthetic Procedures</p>

      <div className="add-food-area" style={{marginBottom:16}}>
        <div className="add-food-title">Log a procedure</div>
        <div className="quick-prompts" style={{marginBottom:10}}>
          {COMMON.map((c,i)=><button key={i} className="quick-btn" onClick={()=>setName(c)}>{c}</button>)}
        </div>
        <div className="form-row" style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:7}}>
          <input className="text-input" style={{flex:2}} placeholder="Procedure name" value={name} onChange={e=>setName(e.target.value)}/>
          <input className="text-input" style={{flex:1}} placeholder="Area (e.g. lips)" value={area} onChange={e=>setArea(e.target.value)}/>
        </div>
        <div className="form-row" style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:7}}>
          <input className="text-input" type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1}}/>
          <input className="text-input" style={{flex:2}} placeholder="Notes (clinic, units, etc.)" value={notes} onChange={e=>setNotes(e.target.value)}/>
        </div>
        <button className="btn btn-primary" style={{width:"100%"}} onClick={addInjection} disabled={!name.trim()}>Log procedure</button>
      </div>

      {injections.length===0?(
        <div className="empty-state"><div className="empty-icon">💉</div><div>No procedures logged yet</div></div>
      ):(
        [...injections].sort((a,b)=>b.date.localeCompare(a.date)).map(inj=>(
          <div className="inj-item" key={inj.id}>
            <div style={{flex:1}}>
              <div className="inj-name">{inj.name}{inj.area&&<span style={{color:"var(--ink3)",fontWeight:"normal"}}> — {inj.area}</span>}</div>
              <div className="inj-detail">{daysSince(inj.date)} · {inj.date}</div>
              {inj.notes&&<div className="inj-detail" style={{fontStyle:"italic"}}>{inj.notes}</div>}
            </div>
            <button className="food-delete" onClick={()=>removeInj(inj.id)}>×</button>
          </div>
        ))
      )}
    </div>
  );
}

// ─── MEDS TAB ────────────────────────────────────────────────────────────────
function MedsTab({master,setMaster}){
  const[showAdd,setShowAdd]=useState(false);
  const[scanning,setScanning]=useState(false);
  const[scanPreview,setScanPreview]=useState(null);
  const[scanResult,setScanResult]=useState(null);
  const[newItem,setNewItem]=useState({name:"",dose:"",category:"supplement",time:"morning",notes:""});

  async function handlePhotoScan(file){
    if(!file)return;
    setScanPreview(URL.createObjectURL(file));setScanResult(null);setScanning(true);
    const b64=await fileToBase64(file);
    const sys=`Read supplement/medication label. Return ONLY valid JSON:
{"name":"full name","dose":"dose per serving","time":"morning"|"night"|"with meals"|"as needed","category":"supplement"|"medication","key_nutrients":{},"synergies":[],"notes":"relevant note"}`;
    const raw=await callClaudeWithImage(b64,file.type||"image/jpeg","Read this label.",sys);
    try{
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setScanResult(parsed);
      setNewItem({name:parsed.name||"",dose:parsed.dose||"",category:parsed.category||"supplement",time:parsed.time||"morning",notes:parsed.notes||""});
    }catch{
      setScanResult({notes:"Could not read label — fill in manually."});
    }
    setScanning(false);
  }

  function addItem(){
    if(!newItem.name.trim())return;
    const item={id:"custom-"+Date.now(),name:newItem.name.trim(),dose:newItem.dose.trim(),category:newItem.category,time:newItem.time,notes:newItem.notes.trim(),paused:false,synergies:[]};
    const u=[...master,item];setMaster(u);store.set("master",u);
    setNewItem({name:"",dose:"",category:"supplement",time:"morning",notes:""});
    setShowAdd(false);setScanPreview(null);setScanResult(null);
  }

  function removeItem(id){const u=master.filter(m=>m.id!==id);setMaster(u);store.set("master",u);}
  function togglePaused(id){const u=master.map(m=>m.id===id?{...m,paused:!m.paused}:m);setMaster(u);store.set("master",u);}

  return(

        {showAdd?"— Cancel":"+ Add New"}

        <div style={{background:"var(--cream2)",border:"1px solid var(--border)",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{fontSize:10,letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:10}}>Add by photo (optional)</div>
          {!scanPreview?(
            <div className="photo-zone" style={{marginBottom:12}}>
              <input type="file" accept="image/*" onChange={e=>handlePhotoScan(e.target.files[0])}/>
              <div style={{fontSize:24,marginBottom:5}}>📸</div>
              <div style={{fontSize:11,color:"var(--ink3)"}}>Photograph label — Claude pre-fills the form</div>
            </div>
          ):(
            <div style={{marginBottom:10}}>
              <img src={scanPreview} alt="" className="photo-preview" style={{marginBottom:6}}/>
              {scanning&&<div style={{textAlign:"center",padding:10,fontSize:11,color:"var(--ink3)"}}><span className="loading-spin" style={{borderTopColor:"var(--green)"}}/> Reading…</div>}
              {scanResult?.notes&&<div style={{fontSize:11,color:"var(--terra)",margin:"6px 0",fontStyle:"italic"}}>{scanResult.notes}</div>}
            </div>
          )}
          <div style={{display:"flex",gap:7,marginBottom:7,flexWrap:"wrap"}}>
            <div style={{flex:2}}>
              <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:3}}>Name *</div>
              <input className="text-input" style={{width:"100%"}} placeholder="e.g. Vitamin C" value={newItem.name} onChange={e=>setNewItem({...newItem,name:e.target.value})}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:9,letterSpacing:".08em",textTransform:"uppercase",color:"var(--ink3)",marginBottom:3}}>Dose</div>
              <input className="text-input" style={{width:"100%"}} placeholder="500mg" value={newItem.dose} onChange={e=>setNewItem({...newItem,dose:e.target.value})}/>
            </div>
          </div>
          <div style={{display:"flex",gap:7,marginBottom:7}}>
            <select className="text-input" style={{flex:1}} value={newItem.category} onChange={e=>setNewItem({...newItem,category:e.target.value})}>
              <option value="supplement">Supplement</option>
              <option value="medication">Medication</option>
            </select>
            <select className="text-input" style={{flex:1}} value={newItem.time} onChange={e=>setNewItem({...newItem,time:e.target.value})}>
              <option value="morning">Morning</option>
              <option value="with meals">With meals</option>
              <option value="night">Night</option>
              <option value="as needed">As needed</option>

// ─── SCAN TAB ────────────────────────────────────────────────────────────────
function ScanTab({profile,onSaveToPantry}){
  const[scanning,setScanning]=useState(false);
  const[preview,setPreview]=useState(null);
  const[result,setResult]=useState(null);
  const[question,setQuestion]=useState("");

  async function scanProduct(file){
    if(!file)return;
    setPreview(URL.createObjectURL(file));setResult(null);setScanning(true);
    const b64=await fileToBase64(file);
    const sys=`You are Sofia's nutrition coach analyzing a product.
SOFIA: Kidney stones (bilateral), HRT, sodium ≤1500mg/day, low oxalate, calcium ~1000mg/day with meals.
Return ONLY valid JSON:
{"product_name":"...","verdict":"yes"|"caution"|"no","verdict_emoji":"✅"|"⚠️"|"🚫","headline":"punchy summary","key_nutrients":{"sodium":"Xmg"},"reasoning":"2-3 sentences specific to Sofia","watch_out":"concern or null","better_alternative":"alternative or null","serving_advice":"advice or null"}`;
    const prompt=question?`Sofia asks: "${question}"\n\nAnalyze this.`:"Analyze this product label for me.";
    const raw=await callClaudeWithImage(b64,file.type||"image/jpeg",prompt,sys);
    try{setResult(JSON.parse(raw.replace(/```json|```/g,"").trim()));}
    catch{setResult({product_name:"Product",verdict:"caution",verdict_emoji:"⚠️",headline:"Could not read label clearly",reasoning:raw.slice(0,250),watch_out:null,better_alternative:null,serving_advice:null,key_nutrients:{}});}
    setScanning(false);
  }

  function reset(){setPreview(null);setResult(null);setQuestion("");}

  return(
    <div className="section">
      <p className="section-title">Scanner</p>
      <p style={{fontSize:11,color:"var(--ink3)",marginBottom:14,lineHeight:1.6}}>Photograph any product for an instant verdict — food, skincare, supplements.</p>
      {!preview?(
        <>
          <div style={{display:"flex",gap:6,marginBottom:9}}>
            <input className="text-input" style={{flex:1}} placeholder="Optional: ask something specific…"
              value={question} onChange={e=>setQuestion(e.target.value)}/>
            <MicBtn onResult={t=>setQuestion(p=>p?p+" "+t:t)}/>
          </div>
          <div className="photo-zone">
            <input type="file" accept="image/*" onChange={e=>scanProduct(e.target.files[0])}/>
            <div style={{fontSize:26,marginBottom:5}}>📷</div>
            <div style={{fontSize:11,color:"var(--ink3)",lineHeight:1.5}}><strong style={{color:"var(--green)",display:"block",marginBottom:3}}>Photograph any label</strong>Food, skincare, or supplement — Claude checks against your health profile.</div>
          </div>
        </>
      ):(
        <div>
          <img src={preview} alt="" className="photo-preview" style={{marginBottom:9}}/>
          {scanning?(
            <div style={{textAlign:"center",padding:16,fontSize:11,color:"var(--ink3)"}}><span className="loading-spin" style={{borderTopColor:"var(--green)"}}/> Analyzing…</div>
          ):result&&(
            <div>
              <div className={`scan-verdict ${result.verdict}`}>
                <div className={`verdict-badge ${result.verdict}`}>
                  <span style={{fontSize:17}}>{result.verdict_emoji}</span>
                  {result.verdict==="yes"?"Good for you":result.verdict==="caution"?"Use with caution":"Avoid this one"}
                  {result.product_name&&<span style={{opacity:.6,fontWeight:"normal",fontSize:9}}> — {result.product_name}</span>}
                </div>
                {result.headline&&<div style={{fontSize:12,fontWeight:500,marginBottom:7}}>{result.headline}</div>}
                {Object.keys(result.key_nutrients||{}).length>0&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:9}}>
                    {Object.entries(result.key_nutrients).map(([k,v])=><span key={k} style={{background:"rgba(0,0,0,.06)",padding:"2px 8px",borderRadius:20,fontSize:10}}>{k}: {v}</span>)}
                  </div>
                )}
                <div className="verdict-body">{result.reasoning}</div>
                {result.watch_out&&<div style={{marginTop:7,padding:"6px 10px",background:"rgba(0,0,0,.05)",borderRadius:6,fontSize:11,color:"var(--terra)"}}>⚠ {result.watch_out}</div>}
                {result.better_alternative&&<div style={{marginTop:7,padding:"8px 11px",background:"var(--green3)",borderRadius:6,fontSize:11,color:"var(--green)"}}><strong>Better option:</strong> {result.better_alternative}</div>}
                {result.serving_advice&&<div style={{marginTop:6,fontSize:11,color:"var(--ink3)",fontStyle:"italic"}}>{result.serving_advice}</div>}
              </div>
              <div style={{display:"flex",gap:7,marginTop:11,flexWrap:"wrap"}}>
                <button className="btn btn-primary" onClick={reset}>Scan another</button>
                <button className="btn btn-outline" onClick={()=>setResult(null)}>Re-analyze</button>
                {result.verdict!=="no"&&onSaveToPantry&&(
                  <button className="btn btn-outline" style={{background:"var(--green3)",color:"var(--green)",borderColor:"var(--green2)"}}
                    onClick={()=>{onSaveToPantry(result);reset();}}>
                    🥫 Save to Pantry
                  </button>
                )}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── COACH TAB ───────────────────────────────────────────────────────────────
function CoachTab({profile,foodLog,pantry,water,master,takenToday,exLogs,medical}){
  const[messages,setMessages]=useState([{role:"assistant",content:"Hi Sofia — I know your full context: kidney stones, HRT, your exact protocol, all your supplements and medications, today's exercise, and what you've eaten. Ask me anything, including about skincare products, medications, or whether something is right for you today."}]);
  const[input,setInput]=useState("");const[loading,setLoading]=useState(false);
  const chatRef=useRef(null);
  const{listening,startListening,stopListening}=useVoice(text=>{setInput(p=>p?p+" "+text:text);});

  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[messages]);

  const QUICK=[
    "What should I eat for dinner?","Am I getting enough protein today?","Is my Vitamin D working?",
    "What's missing nutritionally?","Suggest something from my pantry","How's my sodium today?",
    "Can I take Actron today?","What should I buy this week?","How are my kidneys doing nutrition-wise?",
  ];

  async function send(text){
    if(!text.trim()||loading)return;
    const userMsg={role:"user",content:text};const newMsgs=[...messages,userMsg];
    setMessages(newMsgs);setInput("");setLoading(true);
    const reply=await callClaude(newMsgs.map(m=>({role:m.role,content:m.content})),buildCoachPrompt(profile,foodLog,pantry,water,master,takenToday,exLogs,medical));
    setMessages([...newMsgs,{role:"assistant",content:reply}]);setLoading(false);
  }

  function renderText(text){return text.split(/(\*\*[^*]+\*\*)/).map((p,i)=>p.startsWith("**")?<strong key={i}>{p.slice(2,-2)}</strong>:p);}

  return(
    <div className="section">
      <p className="section-title">Nutrition Coach</p>
      <div className="quick-prompts">{QUICK.map((q,i)=><button key={i} className="quick-btn" onClick={()=>send(q)}>{q}</button>)}</div>
      <div className="chat-window" ref={chatRef}>
        {messages.map((m,i)=>(
          <div key={i} className={`msg msg-${m.role==="user"?"user":"ai"}`}>
            <div className="msg-label">{m.role==="user"?"You":"Coach"}</div>
            <div className="msg-bubble">{renderText(m.content)}</div>
          </div>
        ))}
        {loading&&<div className="msg msg-ai"><div className="msg-label">Coach</div><div className="msg-bubble"><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div></div>}
      </div>
      <div className="chat-input-area">
        <textarea className="chat-input" placeholder="Ask your coach… or tap 🎤" value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}}
          rows={1}/>
        <button className={`mic-btn ${listening?"listening":"idle"}`} onClick={listening?stopListening:startListening}>
          {listening?"🔴":"🎤"}
        </button>
        <button className="btn btn-primary" onClick={()=>send(input)} disabled={loading||!input.trim()}>
          {loading?<span className="loading-spin"/>:"Send"}
        </button>
      </div>
    </div>
  );
}

      const w=await store.get("water-"+todayKey());if(w!==null)setWater(w);
      const m=await store.get("master");if(m)setMaster(m);
      const t=await store.get("taken-"+todayKey());if(t)setTakenToday(t);
      const ex=await store.get("ex-"+todayKey());if(ex)setExLogs(ex);
      const sk=await store.get("sk-checks");if(sk)setSkChecks(sk);
      const inj=await store.get("injections");if(inj)setInjections(inj);
      const med=await store.get("medical");if(med)setMedical(med);
      setLoaded(true);
      document.getElementById("splash").style.display="none";
      document.getElementById("root").style.display="block";
    }
    load();
    if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
  },[]);

  if(!loaded)return null;

  const today=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const TABS=[
    {id:"today",label:"Today"},
    {id:"exercise",label:"Exercise"},
    {id:"skincare",label:"Skin"},
    {id:"meds",label:"Meds"},
    {id:"scan",label:"📷 Scan"},
    {id:"injections",label:"Procedures"},
    {id:"medical",label:"Medical"},
    {id:"pantry",label:"Pantry"},
    {id:"coach",label:"Coach ✦"},
    {id:"profile",label:"Profile"},
  ];

  return(
    <>
      <style>{STYLE}</style>
      <div className="app">
        <div className="header">
          <div><div style={{fontSize:9,color:"var(--ink3)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:3}}>Personal Nutrition</div><div className="header-title">Sofia</div></div>
          <div className="header-date">{today}</div>
        </div>
        <nav className="nav">{TABS.map(t=><button key={t.id} className={`nav-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}</nav>
        {tab==="today"&&<TodayTab foodLog={foodLog} setFoodLog={setFoodLog} water={water} setWater={setWater} profile={profile} master={master} takenToday={takenToday} setTakenToday={setTakenToday} exLogs={exLogs}/>}
        {tab==="exercise"&&<ExerciseTab exLogs={exLogs} setExLogs={setExLogs}/>}
        {tab==="skincare"&&<SkincareTab skChecks={skChecks} setSkChecks={setSkChecks}/>}
        {tab==="meds"&&<MedsTab master={master} setMaster={setMaster}/>}
        {tab==="scan"&&<ScanTab profile={profile} onSaveToPantry={(r)=>{const item={id:Date.now(),name:r.product_name||"Scanned product",qty:Object.entries(r.key_nutrients||{}).map(([k,v])=>k+": "+v).join(" · "),cat:"Other"};const u=[...pantry,item];setPantry(u);store.set("pantry",u);}}/>}
        {tab==="injections"&&<InjectionsTab injections={injections} setInjections={setInjections}/>}
        {tab==="medical"&&<MedicalTab medical={medical} setMedical={setMedical}/>}
        {tab==="pantry"&&<PantryTab pantry={pantry} setPantry={setPantry}/>}
        {tab==="coach"&&<CoachTab profile={profile} foodLog={foodLog} pantry={pantry} water={water} master={master} takenToday={takenToday} exLogs={exLogs} medical={medical}/>}
        {tab==="profile"&&<ProfileTab profile={profile} setProfile={setProfile}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
