<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sofia — Nutrition</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nutrition">
  <meta name="theme-color" content="#2C4A3E">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #F7F3EC; font-family: 'Courier New', monospace; }
    textarea, input { font-family: 'Courier New', monospace; -webkit-appearance: none; }
    button { font-family: 'Courier New', monospace; }
    ::-webkit-scrollbar { display: none; }
    #root { display: block; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const STORAGE_KEY = 'sofia-food-log-v4';

const OX = {
  low:  { bg: '#d4edda', color: '#155724' },
  med:  { bg: '#fff3cd', color: '#856404' },
  high: { bg: '#f8d7da', color: '#721c24' },
};

function pad(n) { return String(n).padStart(2,'0'); }
function nowTime() {
  const d = new Date(), h = d.getHours(), m = d.getMinutes();
  return `${pad(h%12||12)}:${pad(m)} ${h<12?'AM':'PM'}`;
}

// Storage helpers (falls back to localStorage if window.storage unavailable)
async function storageGet(key) {
  try {
    if (window.storage) {
      const r = await window.storage.get(key);
      return r ? r.value : null;
    }
  } catch(_) {}
  return localStorage.getItem(key);
}
async function storageSet(key, val) {
  try {
    if (window.storage) { await window.storage.set(key, val); return; }
  } catch(_) {}
  localStorage.setItem(key, val);
}

// ─── EntryCard — pencil opens edit INSIDE THE SAME CARD ──────────────────────
function EntryCard({ entry, onSave, onDelete }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({...entry});
  const nameRef = useRef(null);

  const startEdit = () => {
    setForm({...entry});
    setEditing(true);
    // Open keyboard and put cursor at end of text
    setTimeout(() => {
      if (nameRef.current) {
        nameRef.current.focus();
        const len = nameRef.current.value.length;
        nameRef.current.setSelectionRange(len, len);
      }
    }, 60);
  };

  const set = (k,v) => setForm(f => ({...f,[k]:v}));
  const save = () => { onSave({...form}); setEditing(false); };
  const cancel = () => setEditing(false);

  return (
    <div style={{
      background:'#fff', borderRadius:14, padding:'14px 16px',
      marginBottom:10, border:'1px solid #e8e2d8',
      boxShadow:'0 1px 4px rgba(0,0,0,0.05)',
    }}>
      {/* Top row */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:10,color:'#bbb'}}>{entry.timestamp}</span>
        <div style={{display:'flex',gap:12}}>
          {!editing && (
            <button onClick={startEdit} style={{
              background:'none',border:'none',cursor:'pointer',fontSize:16,padding:2,opacity:0.7
            }}>✏️</button>
          )}
          <button onClick={()=>onDelete(entry.id)} style={{
            background:'none',border:'none',cursor:'pointer',fontSize:14,padding:2,
            color:'#aaa',fontWeight:700,lineHeight:1
          }}>✕</button>
        </div>
      </div>

      {editing ? (
        <>
          {/* ── THE FIX: full-width textarea, all text visible, tap anywhere to move cursor ── */}
          <textarea
            ref={nameRef}
            value={form.name}
            onChange={e => set('name', e.target.value)}
            rows={3}
            style={{
              width:'100%', border:'2px solid #2d5a2d', borderRadius:10,
              padding:'10px 12px', fontSize:14, background:'#fafff8',
              resize:'none', lineHeight:1.6, outline:'none', color:'#222',
              marginBottom:10, minHeight:72, overflowY:'auto', display:'block',
            }}
          />

          {/* Numeric fields */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
            {[['kcal','kcal'],['na','Na mg'],['ca','Ca mg'],['prot','prot g'],['mg','Mg mg'],['k','K mg']].map(([k,lbl])=>(
              <div key={k}>
                <div style={{fontSize:9,color:'#aaa',marginBottom:3,letterSpacing:1}}>{lbl}</div>
                <input type="number" value={form[k]||''} onChange={e=>set(k,e.target.value)} style={{
                  width:'100%',border:'1px solid #ddd',borderRadius:8,
                  padding:'8px 10px',fontSize:13,background:'#fff',outline:'none',color:'#222',
                }}/>
              </div>
            ))}
          </div>

          {/* Oxalate */}
          <div style={{display:'flex',gap:6,marginBottom:10}}>
            {['low','med','high'].map(lv=>(
              <button key={lv} onClick={()=>set('ox',lv)} style={{
                flex:1, border:`1px solid ${form.ox===lv?OX[lv].color:'#ddd'}`,
                borderRadius:8, padding:'8px 4px', fontSize:11, cursor:'pointer',
                background:form.ox===lv?OX[lv].bg:'#fff',
                color:form.ox===lv?OX[lv].color:'#aaa',
                fontWeight:form.ox===lv?700:400,
              }}>ox {lv}</button>
            ))}
          </div>

          {/* Note */}
          <input type="text" value={form.note||''} onChange={e=>set('note',e.target.value)}
            placeholder="Note (optional)..." style={{
              width:'100%',border:'1px solid #ddd',borderRadius:8,
              padding:'8px 10px',fontSize:11,background:'#fff',
              outline:'none',color:'#999',marginBottom:10,display:'block',
            }}/>

          <div style={{display:'flex',gap:8}}>
            <button onClick={save} style={{
              flex:2,background:'#2d5a2d',color:'#fff',border:'none',
              borderRadius:10,padding:12,fontSize:11,letterSpacing:1.5,
              cursor:'pointer',fontWeight:700,
            }}>SAVE</button>
            <button onClick={cancel} style={{
              flex:1,background:'#fff',color:'#888',border:'1px solid #ddd',
              borderRadius:10,padding:12,fontSize:11,cursor:'pointer',
            }}>CANCEL</button>
          </div>
        </>
      ) : (
        <>
          <div style={{fontSize:14,color:'#1a1a1a',fontWeight:600,lineHeight:1.5,marginBottom:8}}>
            {entry.name}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
            {entry.kcal>0 && <span style={{background:'#f0ece4',color:'#555',borderRadius:20,padding:'3px 9px',fontSize:11}}>{entry.kcal} kcal</span>}
            {entry.na>0   && <span style={{background:'#f0ece4',color:'#555',borderRadius:20,padding:'3px 9px',fontSize:11}}>Na {entry.na}mg</span>}
            {entry.ca>0   && <span style={{background:'#f0ece4',color:'#555',borderRadius:20,padding:'3px 9px',fontSize:11}}>Ca {entry.ca}mg</span>}
            {entry.prot>0 && <span style={{background:'#f0ece4',color:'#555',borderRadius:20,padding:'3px 9px',fontSize:11}}>{entry.prot}g prot</span>}
            {entry.mg>0   && <span style={{background:'#f0ece4',color:'#555',borderRadius:20,padding:'3px 9px',fontSize:11}}>Mg {entry.mg}mg</span>}
            {entry.k>0    && <span style={{background:'#f0ece4',color:'#555',borderRadius:20,padding:'3px 9px',fontSize:11}}>K {entry.k}mg</span>}
            <span style={{background:OX[entry.ox]?.bg,color:OX[entry.ox]?.color,borderRadius:20,padding:'3px 9px',fontSize:11,fontWeight:700}}>
              ox {entry.ox}
            </span>
          </div>
          {entry.note ? <div style={{fontSize:11,color:'#aaa',fontStyle:'italic',lineHeight:1.5}}>{entry.note}</div> : null}
        </>
      )}
    </div>
  );
}

// ─── AddForm ──────────────────────────────────────────────────────────────────
function AddForm({ onSave, onCancel }) {
  const [form, setForm] = useState({name:'',kcal:'',na:'',ca:'',prot:'',mg:'',k:'',ox:'low',note:''});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const ref = useRef(null);
  useEffect(() => { ref.current?.focus(); }, []);

  return (
    <div style={{background:'#ede8df',borderRadius:14,padding:16,marginBottom:12,border:'1px solid #d5cfc6'}}>
      <div style={{fontSize:9,letterSpacing:2,color:'#888',fontWeight:700,marginBottom:10}}>ADD FOOD</div>
      <textarea ref={ref} value={form.name} onChange={e=>set('name',e.target.value)}
        placeholder="What did you eat?" rows={3} style={{
          width:'100%',border:'2px solid #2d5a2d',borderRadius:10,
          padding:'10px 12px',fontSize:14,background:'#fff',
          resize:'none',lineHeight:1.6,marginBottom:10,outline:'none',color:'#222',minHeight:72,display:'block',
        }}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
        {[['kcal','kcal'],['na','Na mg'],['ca','Ca mg'],['prot','prot g'],['mg','Mg mg'],['k','K mg']].map(([k,lbl])=>(
          <div key={k}>
            <div style={{fontSize:9,color:'#aaa',marginBottom:3,letterSpacing:1}}>{lbl}</div>
            <input type="number" value={form[k]} onChange={e=>set(k,e.target.value)} style={{
              width:'100%',border:'1px solid #ddd',borderRadius:8,
              padding:'8px 10px',fontSize:13,background:'#fff',outline:'none',color:'#222',
            }}/>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:6,marginBottom:10}}>
        {['low','med','high'].map(lv=>(
          <button key={lv} onClick={()=>set('ox',lv)} style={{
            flex:1,border:`1px solid ${form.ox===lv?OX[lv].color:'#ddd'}`,
            borderRadius:8,padding:'8px 4px',fontSize:11,cursor:'pointer',
            background:form.ox===lv?OX[lv].bg:'#fff',
            color:form.ox===lv?OX[lv].color:'#aaa',
            fontWeight:form.ox===lv?700:400,
          }}>ox {lv}</button>
        ))}
      </div>
      <input type="text" value={form.note} onChange={e=>set('note',e.target.value)}
        placeholder="Note (optional)..." style={{
          width:'100%',border:'1px solid #ddd',borderRadius:8,
          padding:'8px 10px',fontSize:11,background:'#fff',
          outline:'none',color:'#999',marginBottom:10,display:'block',
        }}/>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>onSave({...form,id:Date.now().toString(),timestamp:nowTime()})} style={{
          flex:2,background:'#2d5a2d',color:'#fff',border:'none',
          borderRadius:10,padding:12,fontSize:11,letterSpacing:1.5,cursor:'pointer',fontWeight:700,
        }}>SAVE</button>
        <button onClick={onCancel} style={{
          flex:1,background:'#fff',color:'#888',border:'1px solid #ddd',
          borderRadius:10,padding:12,fontSize:11,cursor:'pointer',
        }}>CANCEL</button>
      </div>
    </div>
  );
}

// ─── Totals ───────────────────────────────────────────────────────────────────
function TotalsBar({ entries }) {
  const t = entries.reduce((a,e)=>({
    kcal:a.kcal+(+e.kcal||0),na:a.na+(+e.na||0),ca:a.ca+(+e.ca||0),
    prot:a.prot+(+e.prot||0),mg:a.mg+(+e.mg||0),k:a.k+(+e.k||0),
  }),{kcal:0,na:0,ca:0,prot:0,mg:0,k:0});

  const items=[
    ['kcal',`${t.kcal}`,null],
    ['Na',`${t.na}mg`,t.na>2300?'#e74c3c':null],
    ['Ca',`${t.ca}mg`,t.ca<800?'#e74c3c':t.ca>1300?'#e67e22':'#7ecf7e'],
    ['prot',`${t.prot}g`,t.prot>65?'#e67e22':null],
    ['Mg',`${t.mg}mg`,null],
    ['K',`${t.k}mg`,null],
  ];
  return (
    <div style={{background:'#2d5a2d',borderRadius:12,padding:'10px 14px',marginBottom:12,display:'flex',flexWrap:'wrap',gap:10}}>
      {items.map(([l,v,c])=>(
        <div key={l} style={{textAlign:'center',minWidth:48}}>
          <div style={{fontSize:9,color:'#a8d5a8',letterSpacing:1}}>{l}</div>
          <div style={{fontSize:12,color:c||'#fff',fontWeight:700}}>{v}</div>
        </div>
      ))}
    </div>
  );
}

// ─── AI helpers ───────────────────────────────────────────────────────────────
async function scanImage(file) {
  const b64 = await new Promise((res,rej)=>{
    const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);
  });
  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:`Extract nutrition from the image. Return ONLY valid JSON (no markdown, no explanation) with fields: name (string — list ALL foods and drinks visible), kcal (number), na (sodium mg, number), ca (calcium mg, number), prot (protein g, number), mg (magnesium mg, number), k (potassium mg, number), ox ("low"/"med"/"high" — low under 10mg oxalate, med 10-40mg, high over 40mg), note (brief note on data source). Use 0 for unknown values.`,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
        {type:'text',text:'List every food and drink visible. Include all in name field.'},
      ]}],
    }),
  });
  const d=await resp.json();
  const txt=(d.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
  return JSON.parse(txt);
}

async function getCoachTip(entries) {
  if(!entries.length) return '';
  const lines=entries.map(e=>`${e.name}: ${e.kcal||0}kcal, Na ${e.na||0}mg, Ca ${e.ca||0}mg, Mg ${e.mg||0}mg, K ${e.k||0}mg, prot ${e.prot||0}g, ox-${e.ox}`).join('\n');
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:300,
      system:`Kidney stone prevention coach. Calcium oxalate stones. Goals: low oxalate, Na <2300mg, Ca 1000-1200mg from food, prot 50-65g, Mg 300-400mg, K 3500mg. ONE short tip, 2-3 sentences max. Direct, no fluff.`,
      messages:[{role:'user',content:`Today:\n${lines}\n\nTip:`}],
    }),
  });
  const d=await resp.json();
  return d.content?.[0]?.text||'';
}

// ─── Main App ─────────────────────────────────────────────────────────────────
const TABS = ['TODAY','EXERCISE','SKIN','MEDS','📷 SCAN','PROCED.','MEDICAL'];

function App() {
  const [tab, setTab] = useState('TODAY');
  const [entries, setEntries] = useState([]);
  const [adding, setAdding] = useState(false);
  const [tip, setTip] = useState('');
  const [tipLoading, setTipLoading] = useState(false);
  const [scanLoading, setScanLoading] = useState(false);
  const fileRef = useRef(null);

  useEffect(()=>{
    storageGet(STORAGE_KEY).then(v=>{ if(v) setEntries(JSON.parse(v)); });
  },[]);

  const snap = arr => { setEntries(arr); storageSet(STORAGE_KEY,JSON.stringify(arr)); };

  useEffect(()=>{
    if(!entries.length){setTip('');return;}
    setTipLoading(true);
    getCoachTip(entries).then(t=>{setTip(t);setTipLoading(false);});
  },[entries.length]);

  const handleAdd    = form => { snap([form,...entries]); setAdding(false); };
  const handleEdit   = upd  => snap(entries.map(e=>e.id===upd.id?upd:e));
  const handleDelete = id   => snap(entries.filter(e=>e.id!==id));

  const handleScanFile = async file => {
    setScanLoading(true);
    try {
      const data = await scanImage(file);
      snap([{...data,id:Date.now().toString(),timestamp:nowTime()},...entries]);
    } catch(e) { alert('Could not read image. Try again.'); }
    setScanLoading(false);
  };

  return (
    <div style={{maxWidth:430,margin:'0 auto',minHeight:'100vh',background:'#f5f1ea'}}>
      {/* Tab bar */}
      <div style={{display:'flex',overflowX:'auto',background:'#fff',
        borderBottom:'2px solid #ece8e0',padding:'0 2px',
        position:'sticky',top:0,zIndex:10,scrollbarWidth:'none'}}>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            flexShrink:0,padding:'14px 11px',fontSize:10,letterSpacing:1,
            background:'none',border:'none',cursor:'pointer',
            color:tab===t?'#2d5a2d':'#bbb',fontWeight:tab===t?700:400,
            borderBottom:tab===t?'2px solid #2d5a2d':'2px solid transparent',marginBottom:-2,
          }}>{t}</button>
        ))}
      </div>

      <div style={{padding:'14px 14px 80px'}}>
        {tab==='TODAY' && <>
          {/* Scan bar */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
            background:'#fff',borderRadius:12,padding:'11px 14px',marginBottom:12,border:'1px solid #ece8e0'}}>
            <span style={{fontSize:11,color:'#999',letterSpacing:0.8}}>📷 Scan label or plate</span>
            <button onClick={()=>fileRef.current?.click()} style={{
              background:'#2d5a2d',color:'#fff',border:'none',
              borderRadius:8,padding:'8px 14px',fontSize:11,cursor:'pointer',letterSpacing:1,
            }}>{scanLoading?'Reading...':'SCAN'}</button>
            <input ref={fileRef} type="file" accept="image/*" capture="environment"
              style={{display:'none'}}
              onChange={e=>{if(e.target.files[0])handleScanFile(e.target.files[0]);e.target.value='';}}/>
          </div>

          {entries.length>0 && <TotalsBar entries={entries}/>}

          {adding
            ? <AddForm onSave={handleAdd} onCancel={()=>setAdding(false)}/>
            : <button onClick={()=>setAdding(true)} style={{
                width:'100%',background:'#fff',color:'#2d5a2d',
                border:'2px dashed #2d5a2d',borderRadius:12,
                padding:13,fontSize:12,letterSpacing:2,cursor:'pointer',marginBottom:12,
              }}>+ ADD FOOD</button>
          }

          {entries.length===0 && !adding &&
            <div style={{textAlign:'center',color:'#ccc',fontSize:12,padding:'50px 0',lineHeight:2.2}}>
              No entries yet.<br/>Scan a label or tap + ADD FOOD.
            </div>}

          {entries.map(e=>(
            <EntryCard key={e.id} entry={e} onSave={handleEdit} onDelete={handleDelete}/>
          ))}

          {(tip||tipLoading) && (
            <div style={{background:'#eef6ee',borderRadius:12,padding:'12px 14px',
              marginTop:12,border:'1px solid #c8dfc8'}}>
              <div style={{fontSize:9,color:'#2d5a2d',letterSpacing:2,marginBottom:6,fontWeight:700}}>COACH TIP</div>
              <div style={{fontSize:12,color:'#444',lineHeight:1.7}}>{tipLoading?'Analyzing...':tip}</div>
            </div>
          )}
        </>}

        {tab!=='TODAY' && (
          <div style={{textAlign:'center',color:'#ccc',fontSize:12,padding:'50px 0',lineHeight:2.2}}>
            {tab==='📷 SCAN'?'Use the SCAN button on the TODAY tab.':tab+' — coming soon.'}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
